body:
  text: 三命通會卷九明萬民英撰六已日甲子時斷六已日生時甲子明見官星暗有財倚托若通於月氣平生衣祿自天來已日甲子時明官暗財已用甲為官癸為財辛為食子為天乙貴子上有明甲暗癸辛長生身若有倚托通月氣者富貴若不身旺行土氣運亦好己丑日甲子時化貴午寅年月夭折通土氣月貴忌甲寅月貴中惡死丁未月受刑丁丑月破祖失鄉惡死癸酉太守丁巳乙巳進士丁亥乙巳于慎行大學士丁亥甲戌何寬尚書丙子潘春谷少參命同己丑武貴甲戌癸丑刀筆乙卯辛亥奔覔辛丑己卯日甲子時先破祖後旺或旺中有傷辰戌丑未月貴午身旺子聚貴亥官長生俱大貴忌己巳月破敗凶死庚申月血光惡死壬子月刑害死庚寅明朝𢎞治十八年甲申賢君丙寅年崩庚子尚書戊子己酉少保庚午癸亥銓部癸亥甲辰布政乙亥己巳日庚子時辰戌丑未月風憲三品要行水木運西運無成南運財官無氣虛名薄利貴而不顯子寅年月東南運貴顯神白經云化土主福但不顯忌壬寅月受刑乙未月刑傷癸酉月夭乙亥丞相己卯甲子樞密己巳癸亥都憲甲寅癸亥州牧乙卯丙寅小貴辛丑甲午巨富甲戌庚申沈坤狀元終於獄戊子星案傳己未日甲子時髙身坐官庫辰戌丑未月吉寅亥月官旺文章振發貴顯易成已丑文貴晚成寅卯貧下忌甲申月身不完死丙子月孤貧丁丑月刑害庚申舉人戊寅丁丑廉憲己酉己酉日甲子時寅申午未丑年月文貴風憲午月東北運極品忌庚寅年破敗惡死己巳月凶惡戊戌月孤單血死丁卯沈坤狀元傳壬子原本壬寅府尹甲辰辛亥侍郎庚寅戊午朱之蕃狀元尚書乙卯己亥日甲子時春夏財官生旺吉秋冬四季背祿逐馬凶寅月金火運郎官午月東北運金紫忌壬寅月惡死壬申月孤貧遭刑癸酉月破敗壬戌部郎辛亥己卯舉人丙寅癸未張道御史無子癸亥巨富丁亥廕郎壬寅氣衝牛斗局未遇雞窗客博雅富文章逢時姓字香已日喜逢甲子時財官雙美貴希奇一朝得遇風雲會獨步蟾宫折桂枝已日時臨甲子化生土厚滋基財官既助顯光輝有似青龍戲水不遇庚金卯午為人祿至福齊常人發福有施為君子登科及第六已日乙丑時斷以下六已日所忌月分與上同時犯併論六已日生時乙丑煞星受制不為傷柱中身旺多榮貴無助生人晝夜忙巳日乙丑時專財逢鬼丑上有明乙為鬼暗癸為財若有倚托通身旺者貴通運亦吉若鬼有助旺不能任者衣祿平常己丑日乙丑時時上偏官居武職都閫還看地方斷之卯月金水運六七品貴甲子劉鑰侍郎乙亥壬午銓部己巳庚寅太守己卯乙巳佛印禪師壬午戊午公鼐祭酒侍郎壬戌丁巳進士癸卯癸卯女命嶽元聲和聲金聲癸亥母三子甲科己卯日乙丑時子申月行金土運侯伯巳酉丑戌年月俱吉乙巳侍郎乙酉庚辰劉光濟尚書己卯無子辛丑都憲戊戌丙子貴辛丑乙亥貴壬午庚戌孫繼皋狀元尚書丙戌星案傳甲辰禮科己巳己巳日乙丑時寅卯月偏官格無酉戌字文進貴命癸卯蔣狀乙卯元丙寅楚王辛卯甲辰秦耀巡撫謫戍丙寅戊申武狀庚申元己未日乙丑時時日併衝妻生財可也卯午年月金神入火鄉西南運貴辰戌四季全大貴干透丁辛純陰亦貴丁卯御史戊申庚午郎中己卯乙卯進士丙戌辛卯進士戊戌丁未萬世德右都丁未丙戌鄉凶辛卯己酉日乙丑時卯月偏官辰月財煞貴申酉傷官傷盡巳午印綬俱貴丑戌亦貴丙午尹臺尚書壬辰戊戌崔銑翰林乙丑己未名將辛未庚戌孫繼臯狀元丙戌原本傳己亥日乙丑時卯月大貴申月水木運風憲方面乙丑通政庚辰戊寅布政壬戌辛卯廕郎癸巳時上偏官局若還無救助身强印旺奇名利總成虛時逢乙丑本身衰庫有財星內伏埋不遇鑰匙難顯達方知出外稱心懷巳日時臨乙丑庫中耗鬼興灾祖宗産業有盈虧謀望財去財來戌未刑衝發福無匙來往搬移雙親鴈序事難依有救末中取貴六巳日丙寅時斷六巳日生時丙寅暗官明印旺其身月通木氣無衝破貴倚三台八位成巳日丙寅時官印生旺巳用甲為官丙為印寅上甲旺丙生若無破通木局月氣者大貴喜行木火不宜金水歲君同己丑日丙寅時春官旺夏印旺秋既濟冬平辰戌年月文貴顯達純丑壽髙戌月木火運五六品貴神白經云火土象主貴有血疾甲申丞相壬申己亥章極都憲甲戌乙丑進士壬午庚辰通判己丑己卯日丙寅時午辰年月文章顯達大貴寅午官至三品戊午尚書丙辰丙子布政庚午甲辰布政癸酉甲寅憲副丙寅甲申劉察狀元丙寅壬辰主政辛亥戊寅舉人癸亥丙辰蕭良譽進士大參庚子壬寅進士壬子庚寅兵科辛巳甲寅郎中庚午己巳日丙寅時先刑後旺寅月正官格文章顯貴亥子水水運貴純戌武職三品年月申亥四生局全大貴或不善終己巳魏謙吉都憲丙子壬戌布政壬戌己亥給諫丙寅丁亥舉人癸亥己未日丙寅時生土厚地方貴水木年月行東北運貴一云多庶出過房或父不見生壬戌布政戊申丁卯布政庚戌甲寅權貴丙子己巳舉人庚午甲子袁狀丁丑元己酉日丙寅時月通木火局貴木火運亦榮達甲申政布丁丑甲午廉憲丙寅甲午副使癸酉己亥日丙寅時春生官旺貴夏秋平冬財旺吉寅申丑巳午辰戌年月貴神白經云火木象貴甲申靳貴閣老丁丑戊戌熊浹尚書丁巳辛巳沈應時侍郎辛丑戊寅丞相丙辰丙子元戎丁酉丙戌參將死於陳甲午丙寅憲副庚寅己卯卿乙亥己丑倪嘉慶進士户郎乙亥上元人君子虎標標名局若無衝破者財官內外明必定作公卿巳日丙寅時異常少年未遇富文章運行卯地生明月平步青雲到帝鄉巳日丙寅時正官星印綬長生學堂三合喜光榮博覽文章聰俊年月無衝無破定應金榜題名運行官旺主亨通上等髙人之命六巳日丁卯時斷六巳日生時丁卯支干暗鬼梟虛神柱中有助方為福無助難為顯達人巳日丁卯時己以丁為印乙為鬼卯上明丁暗乙若歲月中無救助倚托者虛秀不實有成有敗月中見辛制伏身旺者貴運旺亦吉己丑日丁卯時申子辰武職亥卯未榮貴己酉丑行東北運吉己酉進士乙亥癸酉舉人甲寅丁巳進士乙巳己酉舉人壬申甲申進士甲戌庚申理卿戊子丁卯舉人甲辰己卯日丁卯時己酉年月制伏得宜庚申合煞文進大貴子月刑煞遇貴主兵權或法官地支純印或三合木局運行寅混官再遇流年衝運凶死乙巳史道尚書乙酉庚申吳山尚書剛正庚辰癸未進士甲子壬申進士庚戌辛巳袁福徵進士丁酉丙申宋開春户部郎中平原人余得三辛卯命通㑹原本即此公所惠者乙卯大貴戊子己巳日丁卯時無衝破富貴寅午辰年月刑傷不利亥月木火運貴若春生透甲乙者官煞太旺有制化亦貴否則凶夭癸卯路通侍郎辛酉丙子呂調陽榜眼閣老辛卯純謹子進士戊午揮使丙辰丙戌舉人丁酉己未日丁卯時不貴則富卯戌亥丑年月吉壬子進士癸丑癸丑進士乙卯己酉日丁卯時九成十破末年旺年月通身生旺干頭有辛癸制伏丁乙者吉丁丑侍郎己酉己丑憲副丁卯壬戌賈默狀元丁未丁卯僉事丙午癸丑太守乙卯己亥日丁卯時秋生偏官有制富貴春壽促夏身旺吉冬平常辰戌丑未月貴辛酉通政辛卯乙丑中丞甲戌己巳郎中丁丑偏官偏印局身强為大吉生人性剛强如弱也平常巳日卯時福自摧求名求利總不宜身宫但有刑尅字離鄉別井走東西巳日時逢丁卯倒食偏官交加酉庚辛破受波渣思想不能通達父母鴈行難望落花後立根芽圓虧離祖可成家發跡山林澗下六巳日戊辰時斷六巳日生時戊辰其身得位遇財神田園富貴多誠信甲乙提綱祿貴人巳日戊辰時財庫專位巳以壬癸為財辰上入墓巳土專位為人誠信富貴若通月氣或甲乙透出是生月帶祿大貴辰月身旺不得父母力見甲化土者大富冬夏財旺生官富貴西運平常己丑日戊辰時身孤寅卯月祿旺辰月透甲作化氣看貴午富厚寅酉風憲年月子丑透甲行東南運金紫近侍怕西北運退職甲午尚寶乙亥卿乙丑進士丙戌庚午舉人乙酉乙未御史丙戌壬辰傅應禎御史諫癸卯戊贈少卿甲午進士庚午己卯日戊辰時卯月風憲水木年月行東北運並同癸木羅瑶都憲壬戌庚寅御史乙酉癸酉進士戊午丁亥都督丁未癸未探花乙卯甲寅貴丁卯乙卯富癸未戊午善奕甲子乙卯舉人丁亥壬寅進士已酉戊辰舒𢎞志探花甲寅己巳日戊辰時身孤後發春官貴夏平穩秋凶暴冬財旺歲運同壬戌莊仁春太守與壬寅民爭利遭害戊子髙欽舜兩淮鹽院辛酉追贓棄市壬寅李廷機解元㑹元榜眼辛亥大學士不受餽戊寅僉事乙丑己未日戊辰時丑月雜氣財官吉寅辰己亥午戌年月文章貴顯辛巳丁士美狀元官止壬辰侍郎丁丑年卒甲辰副使丙寅壬申副使丙午丁酉通判壬子戊申貧蹇己未丙辰僧辛丑巳酉日戊辰時春官旺夏平吉秋暴狠冬財旺丁丑侍郎癸丑癸巳員外丁巳丁酉御史癸卯庚午進士庚辰乙酉方逢年壬戌進士閣老壬午丙戌年凶死癸未富納甲子中書己亥日戊辰時丑月雜氣財官貴戌月木水運六七品寅午子辰年月大貴甲午周廣都憲丙寅戊子舉人甲寅癸巳貢士甲寅癸未葉有聲副乙卯都壬寅元戎辛亥翠竹緋桃局不逢寅尅害依稀緑間紅開庫見錢龍辰時巳日不尋常內有錢龍鎮庫藏比劫不逢行運吉定教富貴廣田莊巳日戊辰時遇身逢旺庫豐盈果然花謝再重榮丑戌刑衝財盛壬申財官雙美妻重子晚方成雙親鴈侣事中平獨立自成之命六巳日己巳時斷六巳日生時己巳金神與火兩相和不通月氣平常看月氣如通榮甲科巳日己巳時金火相合己以丙為印巳中有丙建旺己巳又為金神坐於火位相合若通火月氣四柱不見財星破印不行財運發福非常若不通月氣或在冬生虛秀不實不通得南運亦吉己丑日己巳時辰月西北運貴午未火旺大貴申子戌巳亦吉辛丑周啓祥舉人乙未辛卯錦衣凶死丁酉壬辰丞相丁未己卯日己巳時夾辰財庫主大富又卯以己為驛馬二已通看謂之坐馬再生午月祿馬俱有尤為貴命亥月財臨旺地官遇長生巳月金神遇火皆主大貴己酉李植巡撫庚午壬子翁正春狀尚書癸丑一湖廣吏員命同己巳日己巳時午年月權威赫赫名譽昭昭春月子孝妻賢秋冬平常貴而不顯辰戌財印官食申傷官生財俱作吉推戊午康太和尚書壬戌丁丑年卒甲戌林廷玉都憲戊辰戊戌通政庚申庚辰運使甲辰甲辰進士壬申癸卯進士壬戌己未日己巳時拱祿格若無羊刃七煞午字填實不犯空亡主顯貴亥丑辰申年月行東運文武極品此格不如丁巳丁未以丁正祿巳寄祿故也庚午部郎丁亥庚子舉人癸木乙酉富己丑己巳壽丙子己酉日己巳時夏主金神入火鄉貴顯歲運同前甲寅趙子昻學士甲戌己酉學士己巳戊午舉人甲子乙巳千户辛巳己亥日乙丑時夏生資財滿目行樂軒昻冬平常戌月東南運國師金紫寅月亦貴戊戌錢汝京丁巳尚書丁丑副使甲辰乙卯進士丙戌己亥通判己巳火旺金神局若生冬月令南方運氣佳財祿定虛花巳日重逢己巳時金神化旺要相宜南離運步財官顯寅卯東方遇亦奇巳日時逢己巳夏生丙火金神不遇戌亥與庚申無破聲名響應父母一衰一旺刑空事業逡巡要知顯達改名庭火旺南方之運六巳日午時斷六巳日生時遇午祿歸時地主昌榮柱中怕有官星見若是伏晶另一評巳日庚午時日祿歸時巳見庚為傷官乙為正鬼午上有明庚合乙傷官合煞主人獨立有成若年月無乙而傷官臨於敗地柱有甲丙二字伏晶格不損格局無衝破主大貴己丑日庚午時寅月生貴夏凶秋暴冬財旺子少一云總貴丙子林茂達都堂壬