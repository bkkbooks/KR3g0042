body:
  text: 三命通會卷十二明萬民英撰元理賦徐大升著萬育吾解元一氣生五行統三才周萬物發乾坤之妙用剖陰陽之樞機在乎推四方分其貴賤得其中道八字一定榮枯是以強眀其生尅制化清濁貴賤夀夭賢愚此原造化之始金賴土生土多金埋土賴火生火多土焦火賴木生木多火熾木賴水生水多木漂水賴金生金多水濁金能生水水多金沉水能生木木盛水縮木能生火火多木焚火能生土土多火晦土能生金金多土變金能尅木木堅金缺木能尅土土重木折土能尅水水多土流水能尅火火炎水熱火能尅金金多火熄金衰遇火必見銷鎔火弱逢水必為熄滅水弱逢土必為淤塞土衰遇木必遭傾陷木弱逢金必為砍折以上言太過不及各有其害如此見五行四柱不可不中和也強金得水方挫其鋒強水得木方泄其勢強木得火方化其頑強火得土方止其熖強土得金方制其害以上言五行尅制要得中和而大過不及胥失之矣所以照破上文理貫人融者妙其幽察其顯也其為體也深能通變究其元微其為用也論其輕重原有原無天理賦來吉凶動靜人生分定否泰盈虧以上通論干支隂陽生尅制化之中體幽用顯輕重有無而吉凶動靜否泰盈虧皆自此而生之也妙在識其通變究其元微由顯而幽斯得其理以下則詳言之煞無刃不威刃無煞不顯煞乃尅我刃乃劫我命中之最凶者肯言煞刃其知所重者歟賦云刃為兵器無煞難存煞為軍令無刃不尊刃煞雙顯威鎮乾坤是也徐大升因見喜忌繼善二萹不足以盡人之命故復撰此賦所以補其未備也權刃雙顯均停位至王侯刃煞輕重無制身為胥吏言煞刃相停者極貴不相停者極賤刃煞停不停而貴賤之相懸如此生平富而且貴煞重身柔中途忽死或危運扶干旺既不相停不如從煞能從者必煞重身柔而後可從不然不能從也既從煞只以煞論不可再遇身旺相敵敵則反生禍矣處身僧道之首用煞反輕受職臺諫之除偏官得地七煞為權星又為孤星身煞兩強七煞有制身弱從煞皆貴然多為臺諫之官若身旺煞輕更入清竒必為僧道之首矣豈知大貴者用財而不用官當權者用煞而不用印印賴煞生官因財旺用財不用官財生官也用煞不用印煞生印也故云印賴煞生官因財旺非不用印用官而專用財煞則官印在其中矣印賴二句緊本上文四句自發眀之五行消息元理可知四柱推眀用神可見食居先煞居後功名兩全酉破卯卯破午財官雙美人之八字全看用神如上用煞用刃用財而不用官用印其理甚元在人消息之耳論煞當要刃無刃要有制煞強有制皆為貴論煞主名食主利故曰功名兩全酉破卯卯破午亦食前煞後之意酉以卯為財午為煞財煞兼有故主財官兩美然所以相破者以其相尅也必四正相破享福五行歸祿眉夀八字相停此舉命中最要者言之要歸祿要相停不可死絶偏黨享福屬歸祿眉夀屬相停義各有所取也晦火無光於稼穡盜木多困於丙丁此以下正言不歸祿不相停故不得享福眉夀土掩火光土賴木疏木本生火火多則反盜氣見不中和也火虛有熖火怕晦虛則有𦦨不晦金實無聲金要火無火煉則不成器實何以發聲水泛木浮者活木土重金埋者陽金水盛則危火眀則滅此又細分五行不相停而有隂陽之别見五行不可太過如水泛則木浮在乙木則怕甲木則否土重金埋在庚金則畏辛金則否以乙木死於亥甲木生於亥庚金出土之金所以生巳辛金帶水之金所以生子水盛則泛濫故危火明則煨燼故滅陽金得煉太過變革奔波隂木歸垣失令終為身弱金實無聲煉過變革歸祿享福失令身弱見要中和陽金土重則埋怕煉太過是無土也隂木失令則弱縱是歸垣亦損夀也此夲上文活木陽金而言又不可無水土生養也土厚而掩火無光水盛則漂木無定五行不可太盛八字須得中和土厚即晦火無光之意水盛即水泛木浮之意五行二句又所以總結之歸於中和而已土止水流全福夀水無土止必傷殘此下言失中和而五行有救亦作吉論無救助方凶如水流而有土止則祿夀兩全餘可例見木盛多仁土薄寡信水旺居垣須有智金堅主義却能為金水聰眀而好色水土混雜必多愚此言五行性氣太過中亦各有所盛偏之為害也五行分四時五常配五行自然之理也或盛或薄或旺或多或混雜而仁義智信聰明愚魯亦各從其類耳遐齡得於中和夭夀喪於偏枯此又申言人命要稟中和即前眉夀八字停均之義若太過不及失於偏枯安得遐齡之享哉辰戌尅制併衝必犯刑名子卯相刑門户全無禮德此以下提起地支相衝相刑言之辰戌魁罡併衝必凶子卯母子相刑必亂乃衝刑之最重者餘稍輕寅申巳亥為四生之局縱犯尅制刑衝亦無大害棄印就財明偏正前言大貴者用財不用印財有偏正印亦有偏正正印見財有禍偏財見印無妨正財不喜見印偏財不忌見印同此理也棄干從煞論剛柔前言當權者用煞不用印煞有剛柔棄天干而從地支陽剛陰柔金水土可從木火不可從明可從不可從之理然後知印可用不可用也傷官無財可倚雖巧必貧食神制煞逢梟不貧則夭傷官食神同類傷官剝官命中最忌有財亦好以傷生財財生官故也無財則以貧斷食神制煞命中最怕逢梟以梟奪食煞無制則兙身故夭男多陽刃必重婚女犯傷官須再嫁羊刃逢煞相停固主貴矣多則傷妻男以財為妻刃則尅制故重婚傷官有財可倚固主貴矣多則傷夫女以官為夫傷則尅制故再嫁貧賤者皆因官處遭傷孤寡者只為財神被劫官為祿有祿安得貧賤身旺得官微復行傷官運謂之背祿則無官矣安得不貧賤財為妻有妻安得孤獨財少遇身旺復行劫財運謂之逐馬則無妻矣宜乎該孤寡財官其人命之最要者歟財臨旺地人多福官遇長生命必榮前言食傷生財為旺此則直言財臨旺地如甲用戊巳為財居巳午之地為旺前言財旺生官此則直言官遇長生如甲用庚辛為官居巳子之地為生二者必須身旺方主有福榮貴去煞留官方論福去官留煞不為卑人命最怕官煞混雜用官只用官用煞只用煞故有去留方可言貴如傷官羊刃人命逢之多不吉用之去官留煞去煞留官或者亦作福論豈知遇正官却終俸祿逢七煞乃有聲名正官七煞君子小人之分也豈君子不如小人正官雖得純粹七煞一有制伏便發貴有聲若正官純粹發福悠長豈七煞之比此舉其偏重者言之逢傷官反見夫財命有氣遇梟神而喪子福氣無依女命最怕傷官有則傷夫其理易曉內有傷而反見夫者乃財命有氣傷官生財財生官星為夫故也女命以食神為子遇梟奪食雖生子不存女倚子為福既無子又何有福之可言女命重夫子二星故舉傷官食神言之天干煞顯無制者賤地支財伏暗生者竒人命以煞為重前專以煞言要刃合要食制要從煞如不合不制不從天干顯則煞為無情故主貧賤人命以財為福前專以財言要傷生要酉破要食旺但財不喜露要藏地支中有暗物以生之則主豐厚故為竒特三戌衝辰禍不淺魁罡最怕相衝不吉若相停為財官庫不忌如三戌一辰甲辰日主貪財生禍以地網衝天羅所以忌之兩干不雜利名齊兩干難得不雜故主利名兼有然不可一槩言貴或是財煞或是官印或是煞刃或五行成象更入格局方作貴論丙子辛卯相刑荒淫滚浪丙辛合子卯刑干合支刑丙辛水象子卯無禮故主荒淫滚浪言極淫也女命尤忌之子午卯酉全備酒色昏迷上重子卯此併論午酉為四敗之局號曰遍野桃花煞全備者多貴但主酒色昏迷女命尤忌之因財致禍貪食種疾姪男為嗣義女為妻上言財要伏藏為竒然財者衆所爭故有羊刃劫則因財致禍見財不可專也上言食神制煞為妙然食者人所食故有梟神奪則因食生疾見食不可貪也男以官煞為子如羊刃劫財官煞為彼用是兄弟有子而我無子故以姪男為嗣以偏正財為妻如柱中無財正位而寄生别宫是娶他人所養女故主義女為妻日時相衝卯酉始生必主遷移造化因逢戌亥平生敬信神祗此又舉地支中卯酉日月門户日時遇之主遷移不定戌亥為天門日月逢之多敬信神祗或僧道也隂尅陰陽尅陽財神有用官無官鬼無鬼太旺傾危人命以財官為重故又舉而言之人皆知正財為用不知隂能尅隂陽能尅陽偏財勝乎正財造化反為得用官不可無官多反主無官不吉煞不可有煞多得從其鬼反不為害要之皆為太旺身衰不能敵傾危之道也得局失垣平生不遂歸垣得局早歲軒昻得局三合局也歸垣干歸祿也此言人命要生旺成局勢為福若得局失垣雖天干類象而地支三合却為日干休囚死絶之地亦平生不遂若得局又歸垣如五星升殿入垣乃得地得時之謂也決主早歲發福曲直潤下等格即得局歸垣命遇梟神而與富家營運龍藏亥卯經商利賂絲緍財官俱敗者死食神逢梟者凶梟神固可惡小人得之有用謂其與富家營運如甲用丙火為食丙能生戊土為甲之財壬水却為甲木梟神受戊驅使丙火以托甲木互換相生為主客之道故也亦有為商自營運者謂龍藏亥卯寅為青龍巳為太常亥卯未木局八字用藏亥卯未為用神者或用財皆主絲緡之利財官為祿馬人最緊要若俱在敗絶之地或行運又到敗絶用神損氣安得不死食神人之爵星生財制煞命中緊要彼梟奪食煞無所制財無所生安得不凶丁巳孤鸞命遇聰眀詩女裸形沐浴日犯濁濫荒淫此論女命男亦同孤鸞乃甲寅丁巳戊申辛亥等日坐四生之地故多聰明祼形沐浴即子午卯酉四敗之地也月時犯無傷只怕日干自坐如甲子庚午丁卯癸酉等日身坐桃花煞再遇帶合故主濁濫荒淫丁逢卯日遇巳土叨食之人亥乃漿神逢酉金嗜杯之客丁干坐邜木為梟若遇巳為食故主貪食或因食生災亥為登明酉加水為酒酉日生人逢亥必主貪杯更帶刑衝主落魄或酒死歸祿得財而獲福無財歸祿必須貧歸祿身旺故用財無財而專歸祿無用得傷官食神生財月吉又怕見官煞竊財之氣財印混雜終為受困偏正錯亂必致傷身貪財壞印故忌混雜若先財後印反主成其福不以此論官煞混雜有去留亦吉若錯亂則傷身為凶女命偏正錯亂尤為不吉擇婦者須知之或曰偏正就指財之偏正印之偏正言但於傷身難通太歲忌逢戰鬪羊刃不喜刑衝此論日干與歲君相犯禍福蓋日犯歲君以歲為用神者無咎如六壬日以丙丁為財柱中原有根雖犯太歲反為吉身旺者凶弱者無咎日與運俱犯之方主大凶五行有救亦減分數最怕天衝地擊當妙察性情隂陽物元真理且如六乙人逢巳歲運活木尅活土却有生意財源倍有六甲生人逢戊歲運死木尅死土則不吉重者喪身羊刃格不喜歲運刑衝小人不可犯之如八字既有羊刃多煞制伏行羊刃歲運亦凶元有財者更重帶傷衝刑戰鬪主禍出不測經云羊刃衝合歲君勃然禍至是也戰鬪獨舉太歲刑衝獨舉羊刃指其所最重言也庚逢丙擾多有不仁癸從戊合少長無情此言人之性情心術金火相刑故有此病且主人剛暴癸為少隂戊為老陽癸戊雖合化乃無情之合故以少長言之男命戊日見癸當娶少年之婦女命癸日見戊必嫁老年之夫不從不化淹留仕路之人得化得從顯達功名之士不通月氣時無所歸又犯孤神不從不化也若通月氣時有所歸則以從化論夫旺從夫化妻旺從妻化人之行藏豈止一事而立終身無改故從化成格則富貴備矣先論從化後論財官從以天干從地支如乙生八月地支重金則以金論是也化行祿旺者生化歸祿絶者死此言得化得從要得祿旺不要死絶蓋化成造化行夲局祿旺如丁壬化木月令春或東南方運為生行金鄉或時遇申酉之地為死生地相逢壯年不祿時歸敗地老後無終生地相逢是命巳有長生臨官行運復遇之如庚辛臨官帝旺在申酉用丙丁為官用甲乙為財火至申酉運則病死是庚辛無官也木至申酉運則死絶是庚辛無財也財官俱敗用神破傷雖壯年不祿時為結果人之生時最不可居於五行敗地金敗午木敗子水土敗於酉火敗卯時為末主若居敗地主晚年晦滯破敗無終丁坐酉金丙辛遇之絶嗣財臨煞位父死而不歸家丙用壬為子壬敗於酉辛用丙為子丙死於酉時乃子宫既敗且死豈有嗣乎如有嗣則父必不祿人命以財為父財煞同宫則難為父如庚辛用甲為父年月時見甲申坐煞官歲運煞旺主父死他鄉或云煞劫煞財坐劫煞更父位推賦義亦通八專干支同類煞運煞年多凶支干同類如甲寅乙卯丙午丁未庚申辛酉壬子癸丑戊午己未戊戌己丑是也行運會煞必主不祿以其恃強與煞相爭煞竟尅身故也若能詳觀玩覽貴賤萬不失一余見舊注分拆破碎有失賦旨故略注於下以明作者之意云真寶賦明兵部尚書萬育騏撰萬吾解官星帶刃無尅破掌兵刑之大權財印相資沒刑衝登黃閣三公之貴正官格喜羊刃及財印相資有傷官則尅有刑衝則破無印無刃只有財星資助亦吉歲同財官生旺逢印綬拜薇垣憲府之尊三合印財會局全登五馬諸侯之貴財官生旺格柱有偏正印再三合印局或財局吉傷官逢煞刃兼將相於明時印綬若相扶登龍門於早歲傷官格身弱喜刃印相資扶則吉傷官得食神重輔麟閣圖魏相之功歲運忌制伏刑衝再傷官而禍至傷官得食神重疊相扶吉所忌刑衝及制伏太過復行傷官運不測災來柱中無官喜行財官運無印喜行印綬運主遷官歲運同財資七煞威權獨壓萬人印若相扶斷定官居極品七煞格喜財資助又得印化最吉惟煞故主有權得印故主極品月會既同煞刃英名儔漢室之霍光時歲復帶印財髙位埓中興之鄧禹七煞劫刃同在月令歲時有財有印最貴義同上文但此又兼刃言也煞失時而印無氣更主旺而任常流七煞印綬若不當令司權而日干自旺用神輕微不過清虛冷淡之職歲運行財煞則吉印司令而煞相扶再見財而官翰苑印綬格要當時月令日支又得重生氣旺不見刑衝破害稍得一煞一財為妙太過不宜財印兩停乃常流也賦又云印綬重逢官居翰苑是也偏財時上見官早歲名標金榜更得食神相輔少年日近天顔時上偏財格歲月有官星又得食助準上文忌比劫逢比百無一遂福德見財而隱官居極髙之重任柱運逢印而無土處至下之孤刑福德如壬癸日生冬三月之例喜財官資助干支作合或得火局及辰戌丑未但逢一字為妙若無財官而逢印綬不行財官而行印綬及北方之運刑妻尅子孤寡貧賤之命也六壬趨艮透財印以為竒官煞相侵反貧窮而下賤六壬日逢壬寅時乃趨艮格也歲月再見寅天干透丁辛為妙富貴雙全最忌官煞或行運見之六親骨肉分散貧薄婢僕之人也六甲趨乾喜財印而位重名髙歲運衝刑併煞官而災興禍至甲日時逢乙亥乃趨乾格也歲月再見亥又得財星重遇印綬生身正官自然出現再行財旺之地吉忌巳字刑衝官煞尅破甲乙劫奪歲運同財宿疊逢得印生少年受福即先財後印反成其福不可以財壞印為嫌倒衝帶印遇財食早歲成名倒衝祿馬格乃丙午丁巳辛亥癸亥等日柱有偏印又行財食運為貴忌填實官煞不中賦又云倒衝帶印早歲成名財食兼資身近丹墀是也歲德扶干喜財星而嫌制伏印星在運會羊刃而掌兵刑年干七煞為歲德不宜重見最喜財星及印綬羊刃不可制伏歲運同如甲申己巳戊子癸亥歲德無制有財生煞得用有印化煞助身有刃合煞扶身故大貴二德配官王陵為漢朝之相如辛日生九月以丙為天月二德又為正官喜財是資助忌傷官尅制賦又云平邦國統六師賴官變為二德是也如乙亥丙戌辛丑戊子合格又官變德居官無禍財變德得善中財帛印變德主受父祖貽慶無禍日干變德則主夲身財星德秀謝安為晉代之公如戊巳以甲乙為官壬癸為財二德透干為德秀之辰無庚辛制伏不被比劫爭奪大貴又如乙日以庚為官生巳酉丑月丙丁用庚辛為財生巳酉丑月之例賦又云王商扶漢因財官而為德秀之榮是也或以德秀為福德秀氣更是財官尤妙傷官多而見官頑石産玉原有官而再見災禍連綿傷官格要柱中重見傷官如有一位正官為貴無官喜行官運傷官如石正官如玉若有官再行官運則禍傷官如帶煞刃出將相而入公侯傷官為主柱帶煞刃又得印綬當時得令有相益之情不被刑衝乃極貴之格賦又云傷官帶刃印全備掌兵符之重任是也德秀若助傷官握兵權而伏鈇鉞此又兼德秀言之皆以傷官格為主地全子午卯酉成大格而文武經邦四仲全看天干何如須成大格為妙柱列巳亥寅申更竒儀而威權震主四孟全看天干何如更得竒儀為妙木生卯月時會午而震動離眀運至西南官居極品此木火通明格也食遇印多再劫衝天年必夭此食格所忌柱盛食神運財鄉功名有準一云權臣內使此食格所喜朝陽帶印資馬宿青瑣黃門柱無財印職居民牧歲運最嫌填實六隂朝陽格喜印綬財星在歲月之中入格而無財印則減分數運行財印官居轉運忌衝刑填實賦又云朝陽帶印清朝達士財星資助非青瑣之榮即風紀之任柱無印財多居民牧職守専城鼠貴帶食資印曜薇垣藩省柱有官煞貧窮下賤運途不喜刑衝六乙鼠貴格喜食神重見及印綬則吉忌官煞衝刑害子丑遙合巳宫柱印財而為極寶歲運若無輔佐登卑秩而坐寒氊子丑遙巳二格要柱有財印必貴無則否運遇財印亦發賦又云子丑遙合巳宫得財印而為至寶是也論道經邦喜財官自祿而自旺如甲日以辛為官得酉建祿已土為財長生在酉之例入斯象大貴忌刑衝傷官運歲同如吳嶽尚書甲子癸酉甲辰甲子合格庚午年卒平生正氣君子調元贊化因三竒自旺而自生正官正印正財為三竒日以庚為正官得已字長生壬為正印生於申戊土正財生於申入斯象大貴如談論尚書庚辰甲申丁未丙午財官印俱旺胡宗憲尚書壬申辛亥丁酉壬寅財官建祿印長生火自生於酉為貴神之地又化木成象所以威制四省官居一品欄又得印祿之相助官居補衮阿衡火劫兼歲運之不和反作貧窮而下賤此格柱中有祿神偏正印天干得財印為妙若見火神劫刃太重歲運不和貧賤祿逢財印青年及第登科歲運刑衝官煞逢之不妙歸祿格歲月時中有印有財地支三合為妙運行財印之地吉忌刑衝破害官煞破格金水清沉被傷文章顯達而夀算難延柱中巳酉丑金局申子辰水局二局全乃曰金白水清却被天干丙丁戊己混尅則文而不夀賦云金水清澄被傷顔子秀而不實是也木火衰盛不均功名蹭蹬而夭折無疑甲乙日生柱中丙丁午巳火盛即乙木疊逢火位名為氣散之文柱無財印灰飛煙滅尅子傷妻或殘疾功名雖有亦小就而巳得劫刃幫助壬癸生扶戊巳資益則貴雲龍風虎若相從擬作聖朝之大器雲龍風虎如甲乙生春三月或亥卯未月為青龍之宿天干要壬癸水謂之雲龍相從或庚申辛酉但得一字為西方白虎之神愛亥卯未邀合巳字為巽風則貴若見填實又無雲雨謂之旱龍有陽而無陰有君而無臣剛柔不相濟反為中庸不達之士也或以辰為龍寅為虎壬為雲巳為風局全寅辰巳壬者大貴飛祿倒衝資印綬必為昭代之名公飛天祿馬倒衝之象喜印綬財忌正官七煞衝刑填實若行印財及三合之地亦吉身雖旺而官祿微輕馬氏育菁莪於絳帳如甲寅日用辛為官祿生冬三月或四五月用神既淺又無財星資助止為師儒之命如生夏而財星資助富擬陶朱若尅破制伏火重則否格不清而用神休廢蕭曹起刀筆於西秦義同上甲乙若遇乾宫會辰龍而必貴甲乙二字多逢干頭地支見亥一位又得辰字名羣龍無首吉是剛能變柔入斯象主大貴木神如逢壬癸得巳午以為佳甲乙日生人得壬癸印生扶支帶巳午是有火氣水火既濟龍得飛騰之象雲行雨施之功命值斯象位近清光庚遇壬癸坐煞印而周瑜位重六庚日生柱中壬癸多身坐七煞印綬者主大貴如何尚書壬子癸丑庚午丙子余命壬午癸丑庚寅丙戌俱合此象龜蛇持劒兼金刃而賈復名髙壬癸日生柱中丙火多或寅午戌申子辰二局水屬龜火屬蛇名龜蛇持劒之象柱無金其劔不出庚辛重而時見巳亥虎嘯風生得戊巳以相資官居極品庚辛日主再見庚辛干歲月時中得一巳為巽風或得亥亦可喜甲乙亥卯未運行東南權髙祿重行北方富入西禍莫測一氣相生稱五行之順食位近三台一氣相生即甲生丙丙生戊戊生庚五行順食更地支互益者大貴或以天元一氣解之則非金神帶刃遇火地之炎眀官居內閣金刃格柱中有陽刃又行火鄉大貴時上偏官喜劫刃印財而居歲月時上偏官格歲月時中有財資印化刃扶身強主風憲之權父傳子道兼文武將相而顯朝廷乙日生逢壬午時者是乙屬東方青帝之神午屬南方火帝之神乙為父時為子得干上壬水反生乙木是父傳子道之象青赤相投之妙入此格者功髙一世寵壓千官不宜水盛乙木有泛即前木生卯月時會午而震動離明運至西南官居極品是也傷官透而正官隱運煞印而位重權髙傷官透於歲月時干正官隱於地支柱內財印七煞全者大貴地天交而隂陽感得戊巳而三台八座日時得亥為乾天歲月得申為坤地而干透戊巳是地在天上有隂陽交感之意內陽外隂健順之象入此格者大貴木盛金繁得離眀而公忠正直木賴金削繁則金太多要火制金公忠正直因金木而言也金白水清遇長生而聰眀出衆庚辛日生於申子辰月地支坐巳柱有壬癸無火土夾雜主聰眀有文學火明木秀逢土現而早占鰲頭甲乙日生柱中有巳或丙丁寅戌字在春生竒特若地支有午戌亥卯未各得一字亦是不拘甲乙日生水木在春生遇土金而作公侯之貴水見土木見金為官水見金印木見土財春則木旺水休互相資助故貴金逢火煉早年出仕木得金裁幼歲成名此言五行之相濟也金多失火嗟性地之凶頑木盛無金嘆功名之不遂土重而無木疏通困苦奔波之輩水盛而無土制伏破家淫蕩之人火盛而無水濟死而無悔之暴夫木衰火盛變灰飛功名遲而難逃夭折金白水清被梟害文章秀而莫永天年此總言五行偏黨無制化皆為不吉金白水清脫梟神而文章益顯與前金白水清遇長生而聰眀出衆互看煞官兩露遇二德而爵位崇髙二德天月二德也煞官兩露疑混得此解之故貴財資七煞子儀司將相之髙權柱中財旺生煞煞生印又得長生之地日干旺格局純大貴金神帶煞冠凖擅廟堂之大器金神重犯歲時月令却逢七煞大貴忌刑衝歲德逢財煞栽根早登顯仕更加印刃無妬合預擢髙科與前歲德扶干喜財星而嫌制伏印星在運會羊刃而掌兵刑義同歲德逢財少年請舉歲德帶刃早歲成名歲德為重煞故屢言之請舉少而成名早擢髙科而登顯仕以年管初年煞主威風故也假如甲日見庚年為歲德柱中要戊巳資煞巳酉丑栽根帶刃喜行卬綬忌正官妬合之辰月七煞而時歲食肅憲府風霜之號令食神制煞理固然也月煞印而時傷官受鳳閣龍樓之厚寵月令有煞印歲干支得之為極妙要時透傷官為印之妻年煞之制故主大貴日丙火而時入亥宫麗乎天而文眀四海六丙日時得巳亥亥屬乾為天火在天上無所不照命有斯象自幼至老貴顯崇髙掌兵刑之任上佐天子下順四時外撫四夷所忌刑衝破害有救者吉賦云陽火時逢亥位文明光照乎四海是也干陽熒而時逢己丑出乎地而照耀山川丙日逢巳丑時是日出土上之象順而麗乎天大明之德如安國康侯多受大賜命之值此鼎鼐股肱之任如姚淶狀元戊申戊午丙辰巳丑合格賦又云六丙時臨巳丑日在地上為極顯是也時辛亥而日逢丁乃時三竒而科名早中六丁日見辛亥時辛為偏財亥中甲木正印壬水正官謂之時上三竒必主少年登科富貴長久賦又云隂火時亥富貴悠悠是也月建申而歲時遇子為坤坎順而將相可期欲知富貴先觀月令乃提綱月建申屬坤為地年支子居坎為水地水師卦水不外乎地兵不外乎民得此象者大貴子時亦然日支子者則非時離歲巽日隂金透甲乙為三台之貴午時生人年支得巳字日得辛金為主金用巽木為財離火為官名曰內得巽順而外得離眀之象柔進而上行得中而應乎剛若巽居月令則非入格大貴木秀火眀春秉令入斯象奪榜眼之魁重在春生即前火眀木秀逢土現而早占鰲頭之義食神帶刃結局而位至三公如甲人食丙要火局巳人食辛要金局但得一字更有刃助大貴食神帶刃坐官而勳髙一品日主坐下官星歲月時中又有刃食之現大貴所嫌者偏印衝刑若行財官二運勃然驟發官星帶刃班超萬里封侯歲月得時周勃特然入相正官之格用神要當時柱有劫刃為正官妻財則剛柔相濟却得財星為貴官星劫刃兩現天干之上尤貴賦又云官星帶刃貴不可言歲月透露周勃特然入相是也得時以官星乘旺言帶刃以不拘干支言透露則直指所重者言之也刃為凶煞官食帶之皆作權貴看如李邦珍都憲癸酉巳未壬子庚子合格財官雙美透財印而居臺省之尊運至比肩更刑衝抱守株之拙癸巳日坐向四月壬午日坐向午月天干透財印貴不宜北方運又怕刑衝宜斟酌財官生旺天干透露為竒而曵紫拖朱四柱財星旺不必正官透財自生官絶竒或財官兩透居生旺之地皆主大貴財旺生官印刃相扶為妙而三台八座柱中財星旺得令又印劫扶持大貴再莫行財鄉運干食神而時騎祿馬初年題虎榜之榮名庚日見壬午時辛日見癸巳時是也透印綬而格得財官早歲鎮邉隅之重任財官之格要歲時透印干為妙日干健旺而印刃相扶龔勝盡漢家之死節賦又云煞旺而得印刃之扶龔勝死節於西漢是四柱純煞或官星從煞得印刃透出天干乃忠節之良臣也前言日干旺而印刃相扶則太過焉得好處當以後為正考龔勝漢之處士而能死節豈非五行太過之傷歟官星帶刃而印綬帶煞元齡步唐代之瀛洲三公之任在乎煞刃司權各遇長生更得財資極貴如甲用庚為煞乙用辛為煞柱有巳子則煞長生甲見乙乙見甲為刃柱有亥午為刃長生更得財資煞印化刃極貴司要樞總戎政因劫帶印以資官月令時上正官要羊刃資之如甲用辛為官有乙字資官是也伸枉抑理寃愆為財生煞而助印四柱七煞重疊又得財官資助則煞得勢復生乎印矣進直言趨金闕因煞刃兩露於天干此是煞格而煞刃並現歲月時中主言路居翰苑而掌絲綸為正官歸祿於四柱歸祿乃正官如丙用癸為官有子字則癸祿居子在冬三月生妙賦又云掌絲綸之命列玉堂之職因貴祿而得清竒是也年正印而月正官居國監翰林之任正官喜現於月令之中正印要露於歲元之上不見衝尅之神準上文格清竒而時得令唱鴻臚玉殿之名格局純和不雜用神得令有氣無刑衝破害大貴之造賦又云格清局正玉殿傳臚是也平邦國統六師賴官星變為天德解見前理隂陽登宰輔因祿馬又帶長生正財正官俱有長生得刃生食食生財財生官官生印印生身有周流不息之妙必主大貴賦又云財官有蒂調和燮理之權有蒂長生是也只財官長生就貴長生指所居長生之地言不必要刃食相生解格局純和而日干自弱覽泉石而好幽棲用神雖得時日主衰不勝却為林泉晦迹之人遇運扶身亦發格局薄弱而用神輕微縱資生而無過小職如其所用之神不得時令縱得資益之字不過小官比前格局純和者不同土重而支神厚載畏元武而喜青龍格局茍逢必膺大貴且如戊巳日柱中又重戊巳字或得一申字在地支是純柔順之道賦形有定之方德合無疆坤之大也值此象大貴忌壬癸喜甲乙運同木盛而土厚逢熒順東方而行坤地柱運順和定顯功名天干甲乙一氣地支戊巳重疊却得寅午戌一字順東方木得地也行坤地土得位也如是則木愈盛而土愈厚矣四九上下應之土多而居坤艮之上則天道下濟而光眀戊巳居於歲月時干地支又有其根得提綱在寅土為坤為地寅為艮為山止乎內而順乎外謙之義也山至髙而地至卑乃屈山於地之下值此象貴顯亨通刃逢祿馬三竒得令透財為公侯一品之貴柱會水火二局露金藏土為龜蛇持劒之形即前龜蛇持劔兼金刃而賈復名髙之義財星變德而坐煞李靖兼文武全材如丙申日以辛金為正財要在四月中生自坐申中壬水為煞巳卯以壬水為正財要在申子辰月生為天月德之類二者俱變為德秀又是財星變德值生旺無劫奪武則鋤強殄暴文則胙土分茅賦又云財星變德登樞要而任股肱是也煞刃得印以相資汲黯作朝廷之耳目煞生卬刃合煞全者大貴傷帶財印兼生旺而持綱持紀傷官用財用印之義也須財印生旺方妙柱均火土逢木氣而為國為民火生土為食傷木為火印為土官故也王曽魁衆士因官印帶食以相扶葉正占鰲頭賴印星自官而自祿身旺無財官之輔非技藝而必僧流女人犯二德之純受寵章而沾鳳誥余觀此賦不外子平但多重七煞羊刃傷官食神而財官印綬兼資並取成格合局作黨制化變德者皆作大權大貴萬公耳聞目擊故以子平之法而推廣之萬公其亦識微之士耶金聲玉振賦受命之不同也有如受形測理之難精也過於測海隂慘陽舒知盈虛之有數天髙地迥極覆載之無疆或升之雲漢兮而非有所私或墜之淵泉兮而非有所惡其氣數定於太初其培覆譬諸草木妙訣不在於多言至人奚事於強聒且如類屬從化格判旺衰照伏拱遙局分眀暗見類屬要旺從化要衰照伏二者皆取局於明遙拱二者乃取局於不見之形故謂之暗巳詳注前看命八法下論用神論日主各有所宜取地脈取天元是或一道此泛舉談造化者之非一端也或曰此六句是申眀以上八格之意於義亦通遊心於去留舒配決意於喜忌愛憎此約言造化者之無多術也中間妙理則不能一言盡如論用神用日干取地脈取天元喜忌愛憎萬有不同若不去留舒配何以成造化而分貴賤談性命而決生死所以當遊心詳玩決意專察也亦有源濁而流清豈無根甜而裔苦如水生於土令其源夲濁運行西北土化金金化水其流不亦清乎若此者先主凶後主吉洪範曰稼穡作甘炎上作苦木生土令行南方根甘裔苦之謂也雖傷官能生財然水不南奔何以任之或謂此二句總喻五行命運不專指水火亦通珞琭子有初凶後吉始吉終凶則是譬喻此則直言其理耳鴛鴦比翼見江湖必遂平生如丙戌辛丑丁巳壬寅丙辛合丁壬合寅戌合丑巳合若鴛鴦之比翼聮飛也有壬水在柱而又丙辛化水是江湖之象可以遂其棲遲之情矣或曰鴛鴦比翼只取其兩兩相合即德合雙鴦格也江湖字不必拘蝴蝶雙飛逢園囿方為得所如辛未戊戌辛未戊戌未為木庫戊戌納音又為平地木乃園囿之所故合格而貴若無一點木氣豈非虛名虛利之人乎採精金於青沙黃磧别利器於錯節盤根甲午日見已巳時乙未日見戊寅時蓋甲午乙未是是沙中金而戊寅則青沙巳巳乃黃磧也甲乙生卯月木旺之時柱帶壬申癸酉劔鋒之金正合此格餘金則非我生者豈若生我之為安尅我者曾如我尅者之為顯此言傷官不及印綬用煞不如用財也蓋傷官七煞雖或大貴然多有得其禍者弗若純用財印為享自然之福也或謂用財似止於富不曰財旺生官耶故用財者制人用官煞者制於人如逢既濟未濟休疑衝併休疑無依如壬子丙午壬子丙午既濟之格也丁卯丙午丙戌甲午未濟之格也二者俱太貴如令俗眼觀之則前一命嫌於衝併後一命嫌於無依矣或以未濟以火在上水在下柱中太旺為解即聚精會神之格也內有三正三偏不必生扶不必透露六壬生四月巳中戊為偏官丙為偏財長生金為偏印故謂之三偏癸生巳月則為正官正財正印乃三正也水雖絶巳金長生則水不終絶是以不必生扶也翕聚則氣專發散是以不必透露也或以生扶指財官印言若日干衰弱則不可不生扶耳奔道途而喪生蓋因秀氣繁亂坐囹圄以亡命只為比肩爭鬭如一甲三寅一丙三戌一辛三丙祿庫官星太多無秀氣也如三壬一亥三庚一丑三己一甲秀氣不勝其分奪也餘倣此刃重官輕業屠沽於市井馬疲印破弄刀筆於公堂官星帶刃夲吉官煞失時而刃用事兹其所以賤也凡遇此格斷為屠沽無疑如寅午戌馬居申有刑衝破害則馬疲甲木以壬癸為印無庚辛金生之而有戊巳破壞乃吏胥之徒也或云馬指財言疲病也財臨病地謂之馬疲考珞琭子馬疲注王廷光以前説為是三竒再犯戌辰作斫削裁縫之匠地三竒甲戊庚天三竒乙丙丁人三竒辛壬癸干得三竒地支有辰戌相衝乃貴反為賤之造遇此者可斷為木匠及裁衣匠矣遇寅辰則不然或戌有合辰有合各分二局則水火既濟亦不然也四柱盡歸祿位享眉夀景福之人如丙寅甲午乙巳巳邜丙祿居巳甲祿居寅乙祿居卯巳祿居午天干各有所歸此人一生富而且夀即消息賦享福五行歸祿眉夀八字均停之意木衰火旺復行西天年夭折如甲午日生四五月木不南奔又見金砍伐夭折固宜行東北運則否水冷金寒兼拱北身世浮沉金水傷官只宜東南運行吉甲春乙秋偏宜官煞重疊甲生春木旺賴金斫削方成器乙生秋或化或煞皆吉是以宜多煞假若甲生秋而重受尅必主大凶乙生春而煞多亦不宜丙火卯月難資印綬生扶濕木不生無𦦨火理固然也乙卯癸卯尤甚丅卯庶幾水繁而不制病生於膀胱金繁而不化疾在於喉舌水屬精金屬聲水失隄防而無土制則其人淫水多太泛也金太堅剛而無火化則其人啞金實無聲也財官雙美透露極榮一云遇印極榮火木通眀見土則貴財官雙美是辰戌丑未月生或壬午癸巳等日固宜財官透天為妙木火通眀須春生最吉土所以宿火培木故須見之方貴壬趨艮甲趨乾須以財印助福子遙巳丑遙巳亦以財印相成以上四格皆賴則印輔佐而始大貴不宜見官煞三竒伏歲支之下少入翰林三竒在時位之間晚歸臺閣如六甲日主見己丑年者是己丑中辛金癸水己土為財官印之三竒也如六丁日見辛亥時亥中壬水為官甲木為印又辛金乃財也遇之豈不居極品乎夫三竒一也而貴有老少之分以年先而時後年近而時逺耳官星得令制伏諸凶貴人扶身解脫百厄此言命中有官星貴神不忌凶神惡煞蓋邪不勝正也須得令扶身方準賦文若官失令受傷貴散漫生嗔則否煞刃兩現干頭定受言責之寄一遇刑衝歲運恐蹈不測之危煞刃為權星刑衝最忌丙臨子申戊當頭而貴擬王謝辛騎羊兔乙透出而富比陶朱貴以食神生旺言富以財星祿庫言八月官星見子辰合來暗煞假如甲生酉月為正官歲時下有子辰則會出申金斯為官煞混雜矣三春丙火逢猴鼠化作正官丙火辰土本是食神有子申會成水局非官而何此二句乃不見之形金水固聰眀有土反成頑懦土能濁水埋金故也梟食雖貧夭得財忽變亨通食神乃財源又為夀星梟印破之貧夭無疑一經財地逐去梟神凶中反吉此等命多依他人取富六乙鼠貴愛見食神六隂朝陽何妨肩劫金神帶煞入烏臺偏官帶刃居憲府金神羊刃皆惡星喜官煞制伏人命得之為除姦去弊之象故斷居此之職戊土疊臨寅宫喜財而不喜印戊寅雖坐煞實長生地也見火勿泥煞印是火蒸焦上喜財者財生偏官官為有氣耳壬水坐下陽土透煞切勿透官水固賴土止亦惡混雜也偏財見官兼食神榮華有凖身主用神或入墓進取無緣木火相照胸中萬斛珠璣金水相涵筆下千篇錦繡格見前重舉之以明其才華之卓越三刑失合破相傷軀六害多逢辜恩負義凡三刑若有合則不成刑如人爭鬬而有和解之者不然寧免此患帶六害多者為人必以薄為道空亡却損於妻子隔角難為乎兄弟空亡如甲子旬中無戌亥隔角如丑寅乃隔角方位也日時見者重壬騎龍背帶刃者類烏獲孟賁庚坐戌支火多者是邢侯雍子辰中有龍陽剛之物也更逢羊刃膂力絶人矣經云辰多好鬪戌為火庫庚日坐之再經火則煆煉太過其為無情甚矣况其中藏婁金狗此宿乃狡猾之物經云戌多好訟邢侯雍子在春秋時爭鄐田者也滿路異香富而好禮年月日時之天干見地支四位貴人者是也如壬申辛亥己巳丙寅壬以己為貴辛以寅為貴巳以申為貴丙以亥為貴也一旬和氣樂以忘憂年月日時共出一旬如甲子壬申巳巳癸酉俱出甲子旬中也歸祿愛財星見官則損夀財為養命之源歸祿之格身旺愛財直忌官星竊財氣故也正官得時令有印不如財官印固妙兩全茍無財星官失其生意印亦何用焉從革復出乎三竒血食迄千年而未艾日干庚辛地支巳酉丑或申酉戌全者乃從革之象庚日干頭再有甲戊辛日干頭再有壬癸其人死當廟食於百世矣何以言之夫金之為用也剛而其為質也固剛者義氣之發固者可久之道人之仗義者生為忠臣死必為明神矣此理可與達士論之曲直兼資乎印綬仁聲播九有以無窮曲直者木象也甲乙日主倘見地支寅卯辰或亥卯未全者是更逢印綬之相生其人必有仁心仁聞矣以理推之仁者天地生物之心於時為春於五行為木是木者有生意之物而仁者實好生之德更逢印綬則生生而不息矣得之者澤被羣生恩沾黎庶故曰仁聲播九有而無窮地天泰故斯人挺生雲雷屯則經綸顯設此指上兩格之人其生也既有所自而不虛生其出也必有所為而不空出也或云地天泰乃戊申見辛亥雲雷屯乃壬子見乙卯即妙選地天交泰雷雨迎春二格是知術數無窮實則不遺一理言辭難悉吾特舉其一隅顯微闡幽遵彼往哲引伸觸類存乎人也金鼎神祕賦育吾著人生有命得失頓殊富貴貧賤那能一體紅光滿室五行都聚於貴鄉佳氣充廬四柱並集於福地先貧後富生時值祿馬同鄉始吉終凶日時犯空破之處平生坎坷基薄與凶運交雜一世榮華命髙逢好運疊至剛金遇火方成器決定超羣旺火得水為既濟必然出衆木須金而不繁水賴土而不散戊巳見寅卯得位於勾陳壬癸坐巳午當權於元武貴神入命遇竒儀必是公卿華蓋臨時值孤寡定為僧道玉堂拜相炎炎火秀在離宫金闕朝元洋洋水德宅坎位重逢水位斷為雲水之仙纍犯純陽定作空門之子遇長生而聰眀智慧逢死敗而蒙蠢愚頑父母難靠年月俱陷空亡妻子易虧日時併臨孤寡卯酉生逢尅戰敗門户而多災子午全居死墓走他鄉而為客子午最嫌巳亥卯酉切忌寅申宅墓受煞門户多破時落天中子少合逢干頭妻多年中無氣幼而散失元基月內逢空門户消索不立日臨絶位縱妻無恙亦多離時在墓中後嗣有時也不順合地秀者貴得天時者榮五行無氣者貧四柱有傷者賤隂陽純一者孤支干刑害者疾用神休囚者難求富貴秀氣淺薄者多是藝術刑尅互見身旺定作軍徒辰戌相加有損斷為獄吏金水間慢落魄清貧之人驛馬衝擊馳驅紅塵之客魁罡重犯生於屠宰之家酉戌重逢身作奴僕之下柱中子午雙包尊居垣省命內干支一氣貴至王侯一片純陽獨尅命不死也傷滿盤印綬俱生身不貴即富年月併傷父母妻妾難為年時併傷怙恃繼嗣不保年衝日兮父母旺妻妾難存時衝年兮兒女旺父母易損破命者少失雙親破月者長尅昆季破日者一身獨立破時者老無結果破胎者母氏獨當此則論其大略尚未及乎精細先提官貴回異常流甲戊庚引至丑未貴神有氣乙丙丁出於酉亥天乙加臨巳逢坎位乙在坤方六辛喜乎寅午壬癸宜於巳卯此謂暗中得貴更看官印弱強甲逢酉位乙到坤方丙得子宫必顯丁加亥上榮昌戊見卯而能秀巳臨艮而聲揚庚到離宫得氣辛臨巽位安然壬投午上既濟癸向巳內財官此為正官正印更看祿馬朝元若無刑衝尅破必作鼎鼐神仙次論財富養命之源先看財命有氣次觀祿馬不貧木臨四季向祿自然充裕水到午上財旺必定豐隆土逢潤下金遇曲直火遭金局三合逢祿庫食神五行值天厨財氣四柱無傷日時得地身旺有氣逢財化作官星身衰失時財多翻為貧漢若居煞地多是凶徒人有公吏軍戎商賈藝術四者不同各有所居公吏之命多帶尅刑東西戰鬪南北衝擊長生處破了死絶處生起五行錯雜象不純一倒食逢財夾貴逢破財印相刑引用無氣秀中帶鬼貴氣損傷干支重會提網懸針此等之命不離公門至若帶官祿而可獲福遇貴神而可進步則又有出仕顯達者也兵卒之命與吏大同局中煞重而干支不等象內貴輕而主夲破傷甲見卯支丙臨三丁之地辛向亥地壬家二癸之鄉乙丁逢蛇戊土奔馬此乃懸針羊刃更犯尅破刑衝又帶福氣凶中有吉懸針遇吉煞相扶羊刃有貴神相助由是從行伍而有權祿自兵卒而任總戎然以煞為重則不可誣焉者也再看商賈其命何慿日時併臨子午三元都值寅申馬前無轡劫上逢財或偏財身旺復行財運或六合會財更坐馬鄉壬人運南丙人運北經營買賣之人甲人行西庚人行東貿遷有無之輩甲乙居坎犯壬癸未免萍梗他鄉元武遇亥無戊巳諒必龍斷外主至於得利不得利則專論財之旺不旺而決之也再看藝術又非商賈命遇德秀犯刑衝小道可觀時逢學堂見空亡多能可鄙乙庚化金於坎艮丁壬化木於兑乾辛丙臨乎四季戊癸居乎一宫此乃秀而不秀化而不成格局破損祿馬不全原夫秉賦聰眀多因生遇學堂至於成就淡薄乃是命無根本無根夲如水人無金火人無木之類若四柱不相往來更五行再無氣象天乙間漫華蓋疊逢不作飄蓬尋幽之士必為九流藝業之人天乙間慢如甲戊庚上半年以未為貴人不間下半年以丑為貴人不間與六壬反看再看僧道又非藝術五行在無氣之鄉十干臨死墓之地年月盡逢孤寡日時全見元辰纍犯空亡重臨華蓋妻子衰絶身旺無依火盛而身心禪定水多而自在逍遙若命合貴格而死絶心樂清虛命無貴氣而生旺性好空門月上五行恬和道行髙潔而教門增重時上五行安靜行果相輔而徒衆數多月上福神得助則善和法眷而同衣贊美日上刑衝帶煞則求化無緣而行腳飄流見煞印則當權服衆遇喪弔則苦行傷身華蓋夾貴與三竒雖云吉煞自死自絶自生旺則無吉助若生旺太過而兼帶干鬼則名利之心不忘值尅害太甚而更遇凶煞則凡俗之還不免咸池為酒色之星犯之則耽迷不檢羊刃乃凶惡之物遇之則財利是圖歲運見喪弔伏返在俗人則凶而僧道則吉元命遇孤寡亡劫在常人有妨而僧道無害古歌云兩般父母見星孤四季天上祿也無辰戌丑未加臨著多是道士及僧徒又云三合生人辰戌時定為僧道不須疑若還華蓋併臨墓囊槖豐隆定紫衣凡論僧道又當以是質之又有先貧後富先富後貧二者隔别全看月日日時生旺聚福兮晚景榮華月令有氣儲財兮早年富貴若月吉而引用多輕先富後貧日強而夲根不利先貧後富生來受蔭年月在財官之鄉末主孤寒日時犯空破之地年月逢財無氣幼年窘迫日時遇食有氣老景歡欣四柱衰微平生不遂背祿逐馬一世恓惶若夫干頭財露支內不藏傷劫實地祿馬虛浮身旺印助一生破敗不聚財身弱財多外似有餘內不足或四柱原無財官遇歲運忽然發迹似此之命有名無實又有拋鄉去井失土離家乃年尅月兮相制伏日衝時兮在子午四煞若衝身命定應逰走他鄉三限再臨死絶未免飄泊外處重重鬼害纍纍刑空運拙時乖兮别閭里而跋踄程途命蹇日衰兮辭親戚而往來岐路再論兄弟以及妻子木人春降到寅亥卯昆仲必多若生西南必少金命秋生臨巳申酉兄弟盈門若逢東地不靠水居潤下遇乾坎同氣多榮往來辰戌消灑火向炎上居離巽連枝共美到於酉亥雕零土臨四季伯叔成行若論得力不得力三元不落空亡四柱不犯孤寡青龍作子休婚白虎之妻火德成男莫娶亥子為婦水生子嗣母忌中央年合日時犯戊癸決主三妻甲逢二巳到巳午不止兩婦丙逢重辛居酉子多招寵妾庚與乙合生卯午定有偏房壬逢重丁在巳酉重婚别室陽合隂盛妻雙立陽合隂衰妻再娶又有子多榮貴亦有子少愚頑是理何説要當詳論金居離位逢炎火兒孫滿前火臨坎戶遇順下後代克昌木逢庚辛到巳申土生甲乙見寅卯水臨四季喜見戊巳時日生逢無尅制子孫多榮官煞重逢見財生嗣繼必貴若夫日臨衰墓死敗男女須傷時犯空亡有尅兒孫必少木為後代忌逢申午之方火若為男休逢酉亥之地金為子位怕見坎寅水作男宫忌見卯巳土為後嗣怕臨震東男取尅干為嗣女取干生為子四柱歸於敗絶五行都在傷官雖有干支暗合也須螟蛉作嗣縱有偏出實難定姓古有借妻安子其理甚玄木兒見鬼得北方坎女多存水子遇煞賴西方兑妻可養水制火男借青龍為妳母木損土兒覓朱雀為繼娘五行有損須借相生四柱雖尅亦多無害若不借母安子豈能後嗣不乏至論女命最怕刑夫日生木蛇難成婚配之期已用金雞定是失夫之婦土為夫壻寅卯多寡木作婚期離宫須害再犯孤鸞尤甚更遇八專何説至於為婦清潔生而不犯貴合若要秉性堅貞長而不逢煞傷丁壬無氣必犯娼淫戊癸休囚多有濁濫四柱祿合三元純一日時有合有夫不離私情桃花劫煞五行居墓財祿沐浴背夫别成暗約隂遇陽干合多不娼即妓比劫分爭身弱匪妾即奴至有五行失位四柱休囚十干上下交戰運行無氣空亡三元在沐浴之中五行居死墓之地生為奴婢將誰怨尤間有命犯倒食而無食能與别人作福偏財遇比而身旺甘為富家幹僕男子舍居異姓入贅金居金位遇卯寅木到木鄉逢丑未日時犯月鬼破門丙寅别祖宗入墓魁罡臨命見華蓋一生就妻為活丑未重犯遇寡宿半世從婦入舍四柱往來有情携手為婚三元重犯隂合不媒作室陽衰隂旺女招别姓子為男命配成婚休敗尅滯後看相生多招外壻支多尅滯定應知汝波濤下上無生一户豈能堅守身如顯化自無氣本姓全虧若是假合别成象孤兒異姓平生窘迫豈能得祖宗之財若得興豐因托别房父母此只論其大槩尚未得其精微命之理微悟在心得若夫疾病死絶貧賤凶惡歲運晦顯各有道理已著以前兹不重賦元機賦太極判為天地一氣分有隂陽日干為主專論財官月支取格乃分貴賤有格不正者敗無格有用者成有官莫尋格局有格不喜官星官印財食無破清髙煞傷梟刃用之最吉善惡相交喜去惡而崇善吉凶混雜忌害吉而向凶有官有煞宜身旺制煞為竒有煞有印畏財興助煞為禍身強煞淺煞運無妨煞重身輕制鄉為福身旺印多喜行財地財多身弱畏入財鄉男逢比劫傷官尅妻害子女犯傷官偏印喪子刑夫幼失雙親財星太重為人孤尅身旺無依年衝月令離祖成家日被提衝弦斷再續時日對衝傷妻尅子日通月氣得祖安身是以木歸春長遇庚辛反假為權火居夏生見壬癸能為福厚土逢辰戌丑未木重成名金生申酉巳丑火鄉發福水居亥子戊巳難侵身坐休囚平生未濟身旺者喜行祿馬身弱者忌見財官得時俱為旺論失令更作衰看四柱無根得時為旺日干無氣遇劫為強身弱喜印主旺宜官甲乙秋生金透露水木火運榮昌丙丁冬降水汪洋火土木方貴顯戊巳春生西南方有救庚辛夏長水土運無妨壬癸逢於土旺金木宜榮身弱有印煞旺無妨身強煞淺用財亦可身強用財宜有煞身弱用印宜去財傷官身弱無印何所依賴身旺無財將何發福身旺者用財身弱者用印用財去印用印去財方發彌福正所謂喜者存之憎者去也財多身弱身旺運以為榮身旺財衰財旺鄉而發福重犯官星只宜制伏食神疊至須忌官鄉頑金無火大用不成強木無金清名難著木多得土財帛厚火熖逢水官爵榮有官有印無破為榮無印無官有格取貴羊刃不畏偏官金神最宜制伏雜氣財官刑衝則發官財太盛旺處必傾身太旺喜見財官主太柔不宜祿馬旺官旺印與旺財入墓有禍傷官食神併身旺遇庫興災運貴在於支取歲重向乎干求印多者行財而發財旺者遇比無妨格清局正富貴榮華印旺官明聲名特達合官非為貴取合煞莫作凶推桃花帶煞喜淫奔華蓋重逢多尅剝平生不發八字休囚一世無權身衰遇鬼身旺則宜泄宜傷身衰則喜扶喜助務稟中和之氣莫令太過不及若遵此法推詳禍福驗如影響絡繹賦恭造化之元機測五行之妙理判人命之得失決一世之榮枯法則取於日干興衰論乎月支甲乙屬木最喜春生壬癸屬水偏宜冬旺丙丁火而夏眀庚辛金而秋鋭戊巳兩干之土要旺四季之期日乃自身須究強弱年為夲主宜細推詳年干父兮支母日干巳兮支妻月干兄兮支弟時支女兮干兒後煞尅年父母早喪前煞尅後子息必虧馬入妻宫必得能家之婦煞臨子位當招悖逆之兒祿入妻宫食妻之祿印臨子位受子之榮梟居祖位破祖之基財官月旺得父資財所忌財傷祿薄最嫌鬼旺身衰食神暗見人物豐肥梟印重生祖財漂蕩咸池財露主淫奢凶煞合年防自刃桃花重帶合神花街栁巷驛馬若逢衝物暮楚朝秦金火交爭斷無禮義印財兩失少損爺娘桃花會祿酒色亡身財旺梟衰因財喪命身臨沐浴之年恐遭水厄主入戰鬭之地必逢火傷財生官者用賄求官財壞印者貪財卸職財旺生官白身榮顯財生煞黨天折童年獨煞衝破廢間人諸煞逢刑凶狠輩天干多煞遇干年須當夭折地支多鬼遇支年必見凶災財生官官生印印生身富貴雙全傷黨財財黨煞煞尅身凶窮兩逼酉寅刑害繼傷婚己卯風雷多性急煞官混逢乃技藝之流財祿坐馬為經商之客馬落空亡遷居漂泊祿遭衝破離鄉萍梗隂多利於女人陽盛宜於男子隂盛於陽女主興家陽盛於隂男當建府純陽男必孤寡純隂女必困窮官貴生年化凶煞而名垂萬古胞胎臨日遇印綬而祿享千鐘一氣為根秀出羣英之表兩干不雜名出衆彥之先木秀火眀擬作鹽梅調鼎客水深土厚當為舟楫巨川才命元生煞進身旺必主加權臨官歲遇值貴人重宜進秩傷官最要去官盡制煞無如化煞髙倘若化神弱制神強施恩有不足之怨化神旺制神衰臨事無決斷之能有煞無印欠文彩有印無煞少威風煞印兩全文武兼備衰運發而旺運止旺運發而衰運終此乃春秋代謝天運循環萬古不易之理也金玉賦搜尋八字專論財官次究五行須求氣候論財官之向背重輕察氣候之淺深生死他來尅我為官鬼身旺必權我去尅他為妻財干強則富年傷日主乃父與子而不親時尅日辰是子不遵於父命年尅日兮上能凌下日尅年兮下去犯上若得有物制日干則可化惡為祥更要本主逢喜神則將變凶為吉喜神慶會當知資産豐隆四柱無情定見禍端並作或見本主相衝三刑重疊歲運欺凌必招橫事純粹五行入格臺閣風清身強七煞逢伏藩垣鎮守無財官而有格局青雲得路無格局而有財官黃甲成名財官格局俱損不貧寒乃功名蹭蹬之夫日干月令俱強非困窮必草茅隱逸之士丙丁坐南離而無制是不遵禮法凶暴之徒壬癸遇戊巳之相應乃懷德抱材聰慧之士辛逢乙木於南墓雖富而不仁丙逢辛金於北鎮縱貧而有德年月時令有偏印吉凶未萌大運歲君逢夀星災殃立至幼年失乳食神遭刑尅之宫壯歲峥嶸財官居純粹之位陽日食神得地無衝損則暗合官星隂日食神無破虧須契合則身親印綬偏財能益算延年羊刃善奪財化鬼財星有破棄祖風别立他鄉印綬被傷失祖業拋離故里人命以貴神為福遭尅陷則凶禍不祥五行會凶曜為災逢合煞併食神為貴命虧煞旺要天赦二德呈祥身弱財豐喜羊刃兄弟為助月令值食神健旺善飲食而姿質豐盈四柱有吉曜相扶堆金積玉五行無凶煞侵犯名顯聲揚寅申己亥疊犯有聰眀生發之心子午卯酉重逢耽酒色荒淫之志桃花帶煞心意猖狂二德逢印德性慈祥食神多而好貪飲食正官旺而略沾滋味梟神興早年夭折爵星旺老夀彌髙要知女命難婚定入背夫之位欲識男兒早娶定是運合財鄉子尅重重煞沒官衰傷食重傷妻疊疊財輕身旺兄弟多若不如斯定是刑衝妻妾位暗合財星妻妾衆虛朝財位主妻多財星入墓必定刑妻支下伏財偏房寵妾妻星眀朗喬木相求大運流年三合財鄉必主紅鸞吉兆或臨財敗之官家資凌替傷妻損妾婚配難成妻星夫位在何宫要求端的官祿天厨居甚位須察根源有格局純粹忽遇惡物相衝亦主死亡有財祿淺薄或逢歲運旺相亦當驟發日求升合食神旺處劫財多生來貧夭財食得地梟印重官弱煞強無制則夭日衰財重黨煞則窮更看歲運何凶何吉寅申巳亥互依倚不遷徙必出他鄉乾坤艮巽遇互換好馳騁心無定主柱中若逢華蓋遇二德乃清貴之人官星七煞或落空亡在九流任虛間之職五行尅戰非傷日主不為災歲運併臨若損用神必有禍財星入墓少許刑衝必發傷官傷盡或見官星則凶有十八格當從善惡推求總係五行各取衰旺消息身旺何勞印綬干衰不喜財官中和為福偏黨為禍但見貴神朝拱祿馬飛天遙合虛格不得刑衝逢合皆忌七煞官星各嫌羈絆填實則凶忽然運到官鄉當以退身避職馬疲官破困守窮途祿旺財豐峥嶸仕路如臨喜處以得禍是三合而隱凶星或逢凶處而返祥乃九宫而露吉曜要知職品髙低當求運神向背清竒則早歲成名玷缺則晚年得地津路通亨權髙爵顯程途偃蹇祿薄官卑推尋子位先看妻宫死絶者嫡庶難存太旺者别門求覓子星顯露子息必多刑害嗣宫男女罕得若問兄弟多寡細簡四柱干支月令雖強更看運神向背死絶刑傷鴈行失序相生慶會棣萼聮榮兄弟身旺父母有虧財帛宫多母年早喪若見官鬼出見母反長年如逢脫氣排連父還有夀壬臨午位癸坐巳宫稟中和兮祿馬同鄉遇休囚也胎元絶地丙臨申位庚坐燕寅巳入巽乾乙臨雙女金乘火位甲坐坤宫名曰休囚最嫌尅制七煞忌逢言喪魄夀星欣遇曰還魂天命能施智力難出綱維造化隂功可奪貧寒將盡能令白屋出公卿奢侈大過還使朱門生餓殍家資將費定生不肖之兒男婚媾自刑必娶無夀之妻妾四官背祿不可妄求官將不成財當見費八字無財須要本分越外若貪必招凶事噫甘貧養拙非原憲之無才鼓腹吹簫豈伍員之挫志莫非命也要當順之而已心鏡五七賦人生富貴皆前定術世須詳論天上星辰有可加此説更無差時加月建逢命位正是福原地夀元合處是其真此説不虛陳官祿貴馬見台形一舉便成名三干相連日逢貴地見祿馬壯歲登科甲時日若逢夾祿位為官必清貴五行時日無相雜為官多顯達羊刃重重又見煞大貴登科甲若逢三竒連祿馬名譽揚天下日坐食支又合干九卿三公看甲子巳巳又一説天地德合訣丙子癸巳與前同官職拜三公木若逢金主不傷兩府坐中堂火若遇水主將權為將鎮戎邉金若逢火主大權方靣刺史官水若逢土入官局宜作侍從職土若得木為正祿八座三台福年得月祿不為喜日貴取為主生逢貴人值孤寡決定為僧也空亡官祿遇貴人緇衣作髙僧五行無氣守孤寡必定作行者空亡刑害又逢囚為僧及裹頭欲知人命主有權食神旺必全相刑羊刃並煞傷必主上法場的煞若逢盤足坐惡鬼死刑獄日支自坐為盤足夾角相逢共歲星徒流定分眀六害當權逢刃煞少年多夭折日逢官鬼見重刑惡死甚堪驚刃神劫煞兩頭居早歲夢天衢祿馬俱逢行絶地勞困難逃避月若逢時與刑衝根基定一空時遇官星生旺位子孫成行隊向祿臨財官更吉貴顯有家資日月純官無財位反主無官貴卯刑子位子刑卯癸乙相生撓未來刑丑丑刑戌戌刑未同律祿馬尅生主發財人元尅出來甲乙見寅卯祿馬皆絶甲申乙酉不在此論得一分三緣何説飛天祿馬格歲合時日分兩頭切須仔細求君子若逢利奏對常人主災晦心懷悔退緣何事重犯剝官位柱中有祿運逢財金玉自天來前言能説貴與賤亦須看運限大凡行運逢祿馬發迹為官也天月二德為救神百災不為凶向祿臨財甚希竒貴顯有官資命中祿馬同貴人福祿進珠珍貴人君子坐刑煞名成少年發隂陽貴賤宜消息熟曉在胸臆日時身命許多般一訣千變看造微論兩儀肇闢六甲攸生將三元而作三才建四時而為四柱干為祿夲定一生職位髙低支作命基布三限夀元終始年生為根月建為苖日管經營斷中年之休咎時為結果定晚歲之榮枯先推胎息之由次入變通之道為官為貴緣上下以咸和多滯多危本根元而相尅是故格清局正當為臺閣之臣印旺官生必秉鈞衡之任馬頭帶劔威鎮邉疆印綬逢華尊居翰苑祿雖多而有害福不為祥煞雖重而無傷凶不為禍三竒弗遇才髙難解成名六合正逢家富又能增業空亡親於寡宿孤獨躘踵長生陷於空亡貧寒偃蹇桃花若逢帝座因色亡身咸池更會日宫緣妻致富根元淺薄逢生旺而不榮本主興隆遇休囚而反吉羊刃臨於五鬼定須重犯徒流勾絞疊於三刑應是頻遭編配是以登仕途者莫逢吞啖爵祿虧停當兵權者勿遇天中身權退失胸襟澄徹蓋因水濟江湖學問淵源本是水居壬癸慈祥愷悌木乘甲乙之鄉焦燥暴惡火盛丙丁之地名髙祿重乾金早會庚辛貫朽粟陳鎮土重親戊巳木繁而無金斫削縱榮而末歲孤窮火炎而無水陶鎔雖發而早年夭折學若水之浮泛惟慿土以隄防土重而無木疏通遂歸愚濁金堅而無火煆鍊終是凶頑至若金脆火炎多則損巳木柔金重利則傷身水清不假土多土弱不禁木盛火強燥而微眇水既濟以寬和須將勻配為佳亦以均調為上大顯者貴乎深隱大屈者貴乎卑伸夀永年髙皆是祿臨帝旺職崇位顯為緣馬會官星華蓋逢空偏宜僧道學堂遇貴惟利師儒五行若也蕭索三命因而低弱日逢空寡其妻多致生離時值空虛其子縱有不肖絶宫為鼓盆之煞胎宫為白虎之神天空臨嗣續之官永歲損成家之子運逢吉宿無本主則未足歡娛限守凶神有根苗則不須畏懼歲君若臨惡弱一歲迍邅生時若遇休囚一生愁嘆源清者其流必逺本濁者所作無成八字超羣不貴即當大富五行駁雜居安可不慮危休囚者身性卑微旺相者名利壯實先強後弱必先吉而後凶始弱終強亦始凶而終吉乃若初逢貴吉未可便作貴推中遇凶強豈可便作凶兆大抵文貴要長生之地刑煞宜死絶之宫是以當憂不憂聞喜不喜詳其本末察其盈虛榮辱窮通不言而喻吉凶悔吝可考而知名曰造微豈云小補人鑑論洪濛肇判甲子攸生二十二字之用無窮百萬千人之命可考日生為主年長為君先論根本虛實次論歲運強弱森列三才妙在權衡輕重包羅八卦自存規矩方圓天道尚有盈虧人事豈無反覆或始貧而終富或先敗而後興當捨短而從長勿取彼而棄此四柱俱嫌一字大醇亦求小疵詳察其源勿輕以斷官在祿鄉伊尹負阿衡之位時居貴地傅説興作相之臣生逢貴格入仕為臺閣之尊重遇鬼局樂道有山林之興是知居官居貴五行醇而不疵多滯多憂八字雜而又戰根甘裔苦賈誼屈於長沙源濁流清太公興於渭水祿馬同鄉而會登台鼎煞印重旺而早入科名比肩重遇宜嗟范子之貧印綬疊逢可比老彭之夀夾官夾貴日時值而峻宇雕梁劫財奪馬歲時逢而蓬門甕牖嗣位逢尅絶鵲之巢而鳩之居妻位犯煞傷鸞之孤而鵠之寡運行背祿昔日富而今日貧命遇旺財昨日悲而今日笑四柱坐學堂之上回也不愚三元助墓庫之中子之好學年傷官貴才髙那解成名時值偏官家富又添好子庚行丙地禱爾于祗壬入戊鄉胡不遄死伯牛有疾緣戰尅以交差司馬何憂蓋比和而無位身中衰弱逢吉運以為凶命坐堅實遇禍年而反福煞雖重而多合何傷日月之眀祿雖顯而有失難際風雲之會遇而不遇庚辛在壬癸之鄉憂而不憂甲乙行丙丁之地或若生逢絶敗鄭谷歸耕祿馬病衰馮唐皓首九官旺相難逃邀我於桑中四柱合和未免題詩於葉上西施貌美自身多帶長生緑珠墜樓凶惡又逢七煞孤鸞入命夫哭婦而婦哭夫煙花絆身女求男而男求女頭目陷而肢體相虧財帛耗而田宅有害生時若遇刑衝一生屢空歲月若臨劫奪百歲孤寒財入財窠不貴即當大富煞居太歲居安可不慮危乃若官星透露未可便作貴推煞星下攻曷可便為凶斷大抵貴祿喜逢於印綬刑煞宜值於制合是以當憂不憂聞喜不喜考其根而明其實論其始而究其終是以妻宫有尅少年無早娶之人兒位逢傷末歲損成家之子平生不吉而夀算椿松財祿帶多而福姿蒲桞源清者其流必逺本壯者其葉必榮三命冠羣不至貴即當大富九宫陷溺怕凶運又怕凶年千條萬緒當求不見之形百𣲖一源貴得彌身之地詳陳夲末􅍯察盈虧後之君子幸勿忽諸元妙論一名碧淵賦一名千里馬嘗聞分二氣以定三才播四時而成萬物人命榮枯得失盡在五行生尅之中富貴榮華不越八字中和之外先觀節氣之淺深次看財官之向背凡人命內難得實有財官余觀格中只要虛邀祿馬先賢已有成式後學須要變通太過無尅制者貧賤不及失生扶者刑夭宜向之而運背決知貧賤宜背之而運向定是困窮喜生而逢生貴而可取愛尅而受尅吉而堪言木盛逢金斷作棟梁之任水多遇土妙為堤岸之功火煉秋金鑄出劔鋒之器木疏季土培成稼穡之禾火炎有水名為既濟之佳水淺金多號曰體全之象亥卯未逢於甲乙富貴無疑寅午戌逢於丙丁榮華有準庚辛局全巳酉丑位重權髙壬癸格得申子辰祿優財足戊巳局全四季榮冠諸曹更值德秀三竒名揚四嶽木全寅卯辰之方功名自有金備申酉戌之地富貴無虧水歸亥子丑之源利名之客火臨巳午未之域顯達之人木旺宜火之交輝秋闈可試金堅愛水之相涵文學堪誇用火愁水用木怕金春木重重休為太旺無依夏火炎炎莫作太燥有􅐦秋金鋭鋭最為奇冬水洋洋專可美生我扶我為忌尅我制我有功五行有配曰化曰治曰和四柱無情為亂為傷為禍合中逢戰如大治之遇亂離死地逢生若極否更以盛世一治一亂柱中滚浪刑衝乍旺乍衰命裏交橫破害劉蕡不第只因文學年衰李廣非侯蓋為人強馬劣欲知平生貴賤當推科甲之星要問職分髙低細察財官之位求官未就衝傷命貴便登科功名已成不可覆臨傷以破魁勝官則終身不第官勝印而唾手成名木相火眀此輩宜登甲第金寒水冷斯人終是貧寒胎元日主提綱印旺奪魁元聚貴歲苗髙坐玉堂榮翰苑病乃魁星病去方能成就文為甲首官來始見升騰元武格而比劫多太乙玉堂真甲第朱雀賦而食神旺官年四歲擬登科比肩多見官煞印是魁星合歲衝官及第官煞重遇印傷便是甲宿食年印歲題名木魁若臨年月旺狀頭解首屬斯人火宿如值歲干炎甲膀狀元歸此輩數科不第只因財破文書一舉成名乃是魁星帶甲五行消長皆因鬼以成功四柱興隆若無病而不貴雖用鬼病為竒終是去之為福更尋三合祿馬之年須看玉堂天乙之歲丙丁生於冬月貴於戊巳當頭庚辛産在夏間妙乎壬癸得局甲乙秋生貴宜元武庚辛夏長妙用勾陳丙丁水多嫌北地逢戊巳反作貴推庚辛火盛怕南方遇戊巳翻為貴斷甲乙秋生透丙丁莫作傷看戊巳夏産露庚辛當為貴論火帶水多貴行木運土逢木旺榮入火鄉庚逢水重水冷金寒最喜炎熱戊遇酉多身衰氣脫偏愛熒煌不及要生扶太過宜剝削青龍全從革之金且貧且賤白虎備潤下之水曰富曰榮春木多而水淺補衲之僧夏火炎而金衰簮冠之道勾陳局全潤下奔波之徒朱雀三合元武困弱之輩金堅火弱行商販賣之人土敗水凝破祖淹留之客金生秋月土重重貧無寸鐡火長夏天金疊疊富有千鍾春木專遇水多貧賤之流冬水獨逢金盛寒弱之輩辰戌丑未遇刑衝無人不發子午卯酉帶刑合犯者多淫夏金疊火秋水重金太偏黨非貧即賤春金多火冬水盛金無制伏不天則貧秋木無根從婦福祿貴崇髙夏金失地配夫榮功名顯達火向春林逢木旺好去求名土臨季地見金多堪來出仕甲乙夏榮土星厚功名半喜足田莊丙丁冬盛水源清爵祿全欣榮錦繡專祿帶食傷權持外閫羊刃入官煞威鎮邉疆拱祿拱貴夾丘爵祿豐饒倒衝遙合欄義功名顯達壬趨艮而甲趨乾清名之士辛朝陽而乙鼠貴文學之官局全風虎良將之材柱備雲龍大人之德四庫全備龍變化逢大海為九五之尊三竒局秀鳳騰翔遇天門乃臺閣之貴旺財官之貴富暗祿馬以榮華入格以貴而推破局不貴而斷究一理而