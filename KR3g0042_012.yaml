鄉有救見土刑身巳日月戌火神無氣多水多金眼昏目閉年干會火日時會金巳干用印官徹名清秋金生午丙火透露運至南方血傷泉路金旺三秋二庚火丙到丑傷情逢離順境庚金生午辛金生未透煞兩停冬生最貴辛金月辰庚金丑庫逆數清孤順行豪富辛逢卯日年月見酉時帶朝陽為僧道醜辛金亥日月逢臨戌水運初行須防目疾辛金坐酉財官用印順行南方名利必振辛金坐巳官印用月順行南方貴顯榮福酉金逢離透土何慮無土傷身夀元不住月生四季日主庚辛何愁主弱旺地成名辛金逢火見土成刑陽金遇火透土成名壬生午位祿馬同鄉重重遇火格局髙強壬癸多金生於酉申土旺則貴水旺則貧癸向巳宫財官拘印運至南方利名必振癸日己亥煞財透露地合傷官有勞無富癸日申提卯亥歲時年煞月劫林下孤恓癸日干巳陰煞重逢無官相混名利必通傷官之格女人最忌帶印帶財反為富貴煞多有制女人必貴官星重犯濁濫淫類官星桃花福德堪誇煞星桃花朝劫暮巴庚日申時柱中金局支無會合傷官劫妻癸日寅提壬日亥日莫犯提綱禍福難推甲日乾提見煞喜比金水栽根忌寅卯未戊巳丑月比肩透出疊運入局忌逢午未壬癸坎宫支逢午戌干頭比肩東行為吉甲乙震宫卯多須夭逆順運行子申發福庚辛巳月金生火旺比劫栽根兩行成象丙丁酉月比肩不忌火入離宫比肩一例曲直丑月帶印多金壬癸丑月土厚金清金神生旺勝似財官濁之則賤清之則垣身弱陽木無根生於丑月水多轉貴金多則折乙木無根生臨丑月金多轉貴火土則折丙火無根子申全見無制無生此身貧賤六甲坐申三重見子運至北方須防橫死丙臨申位陽水大忌有制身強旺成名利巳入亥宫怕逢隂木月逢印生自然成福巳日逢煞印旺財伏運轉東南貴髙財足壬寅壬戌陽土透出不混官星福崇顯祿隂水無根火鄉有貴陽水無根火鄉即畏丁酉隂柔不愁多水比肩透露格中最忌戊寅日主何愁煞旺露火成名水來漂蕩庚午日主支火炎炎見土取貴見水為嫌辛未身弱卯提取格癸酉身弱見財害格癸巳無根火土重見透財名利露根則賤辛酉八月未時受生人命遇此平生多凶棄命甲乙無根怕逢申酉煞合逢之雙目定瞽乙木酉月見水為竒有根丑絶無根是宜乙木坐酉庚丁透出遇庫歸根孤神得失丙火申提無根從煞有根南旺脫根夀促陽火無根水鄉必忌隂火無根水鄉必救隂火酉月棄命就財北行入格南走為災戊巳亥月身弱為棄卯月同推嫌根劫比庚金無根寅宫火局南方有貴須防夀促辛巳隂柔水囚官煞運限加金聰眀發達壬日戌提癸干未月運喜東方逢衝則絶棄命就財須要會財棄命從煞須要會煞從財忌煞從煞喜財會逢根氣會損無猜此法元元識得神仙學者實授千金莫傳五言獨步有病方為貴無傷不是竒格中如去病財祿喜相隨寅卯多金丑貧富髙低走南地怕逢申北方休見酉建祿生提月財官喜透天不宜身再旺惟喜茂財源土厚多逢火歸金旺遇秋冬天水木泛名利總虛浮甲乙生居卯金多返吉祥不宜重見煞火地得衣糧火忌西方酉金沉怕水鄉木神休見午水到卯宫傷土宿休行亥臨宫在巳宫南方根有旺西北莫相逢隂日朝陽格無根月建辰西方還有貴干怕火來侵乙木生居酉莫逢全己丑富貴坎離宫貧窮坤艮守有煞只論煞無煞方論用只要去煞星不怕提綱重甲乙若逢申煞印暗相生木旺金逢旺冠袍必挂身丙火怕重逢北方返有功雖然宜見水猶恐對提衝八月官星旺甲逢秋氣深財官兼有助名利自然亨曲直生春月庚辛干上逢南離推富貴坎地却猶凶甲乙生三月庚辛戌未存丑宫壬癸位何慮見無根木茂宜金火身衰鬼作關時分西與北輕重辨東南時上胞胎格月逢印綬通煞官行運助職位至三公二子不衝午二寅不衝申二午不衝子二申不衝寅得一分三格財官印綬全運中逢尅破一命喪黃泉進氣死不死退氣生不生終年無發旺猶忌少年刑時上偏財格干頭忌比肩月生身主旺貴氣福重深時上一位貴藏在支中是日主要剛強名利方有氣運行十載數上下五年分先看流年歲深知來往旬三命通會卷十二
