body:
  text: 三命通㑹卷八明萬民英撰六甲日甲子時斷以下所忌月分與時同斷六甲日生甲子時敗中印綬官生至月通木氣不尋常反此而言虛名利甲日甲子時雖甲敗在子暗有癸水生氣印綬兼有官生其印若巳土破印通月氣貴否則秀而不實甲子日甲子時子遙巳格年月無庚辛申酉丑絆午衝離祖自立貴若年月俱寅逢申酉運大富後退財子亥卯未年月行西運貴甲辰月亦貴酉月只以正官格論大貴己午戌月平常午月甲死子衝尤不吉乙卯乙巳月主法死庚子樊繼祖尚書謫戌己卯戊子行人己丑戊午進士丙辰己未進士乙亥甲戌解元丁卯己巳丞相乙亥甲寅少保甲戌丁酉郎中壬子庚寅郎中癸未己酉陳大道丙戌進士丁卯府尹楚人戊子通判辛酉以上俱以日時為主而以人命年月附之其有官銜不同者此前代命也下同甲寅日甲子時拱丑中辛貴年月無庚辛申酉丑未大貴再甲寅月孤尅惟僧道可亥子年月四品貴午月行東北方運亦貴如酉丑巳等月明有官煞柱但有印俱貴卯未身太旺未免刑傷乙巳月受刑丁亥月旺中惡死壬寅尚書甲辰乙亥侯丙戌辛亥少恭辛丑甲戌府尹丁丑戊子傳行簡狀元甲寅戊子元戎癸亥己巳御史丙子壬寅郎中甲辰庚寅太尉戊子甲辰日甲子時若水位年月水泛木浮主移根換葉申月煞星㑹印俱貴子月行水木運亦貴酉月正官大貴寅午戌月俱吉乙卯月刑折癸巳月水火中死癸亥月凶死壬辰布政辛亥庚辰布政庚午年卒戊子庚子憲副壬午壬寅妓壬寅甲午日甲子時時日併衝憂傷妻子月通木氣者顯貴純子午年月或亥未酉月俱貴一云髙一云身孤有財清貴有名乙巳月破祖夭乙亥月自刑刃死癸亥月旺中惡死己未李彌綸學士庚午丙戌張四維閣老甲午癸巳許讚尚書入閣庚申中州人戊戌陳蕖尚書楚人壬戌甲午張孟男尚書丁卯中州人己酉明帝天啓壬申丁酉布政壬子甲申日甲子時甲胎逢印印化煞貴鴛鴦重疊子嗣難為若東南方運文武職居閒亥卯未辰申丑等月俱貴乙卯月夭丁巳月死不全尸己亥憲副丙子癸酉翰林甲子學士丙申舉人庚寅癸亥郡王乙卯癸亥李剛丞相己未甲子學士乙亥庚申張我續總督尚書壽丙戌八旬外北直人甲戌日甲子時拱亥天門㑹同帝闕甲長生地也不可以隔角論年月通申巳酉丑金氣大貴戊寅年月主聾啞或狼虎傷害見壬則吉乙卯月刑死乙亥月遭盜死以上六日年月喜忌當通融活看下同己巳謝遷閣老丁丑丁丑王讓侍壬寅郎孫侍講命同戊辰少參乙丑己酉評事乙亥戊戌孫錝常少浙人甲寅癸卯都督浙人癸亥甲干遙祿局一朝時運至白玉出沉泥自有貴人提甲子相逢甲子連擬作蟾宫折桂仙丑絆併衝官鬼破功名蹭蹬不周全甲子時逢甲子就中印綬符同庚申辛酉若相逢丑未再兼年月拱貴暗藏極顯己午衝破平中果無刑尅與空衝定主超羣出衆六甲日乙丑時斷以下六甲日所忌月同上時忌並論六甲日生時乙丑劫財羊刃不宜有柱中逢火帶辛金制伏和平貴亦久甲日乙丑時辛金為官巳土為財丑中暗巳被明乙劫奪乙丑金神若年日時合成火局得制伏主德性純和而貴無火凶狠如合水局凶惡損家甲子日乙丑時連珠得合妻賢子貴春月身旺財帛破散夏月甲衰金神有制貴秋生近侍之貴丑月最吉亥子多凶癸亥元戎癸亥庚辰尚書壬午丙子進士辛丑壬戌舉人己酉乙丑富而無子丁亥己未朱國祚狀元閣老癸酉浙人甲寅日乙丑時春貧秋貴冬富夏火制金神吉壬申汪集侍郎己酉戊子侍郎甲寅乙丑侍郎壬午甲辰日乙丑時主富厚有財通火氣年月貴一云主血癸亥胡柏泉尚書名臣癸亥丙辰平章辛丑丁巳陳邦瞻侍郎癸丑江西人甲午日乙丑時金神入火局身弱貧夭寅戌㑹火是一木疊逢火位不吉若單寅單戌或申酉亥月四五品貴乙亥憲副壬午乙卯郎中甲申己酉舉人癸酉丁亥舉人壬寅戊戌趙世卿尚書壬戌一命同刑傷壬戌史學遷學院庚戌山西人甲申日乙丑時帶疾平常子月生南方運貴秋生化煞天干透印綬尤貴甲午王一鶚都憲壬申乙酉元戎戊子乙巳進士乙酉丙午巨冦戊戌乙巳陳長祚尚書丁亥甲戌日乙丑時田連阡陌貫朽粟陳但未免先刑寅年月父子俱顯子月西方運金紫乙亥陳瑞尚書乙酉丙戌王宗沐妻夫子五壬辰進士庚寅王三重巡撫丙戌江西人甲戌楊一清閣老無子甲戌丁未周嘉謨冢宰戊申楚人丑為金鎖局柱逢寅午戌無鑰不能通火制始成功劫財羊刃忌時垣宫內財官鎖閉門辰未相逢為大吉如無隨意度晨昏甲日時逢乙丑庫中金玉收藏貴人天乙劫財傷皎月雲遮光蕩火局南方運貴金神制伏相當木枯水盛且平常背祖離鄉晚旺六甲日丙寅時斷六甲日生時丙寅時居日祿坐食神旺壬不見無刑破福壽康寧富貴人甲日丙寅時甲木寅上健旺丙為食神壽星得地柱無壬奪癸尅通火木月氣者貴忌見官星及申衝祿甲子日丙寅時日祿居時青雲得路年月無庚辛金貴通木火氣極貴午月行東北方運五六品貴申月歸祿逢煞主大權貴水局平常若年月與日時同大貴一云遷徙之命己未韓琦丞相壬申辛卯都憲己亥庚申少參壬午富丙午布政癸巳甲辰主政庚午丁巳御史戊申乙未太守乙酉甲寅徐狀丁卯元戊子舉人乙卯庚子御史己卯甲子徐一鳴元戎乙亥江南人庚寅張成內官丁亥丁丑謝紹芳舉人御史壬子閩人乙亥熊文燦總制辛巳以法死甲寅日丙寅時年月無己酉辛丑字是歸祿格位至一二品純木火帶土富貴雙全六卿之職丙子及亥未卯月四五品貴行西南方運最吉亦有酉丑月貴者看干透及年何如己亥王大用都憲丁丑丁未聶豹尚書講學壬寅無子己未都督己巳戊寅大恭丙辰甲寅樞密丙寅癸未張鹵都憲己未丙寅翁愈祥吏部壬辰江南人甲辰胡雪田進士癸酉甲辰日丙寅時龍虎拱門又龍吟虎嘯主貴或一生近貴財源或得或失名利既濟未濟未寅年月官至六卿戌月風憲酉月三品子亥丑月四五品行西方運大貴卯巳年月平常神白經云化木主貴庚辰孫忠烈公燧死戊子寧王之難甲申靳貴閣老丙寅己卯侍郎癸酉壬申大恭己酉辛酉舉人丁酉癸酉舉人癸亥辛巳曹大章丙午癸丑科㑹元榜眼江南人乙未一富商命同戊子莊奇顯丙午癸丑甲寅科榜眼閩人甲午日丙寅時身居絶地主平若通水月木得滋養吉火月壽夭天干比助無妨甲子名將庚午丙戌元戎戊戌凶壬戌王堯日給諫甲辰丙午大恭癸巳己亥進士丙寅壬子少卿甲午甲子通判甲戌庚戌錢若賡進士太守係獄戊寅以子科第得免丁未貧夭丙午乙酉瞽目丙戌甲申日丙寅時時日併衝憂傷妻子若年月日同大貴己亥二三品辰子年月㑹水以煞化印吉未月財庫亦吉丁卯溫景葵舉人都憲辛亥甲申喬宇冡宰丙寅壬子進士壬子戊寅進士癸亥壬辰太守丁未丙申樞密庚子丙子黃承昊兩司丁酉浙人甲子安遠侯乙亥庚子吳中行翰林丁丑建言廷杖庚辰癸官八子江南人丁未太守甲申甲寅陸長庚丁丑人己巳錢䇿少卿南人丙寅甲戌日丙寅時年月有土則富有金反復如有金須生亥子印月方貴餘月則否神白經云火木化主厚福厚福己丑內官丙子壬辰倚頓財命有氣奈辰戌相虧寅戊申申相衝故先富後貧甲戌憲副丁丑丁酉林聰尚書辛亥壬申大恭壬子戊午富壬戌癸酉雙瞽凶死乙丑甲子瞽一目貧丙寅己巳王象恆蘇撫丙寅山東人庚午袁中道南銓壬午癸未申為憲兩司甲子甲戌崔呈秀尚書凶終辛未日祿歸時局刑衝通不遇無官始是竒富貴莫猜疑甲丙相邀入虎鄉福星坐祿顯文章運逢四柱無傷害早晚升遷到憲堂甲子寅時遇丙學文福祿班齊若逢辰戌兩三妻祿主朝元富貴丁午庚申减福無官惹絆為竒生來貴顯有人提此命先難後易六甲日丁卯時斷六甲日生時丁卯傷官羊刃真當惱縱然月氣有扶持未免為人性不好甲日丁卯時傷官羊刃甲用辛為官丁字傷之用巳為財卯中乙卯劫之主為人凶狠若柱透辛傷官見官刑害百端運氣凶險不得善終柱有七煞合刃行財官印綬大貴甲子日丁卯時尅剝慳吝作事進退不免刑傷妻子或死他鄉生辰戌丑未月貴卯月凶恭有官煞制亦吉辛未李遷侍郎戊戌丁酉大參庚戌丙寅進士乙未壬子進士癸丑庚戌貧疾夭辛巳浙人甲寅日丁卯時年月木火相停通明之象貴月令坐丑未貴乙亥月文章冠世官至三品干支金水全官印雙顯貴一云水火相戰主凶刑庚申屠大山尚書辛巳丙午侍郎丙申甲子巨富甲戌甲辰日丁卯時財帛滿目生計盈餘妻賢子孝高命論之春生太旺無制貧賤殘疾丑酉月貴一云身孤凶壬申解元癸丑辛卯進士壬辰丙申憲副丁酉丁卯知縣甲辰戊申貧甲寅己卯殘疾丙寅甲午日丁卯時身坐絶地凶刑若生秋冬壽夭春夏富貴甲午月大貴運宜東北方辛酉舉人丙申丙午知州癸巳癸酉胡正蒙㑹元探花祭酒乙未浙人戊午林春㑹元部郎乙卯泰州人庚子林烴尚書丙戌閩人甲申日丁卯時主武職風憲權貴酉月火木運中貴寅午年月大貴一云寅卯月總凶癸未元戎丁巳戊戌劉棟侍郎甲子乙亥大恭庚辰庚午李秋都憲辛亥壬申進士甲辰乙卯舉人乙酉壬寅尚書丙午戊午宇文丞相丙辰庚甲凶死己卯甲戌凶死丙寅甲午王應選探花辛未浙人甲戌日丁卯時逢亥月有才學貴顯羊刃最壞造化須有制合方吉身弱無凶若年月純煞甲木秋生主夭折壬午毛鵬都憲損妻尅庚戌子壽止四十餘甲子吳情探花丙寅壽不永庚午舉人甲申月缺雲隴局柱中無救助人通道不通財祿少從容甲旬六日逢丁卯重重疊疊怕衝刑運行背祿無官貴到老窮經不許名甲日時臨丁卯傷官羊刃相隨甲逢丁火化為灰父母兄弟難倚祖業田財聚散妻兒總有刑虧運行官煞始為竒性格或嗔或喜六甲日戊辰時斷六甲日生時戊辰天財坐庫㑹滋身富商巨賈田園盛月帶辛金名利成甲日戊辰時天財坐庫時上偏財遇龍守庫主為商賈發財田園廣盛八月帶祿財官俱有富貴雙全忌比肩羊刃奪財甲子日戊辰時主移根換葉改姓易宗妻賢子孝作高命論未月行北方運貴酉月北方運大貴乙卯童承叙春坊乙酉甲申元戎丙寅戊子貴戚丙辰庚寅太參乙酉癸酉耿申丁巳丞乙亥亦貴乙酉甲午內官庚午甲寅日戊辰時龍吟虎嘯格貴純辰中貴純寅康壽亥卯未三合財旺身强大貴酉丑申年月亦吉庚申髙簡尚書丁亥謫戌乙丑林元甫都憲癸未子貴同丁亥憲長癸卯乙卯進士戊子庚辰學憲乙丑丁卯進士庚戌壬申通判己酉甲午鄭鄤翰林極刑癸酉江南人庚午進士丙戌己丑靳光先丙子吏部甲辰日戊辰時刑衝發財妻重子晚雙親有尅酉月三四品貴丑月亦貴地支純辰大貴丙辰潘恩尚書三子進壬辰士一云己巳時辛亥太守子貴戊戌丙子太守庚子一例貢以侵欺間軍命同乙丑郎中壽不永戊寅甲寅郎中戊辰丙戌節度庚寅丙戌文貴庚戌丙申武貴辛丑庚午張瑞圖探花入閣己卯閩人壬戌陶望齡㑹元探花戊申諭德浙人甲午日戊辰時財多成敗早歲灰心亥子丑卯午未年月大貴酉月亦貴庚辰張臣武狀元己卯辛未侍郎甲午己卯太守癸酉壬子進士癸丑己酉舉人乙亥辛丑舒應龍尚書庚子己酉鄒德漙翰林戊戌壬申革職江西人辛酉進士庚寅乙酉毛惇元榜眼庚申年卒浙人庚辰甲申日戊辰時主孤僧道清髙丑月富貴寅月尤貴丙申進士辛丑庚寅進士止知縣己卯辛丑平章甲午庚子舉人知縣壬午甲戌日戊辰時大富年月扶合亦貴寅亥年月三四品貴但時日併衝尅早年身孤中年發福乙亥舉人丁亥