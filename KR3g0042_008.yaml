命不尋常戊日癸亥時戊合癸化火火絶於亥戰於水鄉不成其象為人虛秀多是九流藝術近貴之人主患目疾戊以甲為鬼壬癸為財亥上壬旺甲生戊土氣絶財帛聚散若年月干頭見乙丁庚旺為三竒之貴通土氣月身旺行火木運吉戊子日癸亥時年月不見戊字破格貴申子年月東南運亥卯南運俱貴巳午未旺大貴戊辰李文進都憲己未甲申布政乙巳癸亥僉憲甲子己卯吳狀庚午元戊寅日癸亥時午未月生化火㑹局高命春官煞混雜溫飽衣祿酉丑年月三品京堂乙丑張舜臣尚書丁亥甲子憲長丁丑甲子光祿庚午卿戊辰進士癸亥辛丑進士壬辰庚辰進士知縣貪橫法丙戌死壬辰封君癸卯辛卯進士庚寅辛未駙馬壬辰壬午御史甲辰乙亥貴妃癸未戊辰日癸亥時秀亥子月財官格不貴則富寅卯年月貴顯夏生教職甲寅員外己巳甲申舉人甲戌辛丑舉人乙未戊寅進士戊午乙酉滄州戴封君世家丁亥癸丑劉鋌元戎己未戊午日癸亥時貴寅巳年月土厚水秀地方六七品貴卯未辰丑俱吉壬子進士癸卯癸未舉夭癸亥癸亥進士乙丑丙戌憲副己亥戊申日癸亥時子未年月無祖業因妻致富不然移根換葉貧而且賤戊辰邢尚簡都憲丙辰無子壬寅憲副壬子己未主政丁丑戊子尚書癸亥辛巳郎中庚子壬寅金學曽閩撫壬寅戊戌日癸亥時寅卯午巳丑戌亥年月天干透乙庚丁字清要權貴宜火土運乙酉姚謨尚書子淶己卯狀元辛丑太師辛丑丙辰主政庚寅戊戌布政癸亥甲子太守無子甲戌己巳御史辛未己巳郎中己巳戊子駙馬乙丑天干化火象運行遇吉地得局定非常四海姓名香戊癸化火亥時生落照江湖暗復明卯未月生三合吉移屋換舍必安寧戊日時臨癸亥天干化火為竒乙庚丁旺喜相宜定主名聲顯貴四海春風響快六親骨肉刑虧妻賢子孝樂怡怡無破科名及第三命通㑹卷八
