body:
  text: 三命通會術數類五命書相書之屬提要臣等謹案三命通會十二巻原本不著撰人姓名巻首但題育吾山人著明史藝文志有萬民育三命會通十二巻與此本卷數相合惟以通會作會通為稍異今考世所傳星學大成專論五星者為萬民英所撰己著於録此本專論子平亦出民英之手藝文志葢因育吾山人之號誤以民英為民育又通會二字傳寫互倒遂有不同其實即此書也自明以来二百餘年談星命者皆以此本為總彚㡬於家有其書中間所載仕宦八字往往及明季之人葢後来坊刻所攙入亦己非原本之舊特以其闡發子平之遺法於官印財禄食傷之名義用神之輕重諸神煞所係之吉凶皆能採撮羣言得其精要故為術家所恒用要有未可遽廢者至其立論多取正官正印正財而不知偏官偏印偏財亦能得力知食神之能吐秀而不知傷官之亦可出竒是則其偏執之見未能圓徹且胎元等論施之今日亦多有不驗言命學者但當得其大意而變通之可矣若所引珞琭子與今永樂大典中所輯完本其文迥殊則其時秘冊僅存外間末由窺見遂誤信依託之本固未足以為病也乾隆四十四年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:1268ee654765b15baf447b635fcc24b7ccf99a2c6285a6b4498026e28b4fc0f5
