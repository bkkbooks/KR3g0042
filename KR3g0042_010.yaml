body:
  text: 三命通㑹卷十明萬民英撰看命口訣大凡看命先看月支有無財官方看其他月令為命也月取支神年取天干日取天干流嵗取天干大運取支神年為本日為主如月有正官及偏官而時又入他格只以月中取他格無用如月令全無可用方看他格古歌云三宫帶格混難詳不曉憑誰是貴方一任三宫皆帶格除非只得用提綱是也月令用地支假如官星須要上下干支透出為妙或干透出支中不透主聰俊忌年與時衝月支日支自衝不妨大運及嵗君來衝月支則禍凡正官一位乃君子貴人篤厚純粹剛直亷眀年時有印尤妙多則反主成敗四位純官仕宦虛名凡七煞一位聰明伶俐二位三位先清後濁四柱純煞有制貴無制貧凡財一位務要得時富貴成家為人性燥緊急二位性氣减半三位四位耗氣身衰若身旺甚則可成立弱則勞苦生受凡印不論一位二位四位都好格中不宜見財破印大凡行好運日干傷流年嵗君干頭禍輕行不好運日干傷嵗君干頭禍重若巳發過則死辰戌丑未各有三分餘氣如行午運至未有三分火氣行子至丑有三分水氣之例不可全作土論凡陽刃格嵗運最怕衝合太嵗干合日時干者為晦氣煞日時干支與流年干支同為轉趾煞如庚申日見庚申或庚寅太嵗之類輕則逺遷重則毁屋破財凡年月日有吉神要時引歸生旺之處有凶神要時引歸制伏之鄉若時上帶吉神或凶神亦要年月日上吉者生之凶者制之月上有用神得祖宗之力時上有用神得子孫之力反此則否凡看命以日干用為天元是以干為祿日支月攴用為地元是以支為命假如壬癸日己未月干支透出財官是也財官論原有原無地支原有財官天干不露出者不問若地支無財官只是天干透出雖行好運亦不濟事看流年嵗君只用天元若行運雖重地支亦要看運天元人命柱中或有官星或有偏官有制伏太過而運干見官煞可發運支無財而運干是財亦可為福運支無煞而運干是煞亦可為禍人命以當生之月為運元最怕大運並嵗君來衝為禍以當生官星為祿元最怕衝壞如丁日生人以壬為官而生亥月亥中有壬是丁之祿若年與時有巳字則衝壞祿元以當生財星為馬元最怕劫奪如庚日生人以甲乙木為財而生寅卯月寅中甲木偏財卯中乙木正財若年時有辛字却有爭奪之患嵗運同論凡年干上有日之官星福氣最厚有日之七煞終身不可除去官星為祿財星為馬行官星發官行財星發財二者不可缺一各有所用年月上有財官必生富貴之家祖父根基少年便行官祿運多是幼年拜命早發功名年月無財官日時有之則是自已成立人命以財官為本柱中但得其一亦可發福若四柱原無官星不入他格年月日時干支財多又行財旺運亦能成就功名以財旺自能生官須身旺方許年月無財官幼年又行不好運多是出身卑微破祖傷父無見成之福凡命官煞混雜傷官合神重男子犯之耽迷酒色女人逢之不媒自嫁凡看命專以日干為主取提綱所用之物為命譬月令以金木水火土為用但有一件取其節氣先後輕重淺深成局破衝細加考究曰官曰印曰財曰煞曰食神曰傷官以此六法消息之逢官看財逢煞看印逢印看官取四者不偏不倚生剋制化為上遇破害休囚為下運有生有去為福有助有剝為禍亦有用年日時支合成格局者然皆以月令為用假令月用金只用金用火只用火十八格內取六格為重用相生定格合局却用年日時下以推輕重淺深如逢官用印不怕煞是煞局印印局身還作上局取之逢印看煞但有官煞在命行官煞鄉亦作貴論月令通官柱中遇財財旺生官乃富貴柱中見財要入財旺運發福但見一煞則以煞為重不可用財若行財旺運乃財生煞黨作貧賤言凡格以煞為重凡命先看干神有無尅制支神有無刑衝干支納音有無戰鬭降伏如甲以寅為祿而寅上有何干甲以辛為官而辛得何支干不侵支則天乃尊支不犯干則地乃卑五行不相賊則人乃順四孟不相害則馬乃能馳若干侵支犯五行相賊又當分别主本有氣無氣有用無用有救無救成格不成格則干支錯綜五行變化造化在其中矣李淳風云五行生旺觀福氣之往還五行死絶在吉神之救助若五行得地納音相生吉神無助亦榮五行無氣納音相妨縱有吉神不用凡命天元喜地元有祿如甲巳喜四季乙庚喜申酉丙辛喜亥子丁壬喜寅卯戊癸喜己午地元喜天元有合如子丑喜戊寅喜己邜辰喜庚巳喜辛癸午未喜甲壬申喜乙酉戌喜丙亥喜丁天元地元皆有一生福氣高崇皆無名利無成壞天元者三十九嵗以前名利難發壞地元者四十嵗福不如前若天元秀氣坐祿如癸得子甲得寅之例不貴即富地元忌天元相尅如子丑怕己寅怕庚邜辰怕辛巳怕甲壬午未怕乙癸申怕丙酉戌怕丁亥怕戊更看喜忌何如不可執定凡命取干支與納音同類壬子壬午真木己酉己卯真土丙子丙午真水戊子戊午真火乙丑乙未庚辰庚戌真金若乙酉日庚辰時為精金丁巳日丙午時為精火癸亥日壬子時為精水巳丑日戊辰時為精土甲寅日丁卯時為精木以上遇者俱主富貴若火人丙日辛時辛日丙時木人甲日巳時巳日甲時土人戊日癸時癸日戊時水人壬日丁時丁日壬時金人庚日乙時乙日庚時雖為五行真貴重犯减福凡命取五行真氣交互如辛亥金人得丁巳土有丁壬合真木往來有丙辛合真水往來丁巳土人得癸亥水有戊癸合真火往來有丁壬合真木往來如戊戌癸亥丁巳辛亥交互真氣全乃宰相命也戊午火得壬子木中有丁壬真木戊癸真火丙申火得乙酉水中有丙辛真水乙庚真金庚寅得己邜土中有甲巳真土乙庚真金如庚寅巳邜庚寅己卯交互全乃兩府命也凡命先論化氣考五運篇以甲丙戊庚壬合五陰干為太過乙丁巳辛癸合五陽干為不及太過不及之間有權存焉考天元變化書又分晝夜如六甲日生木夜生化土故六戊人得甲取日生為鬼夜生為官用六乙人日生用金夜生用木故六巳人見之日生為官夜生為鬼獨六己六庚不變是以五陽干晝生為本體夜生作化看五陰干夜生為本體晝生作化看六般陽命男犯祿鬼倒食須取夜生反凶作吉呼鬼為官倒食為喜神却以日生為順六般陰命男犯祿鬼倒食須取日主反凶作吉餘並同前却以夜生為順女人皆反此求之此晝夜氣象是陰陽配合剛柔體用也凡命五行下生上曰助氣主一生自享其福上生下曰盜氣主一生供人之福上尅下曰順主有威勢而制人下尅上曰逆主多沉滯而難發死絶尤緊生旺差慢四柱納音鬼多主本當時名曰官星乘旺納音財多主本無氣名曰財多害身凡命五行貴陰陽相等如兩金見兩木或兩火兩土兩水之類各自成象方吉若太過不及如三水一木一水三木等類俱不為福假令金人三金一木金尅木為財三金爭一木是分擘其福多主財物不遂若一金三火火多金少煎熬太過主一生不閒又如甲人逢三壬三巳謂之三吞三偶主不吉若逢兩巳兩庚謂之重偶重傷視三尤凶不貧即夭餘以例推凡看命傷官見官而早死七煞見財夭亡財逢劫盡死重財破印凶水盛木流終為外鬼食神逢梟死於牢獄劫重見財死煞旺掛根休亡神七煞衝刑非徒流亦亡縲絏傷官羊刃重併雖全體而死血光財星見刃財散人亡生旺死於庫墓庫墓絶於生旺晚有吉運行凶運未入死卒何分有凶運來吉運未來發福曷論當究進氣退氣之由更審己發未發之義將來而速進㓛畢以先歸一生嵗運皆凶年少早死末旬命星得地老壽彌髙老怕生旺少嫌死絶羊刃逢生多惡死有根煞旺定凶終春旺火多宜西北庫是歸期夏熒金旺利東南鬼鄉夀地四刃星重死在正財之下一官貴淺終於陽刃之中四柱俱傷人自死金神入水溺為灾羊刃倒戈無頭之鬼煞星叠刃半體之徒制伏中和煞極全而氣死生扶太過印更旺而身終傷官入墓死晚局最宜觀陽生而陰死陰死而陽生煞逢三合太過必傾五行之內宜細消詳凡看命五行太過不及固不為福中間亦微不同如水土不嫌死絶以盈天地間皆水土無分四時豈有死絶之理但辨輕重如㸃水滴衆土之中則乾撮土壅衆水之中則散當論多寡分重輕也金非土不生木非水不長故金木欲其生旺怕見死絶如金死則沉木死則灰與水土不同火藏於木宿於土故不欲旺旺則焚亦不欲死死則滅惟得其平則佳五行水土均賴凡木金火之命尤為要也凡五行取象本象取本象如甲乙丙丁木火象之類化象取化象如戊癸丁壬亦木火象之類金水象不可見土謂土雜水混金自不清嵗運遇土亦滯惟金水不雜生於秋月最貴如明神宗癸亥辛酉癸亥辛酉干支俱金水不雜水生金月金助水清二水二金成象所謂金白水清别無夾雜又合兩干不雜所以尊為天子如癸酉癸亥庚子辛巳金生水月金反泄氣沉於亥子之中所以不免水厄金土象不可見木謂木尅土則土不能生金不成象也土積成金土多金少其福厚實金重土輕福出艱辛金火象不可見水見水則火滅金沉不能成器金重火輕發遲益壽金輕火重發早退速或主夀虧金木象不宜見火生木畏金見火成秀死木得金方成造化金重木輕令人骨痛木重金輕主損錢財或肺疾相攻惟金木相宜則吉水木象秀而清高不可見卯巳以水死絶木火象秀而豐富不可見金以木受尅流年遇之俱災水火象成既濟最妙或未濟亦得不可見土火多性燥水多眼疾火怕死水怕浴入酉火死水浴主艱難而死嵗運同此象日時忌之水土象不可見火土重水輕秀而不實水重土輕却有科名火土象不可見水火虛土聚不成物若同水流主汨沒如戊子戊午己丑己未丁巳丁亥丙辰丙戌丙丁與戊己相夾乃火虛土聚李九萬以戊子己丑戊午己未丙辰丁巳丙戌丁亥皆火土夾雜之象不可以連珠為貴時上逢壬癸水土滯火滅平生蹇薄又云火火見土則暗土土見火則虛土輕火重則燥己卯日見丙寅時是也火輕土重不明丁酉日見戊申時是也如韓學士戊戌丁巳戊戌丁巳火土成象又為鳯凰干支格故貴經云金水多清金土多厚以其相生金火多剛金木多正以其相尅火土多毒火木多聰火水多昧火金多烈木火文彩木水清竒木金方直木土毒害水火智慧水木智仁水金秀麗水土重濁各以五行之性推之凡命怕同類相破如己未見甲辰甲辰見己丑己丑見甲戌甲戌見己未凡在四衝之地納音同類逐兩位逆數之寅申己亥子午卯酉亦以此取主平生不足多不成器道經云井欄互破無藥可醫遇空亡庶幾嵗運亦忌之凡命主本逢嵗運不可遇死地如丙寅火畏乙卯水辛巳金畏丁酉火甲申水畏己卯土戊申土畏壬午木己亥木畏甲子金與人生怕死同義主本生死同途則不忌凡命最怕鬼尅而窠鬼最毒如丙子水見庚子土丁丑水見辛丑土之類窠中就位相尅所以最毒有墓中鬼如壬辰水見丙辰土丙辰土見戊辰木之類有隔壁鬼如庚子土見癸丑木之類有空亡鬼如甲戌見甲申乙酉之類皆主為害內墓鬼輕於窠鬼壁鬼輕於墓鬼空鬼輕於壁鬼若木命人得火月金日時之類有火尅金金不得傷木是禦鬼也鬼不為害如水命人四柱有火土土尅水火又生土是助鬼也其鬼尤凶干支通用納音最緊禦鬼則立身於艱難助鬼則骨肉多生乎破鬬若鬼中有鬼謂之鬼嘯如土命人生木月金日時之類以木尅土金尅木根基劣弱則凶主本强健不忌如一命己未乙亥丙寅辛邜逢三合生更遇寅卯為巳入官鄉丙與辛合大貴奈己隂土逢乙木作鬼又遇辛作乙木之鬼變寅卯之官作已土鬼在亥卯未三合位通是鬼尅犯鬼嘯也故主惡死經曰五行切忌下賊上平生不足事相縈又曰鬼嘯分明格局惡更加刑煞禍不差縱使以前逢富貴定知日後厭年華凡看命取胎生旺庫為四貴死絶病敗為四忌餘為四平以太嵗干為主配於五行取四貴四平四忌之位而分貴賤遇貴多則貴遇賤多則賤四貴之中又分四旺庫為上胎為次若人命胎月日時遇三貴干皆有輔或正祿正官正印三公命也帶正天乙如丑未生人月日時得甲戊庚之類帶本家祿如寅生人月日時帶甲之類謂之福會或天乙貴合兩重者亦三公命也三貴上帶上下合或一官一印及一正天乙或一位本家祿三兩位貴人合者宰輔命也若日時上遇兩貴而帶上件者亦然若一位上遇災煞地煞亡劫羊刃等神兼主兵權司馬節鉞之貴若胎月生月與日時上遇胎庫一貴却帶正天乙上下合或天乙貴合本家祿正官正印本家祿但有氣或貴人上亦帶前件祿干者亦宰輔九卿命也若月在忌神而日遇貴或日在忌神而時遇貴不害為清華侍從之職若日月俱在貴而時遇忌神此常調選人也四忌主貧賤亦有輕重死敗絶為重病為輕五行各三位如寅午戌火丙丁人遇之為貴與四貴三位同惟闕胎貴一位其主貴之福亦與四貴同陽祿貴在臨官隂祿貴在帝旺若陽祿遇旺隂祿遇官雖為本位其福减半若旺而無祿如丙寅得戊午日時更尅本命又帶刑煞主淫浪愚賤有遇一兩位貴却為凶煞刑害破得深重亦主無祿沈芝云五行以生旺為君臨官為相若納音是木月日時遇寅卯兩位金遇申酉水遇亥子火遇己午土遇辰戌丑未皆以貴論凡看命分五行生旺死絶如甲申丙寅己亥辛巳戊申皆五行自長生不論四時超然得自生之理人命稟之敏快髙明貴者得之其進以漸富者得之亦將回榮而得其所以生也丙子戊午辛卯癸酉庚子皆五行自旺不待四時而能自致其旺福力奮發無與比擬癸未壬辰丙辰甲戌乙丑皆五行自墓乃歸根復命之時凡庫之所在必欲物聚之則其庫充如壬辰水欲得衆水交歸然後為旺更有金往來相生當得重權倘水制火火制金更天中臨之是為負印不起主貧賤乙卯丁酉壬午甲子己卯此五行自死者也生則勞死則息其理自然不有死之地其物無自而歸所謂自死者得其真歸之理焉凡命遇此頴特高明多慧少福以靜默為體而不利有為以淡薄為事而不利興起惟可學道訪仙超生死之門也癸巳乙亥庚申壬寅丁巳此五行自絶者也天之道無可絶焉干支適㑹巳絶則更生凡遇此者憂喜未定如癸巳絶水得癸酉旺金扶之是謂絶水逢生尤為吉慶凡命帶上死絶生旺庫墓等不可就以所帶言之須看月令以辨清濁清者有制伏之謂如水病見土則濁却非土隄防則不能止息既止息則清之有漸也濁者無制伏之謂如水多無土則泛濫無歸而水極生木極則變變則通也蓋五行尚其變而不尚其常貴其隱而不貴其顯死絶有救則為還魂多以貴論生旺有尅則為散氣反主福淺若夫彼我之相生順則益本逆則奪氣彼此之相尅順則勢强逆則有傷經云以小凌大自貽其害以弱勝强自掇其殃一水尅三火是以弱勝强以隂勝陽雖殃不彰以陽勝隂為害不深兩陽相梗凶禍旋至兩隂相敵不安其處如乙巳火尅壬申金是以陰勝陽壬申金尅己巳木是以陽勝隂隂陽有情故無大害若丁邜見癸酉是二隂相敵戊午見甲子是兩陽相拒陽剛隂柔必勝而後巳故禍太乙云天地隂陽變化之機未嘗不以陰召陽陽召隂則天地合正五行氣融若乃陽從乎陽陰從乎隂則隂陽偏出動靜失序所以禍福兩途也大抵隂陽偏出造化不成五行如火多金少聚散不得成形火少金多既不能銷鑠反有煙滅之患餘例推凡看命先論五行體面局勢然後恭以喜忌好惡旺相休囚如金人得庚辛或申酉為體面得巳酉丑三合為局勢喜火制土扶忌金寒水冷生三秋四季為旺相春夏為休囚餘木火水土以例推之金人遇庚申辛酉為五離煞若生秋月逢水則化金之毒為金白水清造化逢火則制金之剛為煆成鋒利之器柱無火無水是謂頑金主早年酒色瘵痢身死若得戊寅日時剛處逢生主富而夀木人得土則根荄藉以栽培得水則枝葉賴以條暢得金斫削便成材也木逢寅邜更在春生最吉若三合㑹木局全不須春生多主仁夀木逢金制金煆火伏則剛柔相制若火太多則焚金太多則損土虛則不能培水泛則不能潤妙在得其中和水人以亥子為源以寅卯辰巳為納千源自北萬折朝東故水人喜逢東方則浪息波平水賴土防若生亥子土多則吉既在東方逢土亦吉不宜土多更有貴人財祿則貴若日時遇庚申辛酉水忌西流恐夀不髙生於秋冬生旺清澄壬癸此時而逢亥子主有文學納音更水則水太過柱無土隄乃少子之斷惟藝術空門則吉更隔角重逢定主刑尅春月乾渴而涸夏月渾濁而泛柱無水助則不貴火居寅卯生於春月木秀火明榮華富貴生於夏月則太炎柱中無水定夭有水早貴生於秋月火死金成藏光內照時日微逢旺氣則吉蓋水火不嫌死絶只宜恬淡為福生於冬月柱中再得火助則潜消霜雪溫暖山河古人云冬日可愛夏日可畏此之謂也土逢四季全上貴如納音全土柱中更得寅字為艮山亦貴土能厚載萬物資生金木水火皆不可缺故此四行咸賴之也夫論五行之用多則太過少則不及其氣其數有餘不足皆能致凶抑揚歸中然後為福功成者宜於退藏將來者貴於榮振五行稟旺謂之成功旺而能止息是謂退藏五行在冠帶胎養之地其氣虧而未盈是謂將來故欲子母相生以益其氣則有榮進振發之道如木非其時衰則梗介死則枯槁金旺太過則動作多凶炎炎者貴乎熄不熄則有自焚之灾滔滔者貴乎止不止則有自溺之患火行南陸而化熱盛則焚烈而害物至酉亥則隂能翕之然後能溫暖萬物水行北陸而化寒盛則嚴冷而殺物至邜巳則陽能闢之然後能滋生萬物又有生而不生旺而不旺此為凶乃先吉也有死而不死絶而不絶此為吉乃先凶也如水見戊申土此生而不生見庚子土旺而不旺遇此多成而反敗因喜而反憂如水見癸卯金此死而不死見辛巳金此絶而不絶五行氣盡而得父母之德以生益之則其氣復生遇之者危中有福窮而通屈而伸也生旺太過則福中藏禍死絶太過則福無可托若夫死絶逢生殃變能逃火土最先金水猶後火絶得土曰睿火以土為子火絶於亥而見丁亥是也土絶得金死而不亡曰歸魂土絶于巳而得丁巳土是也金絶得水曰繼體金絶於寅得壬寅金是也水絶得木魂復天遊水絶於巳得己巳木是也木絶得火火出木燼灰飛煙滅故獨為凶蛇馬無膽於焉足證木絶於申得丙申火是也蛇馬在位己午木厯巳午而死木於臟屬肝於腑屬膽證木死為凶也經云身土遇火生而漸利命水得金年乃優長金多須火或從革以成名木重得金揉曲直而任使水流不止須土以擁之火盛無依惟水以濟之五行用得其宜雖相尅而為福若用失其宜雖相生而為灾凡五行過多而相忤如祿多則貧馬多則病印多則孤庫多則閉生旺多無歸宿死絶多無激揚五行不可太相安不可太純粹貴人馬多升擢常人馬多奔馳破要傷禍空要空盡所愛者不可毁所畏者不可旺先畏後愛為福先愛後畏為禍合多不發而媚學堂多則無成貴人多則巽懦而無立志祿馬太顯不可以貴人論貴人表裏足不可以常人論四柱俱陽口惡心善四柱俱陰狠戾沉毒拱要拱馬拱祿拱貴拱福神不要拱刑拱禍拱嵗拱時隂陽貴在均協病傷要有尅制凡命丙辛壬癸見戊戌則戊土當塗刃傷折挫壬子丙午丙午壬子水木精神陰陽純粹餘位無助亦非常器加以季秀之氣則曠世無忌大德有容乃丈夫也卯酉日出入之地子午陰陽始分之宫遇之者令人往來不定嵗運亦然己亥為兩極之地地天斡旋寅申為三停之方郵遞往來如人遇之多不執一丑未遲遲辰戌速速遇之令人執方性不通變辰戌有氣却能建立大事丙子人四柱有壬寅是壬入丙家就破不美庚子見庚午是五鬼臨門戊寅見甲寅甲尅其戊戊寅隨勢尅甲寅是支干納音上下不和除别有福神方為福力癸酉見戊寅戊土尅癸水又金氣向絶鄉劫煞元辰居中除得月令中秀氣方可為用亦久而不佳庚午丁酉互旺互破乃旺中破也不可全為福力己未辛酉雖得食却歸死地終久不佳乙丑乙未庚辰庚戌見戊寅大好運亦然經云如得庚金濟戊寅欲絶不絶成福力乙卯見戊寅戊寅見乙邜是大好命丹陽書云三奇之際尚有虛聲死絶之中尤存生旺蓋三合三竒不合月分則不貴如甲戊庚有子午時方貴乙丙丁有寅卯時方貴天元變化書云乙丙丁正愛酉亥更看納音有無交涉又云凡三竒三合帶月令中秀氣入貴格亦不免庶出過房作贅又云凡命見三合三竒而本年不帶在四孟生而得四仲四季月日時四仲四季同論及胎月日互換干合或六合而本命不帶皆名曰掉太嵗多主離祖孤立為人不得力少救助却宜義居假合而立也貴命則多倚仗而升進凡四柱帶三竒三合者本身若不是過房庶出將來子孫必有過房庶出隨母之子古詩云三合與三竒清秀更饒肥不為過房子便是隨母兒凡命前五辰為宅舍若遇有氣及吉神臨之主有好宅門閥崇峻子孫華顯假令甲申人宅舍在丑十二月生得天乙臨宅為吉若居無氣及凶神臨之主其宅虛耗破壞不完祖業不守假令庚午人宅舍在亥甲子旬亥落空亡又遇劫煞臨之為凶餘准此推命後一辰為破宅煞若在破宅煞中主無父祖産業或客死他鄉又看宅納音與本命納音相生則吉宅尅身得好宅身尅宅必破散假令甲子金以己巳木為宅二月生雖係宅旺合有好宅以身尅宅後當破落戊午火以癸亥水為宅九月生宅冠帶十月生宅建十一月生宅旺又值宅生尅身必得好宅若宅尅旺中生者有官則吉無官則凶凡祿命雖有休旺更占其宅以辨吉凶沈芝云宅怕犯破如甲子人以己巳是宅如犯亥字其宅受破命元稍薄太嵗衝年亦須破須是為長方可斷如丙子人得辛巳金為宅遇乙亥流年之類是也命好亦更動興作方應凡命後五辰為田園若居有氣之鄉又福神臨之主田園盈野倉庫充實假令甲子人田園在未六月生土乘旺氣又逢天乙貴為吉若遇無氣之鄉又凶神臨之主田園瘠薄倉庫空虛假令戊子人田園在癸未六月生甲申旬未落空亡餘准此例鬼谷遺文云馬無害刑破祿無鬼鬼尅食無亡空亡支合無元元辰干合無厄六厄旺無喪喪門衰無弔弔客妻無刃羊刃財無飛飛亷孟無孤孤辰季無寡寡宿體重須鬼祿重須官夫須鮮妻須倍吉須顯然凶須沉昧支干太和而塞夫婦失時而凶四柱主本祿馬往來須分建破天乙扶持將德是衝更辨尊卑有根而無苗實貧而尚可甘食本氣絶而花繁縱子成而味拙至若貴神當位諸煞伏藏三元旺相豈專神煞命中用煞以五行為本如五行得地無貴煞而亦貴雖有惡煞無害於事若五行不得地縱有吉煞亦發不久如冬月中花耳納音者天地之舞數也驛馬學堂居長生之位才能官職在旺相之鄉文章富貴處印庫之地如逢衰敗則减三分之一更遇死絶則去十分之半切忌空亡衝尅不宜刑害吞食故同源相成順數為上雜數次之則天地舞全基本强壯同類相傷如丁未刑丁丑之類則支神氣散理無復合管輅曰五行互旺雖衝氣完五行相尅雖合氣散此之謂也或問人生有始終㓛名富貴有一旦崛起忽然驟興有始終剝落而中間奮發有半世淹蹇而晚年成就其故何也答曰莫非命也其始終富貴乃柱中身主專旺其所用吉神或官印財食俱各帶祿得令不偏不黨無刑衝尅害出門行運步步皆吉故能成材能振耀紹前人之基業立當代之功名不招讒謗不致傷害保其終始是命運生旺體用俱得故也其一旦崛起忽然驟興繇柱中所用貴神悉皆得位乘旺又且合格奈日主無力不能勝任其福所以勞困偃蹇倐逢好運生扶日干得其强健元命用神方為我用我因乘之虎嘯風生大發富貴是偏氣乘和衰以遇旺故迎吉而發前後迥異亦有日主强旺五行煞純不雜奈根本原無制伏富貴不成惟待運來制伏煞神化為權柄功名顯達出類超羣制神力旺發福非常所以驟興繇貧賤而至極品全繇行運得地方見其興如運不至即常人耳其始終奮發而中間剝落者乃柱中日主健旺用神亦旺各相力停為富室朱門之賢子及其長大成立要逢好曜若大運加臨元命見其財而奪之因其官而傷之臨其印而壞之逢其食而梟之遭際此運禍不勝言所以盛年見傾而不發如其惡運一去又逢好運扶持使用神一新譬如枯苗得雨勃然而興鴻毛遇風飄然而舉不可禦也若半世淹蹇晚年成就乃四柱身强羊刃比肩又各爭旺惟財官煞神等物虛浮輕少無力而成功名出門行運又非作福之地所以一生饑寒勞苦剝落直至晚年頓逢好運補起財官煞神等物假煞為權制伏羊刃或得權貴而顯揚或起資財而發福當隨五行清濁以其所遇之運别之嗟夫窮通有命富貴在天孔子有是言也豈人智力所能移易乎哉或問興亡生死答曰凡人命中有煞為用煞神未制則為白屋窮途之人或作豪門卓犖之士要逢制伏運假煞而興切不可脫制伏運一入財鄉財能黨煞再遇流年財煞助旺併力為殃身主孤寒尅害輕則傾家徒流重則刑棄其身煞神併合凶亡可畏如此羊刃同論又有柱中月令正氣官星為一生富貴惟逢財印則利官星喜財旺以生之印旺以護之故令其人能行仁布德緯國經邦權重爵髙後煞神得位嵗煞併臨官化為鬼喪身必矣不行煞運或行傷官運又無印綬制之傷官得地貴祿遭傷喪妻尅子剝職生灾更遇流年黨他必致身亡慘惡如有高見明識知進退存亡之機而保其身者不遭非橫亦自己惡疾而終又有柱中所專用神無官煞氣惟偏正財旺財神當道隱隱興隆積財聚富但少貴耳再看行運何如如逢官祿旺鄉富貴雙全設有不幸財神脫局羊刃相逢更遇流年衝合羊刃財神盡傷元命衰絶羊刃生災敗亡必矣生死則以格局論如印綬見財行財運又兼死絶必入黃泉柱有比肩庶幾有解正官見煞及傷官刑衝破害嵗運相併必死正財偏財見比肩分奪羊刃劫財嵗運衝合必死傷官之格財旺身弱官煞重見混雜衝刃嵗運又見必死制則傷殘拱祿拱貴填實又見官煞劫亡衝刃嵗運重見即死日祿歸時刑衝破害見七煞官星空亡衝刃必死煞官大忌嵗運相併必死其餘諸格並忌煞及填實嵗運併臨必死㑹諸凶神惡煞勾絞元辰亡神劫煞弔客墓病死宫諸煞九死一生財官太多身弱元犯七煞身輕如丙丁日干年月時庚辛加酉運或庚辛年必死甲乙日干庚辛月時夾雜年運見庚辛必死若有救則吉無救定凶五行神煞金多夭折水盛飄流木旺則夭土多癡呆火多愚頑太過不及作此論一不可拘二須敢斷求其生死决定無疑至若五行生死如壬日生在二月行申運即死生在七月行邜運即死乃遇生怕死既死怕生造化與人事一也須並看之嘗謂人之生死年月日時俱皆前定姑舉一二如定興張易金嘉熙二年仲秋以兒婦馬睦閣臨盆乞靈寶泉寺當境神夢金狗玉雞黃羊青犬次第而至逮生勇九淮王則戊戌辛酉己未甲戌八字果應淮王雲孫壅七公相亦占𦙍於江文通祠夢始出疲赤犬再見肥黃狗在路傍及白馬立平地木左復覩赭猪聫咬犬尾入屋上土公相自忖度乃丙戌戊戌庚午丁亥年月日時成化嵗次暮秋朔後夜半甫生子果驗又元文式五師生大德丁未嵗正月十七日壬午申時至明洪武己未元旦夢中得黃羊觸數七十有三至斯際果逝其子式敬籌六老夢數白兔入內姜沉閨懷及順帝十一年仲春甲辰昧爽産淑正求二者四柱皆辛邜后人有記云厯周追憶古人心仰止髙山直到今睆兔兩雙生夢兆四重辛邜又逢隂又白雞銀鼠應辛酉庚子之祥白雞在酉值太嵗不起之兆由上數事觀之人之生死信前定矣哉若尹子常夢巳達午厄寅滅後見蛇入穴得金墜馬虎嚙皆符孝介經三叟夢達逵逢乙巳對局至成化三十一年遇是干支登耋夀四月望日進宜義郎秩孫幹父亦同前夢後復以正德四年乙巳仲夏遂升衛侯又古人祈夢問子孫於土地神得詩云犬羊父母青龍子赤馬黃駒與白雞孫虎曾同翁屬肖丙隆一氣應多齊解者以其伯子生甲辰仲子生丙午叔子生戊午季子生辛酉長孫生寅曾孫生丙戌推算皆驗是一家祖父子孫其生皆前定也又吉人祈祠社廟神示詩云左龍右虎赤同方只怕炎猴及木羊三十八年生死隔風雲際㑹總無常其後生死年月日時無不符驗古人謂飲啄莫非前定况功名乎况生死乎况子孫乎彼不知命而妄圖者其不為鬼神所笑者幾希巫咸撮要天元神趣經云凡推人命先詳日下興衰變用分局天地方成造化貴賤明於上下興衰盡在干支四時中妙理窮通五行內榮枯自稟是以春生甲乙居寅卯豈怕庚辛夏長丙丁乘己午何愁壬癸庚辛值兊秋生兮離火難侵壬癸逢乾冬降兮戊巳怎尅土生四季得時而遇鬼其傷無害設使五行失地而逢尅其灾不愈又若化格成象須分衰旺相停尤宜配合之中要識往來去路金絶艮北火沒乾西木落坤南而無形水到巽東而無位此乃陽干皆死遇合而以類相從妻若潜形但見局中而可决陰生四正時旺者身貴家榮死絶墓衰類傷干尤為不足化氣入格不破大顯貴者十有八九化氣失局有傷論顯榮者百無一二最高最貴者居旺處三位須要相扶至賤至貧者居衰處四柱難尋造化元象在地支之中配合在天干之內象成旺用皆生火土之中四柱無傷直列朝廷之上支中畏懼亦須聲譽非貧運至衰鄉必主灾咎化成造化各居於衰墓絶鄉象成雜局遇合猶如不遇夫行旺運妻乃從夫妻運扶持夫從妻論己身臨鬼須用天地之中象旺象衰要識榮枯貴賤身衰鬼旺應須肢體傷殘身旺鬼衰定作凶徒之命鬼身皆衰男必飄蓬女作師尼伏身潜匿自居高名月氣相傷此乃伏象官鬼皆全遐齡不遂干中破敗乃有技藝以隨身支乃生全難仗六親而獨立五行屬於其象皆在十二支中先分南北與東西次看三合內别認詳六親者從象而推之審富貴者官祿而兩說有祿盛者鰥寡孤獨有官鬼者殘疾夭夀身如顯化自身無氣本性全虧假五行成象平生窘迫豈得祖宗之財顯福顯盈因犯别房父母從象論引用為氣化象論天地相停從中有貴有賤化內有富有貧從中貴顯得時而位列朝中化內成局運轉而成封帝側從象衰而至老驅驅化象伏而平生碌碌又曰看子平之法專論財官以月上財官為緊要發覺在於日時要消詳於强弱論財官不論格局論格局不論財官入格者非富即貴不入格者非貧即夭一格二格非卿即相三格四格財官不純非刑卒多是九流官怕傷財怕劫印綬見財愈多愈灾傷官見官原有者重原無者輕重者遷徙輕者刑責年上傷官父母不全月上傷官兄弟不完日上傷官難為妻妾時上傷官子孫無傳嵗月傷官劫財生於貧賤之家或是庶出日時傷官劫財傷損子孫主無晚福官煞混雜為人好色多淫作事小巧寒賤有財印者吉無財印者凶劫財敗財心高下賤為人貪婪正財月令勤儉慳吝柱有劫刃比肩多者刑父母傷妻妾不聚財商賈須觀落地之財宰相須看得時正祿七煞梟重走遍他鄉之客傷官劫財瞞心負賴之徒重犯竒儀者貴重犯亡劫者夭七煞宜制獨立為强鬼中逢官逼迫太甚明煞合去五行和氣春風暗煞合來四柱刑傷害己煞刃無制女多産厄男犯刑傷二德無破女必賢良男多忠孝財官印食定顯慈祥之德劫傷比梟難逃寡惡之名衝官無合乃飄流之徒坐馬落空是落魄之輩月令逢衝過房離祖官印遇偏庶出孽生干頭滅烈堪嗟伯牛之疾時日衝刑難免卜商之泣六虛臨於乙亥孟浩然徒有文章三才會於壬辰石季倫恣情金玉有文無印賈誼屈於長沙有印無文李斯專於上蔡刑多者為人不義合多者疏背皆親合多主晦衝多主凶辰多好鬬戌多好訟辰戌魁罡多凶少吉時日空亡難為妻子背駝驛馬離别鄉土混雜官煞奔走衣食印綬遭傷名利成敗天厨逢梟食祿虧盈傷官遇羊刃劫財營食終日區區正官逢七煞剝傷求生一世忙忙財官招上貴之憐煞傷慮小人之恥官無衝破爵祿獨顯財少傷劫名利雙全官印在刑囚之地心亂身忙日時在鬼墓之鄉憂多樂少福不福恐吉還遭傷成不成是格中帶煞財官兩旺兮主持節鉞煞刃交顯兮掌握兵權官是扶身之本官在長生須富學財為養命之源財逢旺處足錢帛財官印綬三吉不可不逢劫刃傷煞四凶不可不畏印臨天乙受盛世之封財藏官庫畜希異之寶三竒貴人見生時館學清華世所稀貴人若逢祿馬來設使金章未為足官貴若逢財官助重犯竒儀須宰輔不作蓬萊三島客也須金殿玉階行互祿互馬共羡黑頭公相帶刑帶破終為白面書生有印無官發不在迅速之內有官無印難求乎榮顯之名財官帶印積玉堆金偏正逢財倉盈庫滿印綬錦鞍勒馬官貴玉帶金魚凶莫凶於羊刃禍莫禍於傷官運逢羊刃劫敗財物耗散羊刃倘同生氣閫外持權傷官被合妨妻害子傷官帶刃尅爺損娘官藏煞見定招非橫之灾煞沒官明當膺藩輔之柄少樂多憂官星又帶劫財骨肉分離孤鸞再遇傷煞三刑六害衝擊者難得峥嶸孤辰隔角重見者多主貧夭享用見成出門便行財祿一生寂寞行運與命分岐有官而不食祿月上正官被傷有財而不得享柱內正財分奪祿馬先逢於生月隂德榮華若日時再見財官此乃遇而不遇又曰四象之中隱土而成五行之內干秀為榮亥卯未滋榮甲乙寅午戌聚福丙丁壬癸喜生潤下庚辛愛見從革戊巳欣逢四季水潤下兮文學貴顯土稼穡兮富貴經商春生甲乙抱懷仁德之心夏遇丙丁胸藏明辨之才秋金兮性多剛毅冬水兮智足權謀木盛無金雖仁不成造化火旺木衰縱學難得貴顯水多遇土成堤岸之功木盛逢金作棟梁之美水火相停成既濟土逢木旺為稼穡金火氣均煉出鋒鋩之器五行造化皆因鬼而成功木敗不仁而妄作金衰寡義亦無恩火滅無禮之輩水濁失智之人土遭木尅言常失信金鬼好殺水盛多淫日旺仍須自立更詳上下吉凶嵗月相扶因祖而發時日相衝妻子無功衰墓平生孤立生旺一世崢嶸上下相合而無害往來尅戰乃多憂祿馬時尅日破縱職位終須退剝日旺時强聚秀無福亦須橫發月為傷害時得官財運自能成立月遇絶傷時對衝門戶定有三遷年逢衰地幼嵗艱難月在旺鄉晚年不足時衰日秀有始無終月弱時强晚年榮顯元氣强旺雖未達終顯功名基本休囚縱得地難成富貴若夫天元羸弱命不再蘇忽值本主休囚貧寒無地氣旺遭傷雖遇險終身有救氣敗逢生縱得地一世無成五行失地休言祿馬同鄉四柱無歸難論財官雙美以日尅者為妻妻生者為子考其生旺定其死絶時臨旺處必多兒時在敗鄉必絶嗣男逢兩位之財必須置妾若遇合處逢祿定挾妻榮財鄉見合立身倚妻陽干上下逢合妻多易得合中更遇生氣妻妾賢良四柱遞互相親多生喜慶五行來往相傷皆主不義財失地而岐路經商身旺甚則九流術業火聚水德相刑為僧反覆水逢土旺相殘為道無終火明木秀幼年顯達朝廷火炎水涸終身求財市井金白水清多顯達鬼位逢官主困窮財下見財富而慳吝羊刃帶煞被刑男子身遭鞭配財盛刑傷父母鬼旺後代昌榮從化忌從返本平生衰樂無寧丙辛化水到水鄉位列朝廷丁壬化木臨木位身居宰輔東金西木不從化一世虛名離壬坎丙得位時平生顯跡用神敗衰帶祿不能為福祿馬氣旺遇貴合主顯榮有官無馬而職微有馬無官而身賤四柱生旺雖無官祿亦長年五行敗衰縱帶祿馬終夭折魁罡相逢衝尅多遭刑獄建祿無財刑制定為奴婢陽火死於墓絶性凶頑多為酷吏隂火生於長養人豐厚當為富豪五行忌沐浴逢傷四柱喜生旺制煞有害而姻親散失遇戰而疾病纒身木火忌逢申酉灾病呻吟衰金畏遇旺火苦形悲嘆時臨鬼地無制多貧運至財官無刑必發七煞羊刃名位大顯正印官星刑衝乃禍壬趨艮位遇之則發資財變煞為官幼嵗功名顯達戊日午月火多而運喜官鄉財官敗地一世貧寒三竒無傷平生富貴日雖建祿不逢財官主孤貧日祿歸時不遇財印亦難發時上偏財運至兄弟之位主妻灾時上羊刃嵗遇偏正之財生凶禍正官月上旺富貴雙全偏官時上逢無情有禍財歸旺地無破家道興隆印綬生身無傷門閥光彩有官無印即非真官有印無官反成厚福桃花帶合風流儒雅之人五湖雲擾餓於首陽之客干刑支合樂變為憂干合支刑喜中不美若不九流僧道定須重拜爺娘墓時雜氣逢局鑰始得顯榮羊刃金神遇七煞必為大貴雙辰夾角偏生庶出之人寡宿孤辰異姓同居之子壬水騎龍逢辰多少登天府乙木捕鼠遇子多早步蟾宫日祿歸時沒官星錦鞍繡轡月生日干無財氣玉帶金魚六隂朝陽逢季月只作印看六壬趨艮逢亥月當以貧論格局無破無刑名利成就官印有傷有損爵位虧停妻宫羸弱犯劫財必損其妻兄弟位柔見官强必傷昆季天元羸弱失時難獲延年日主高强化鬼當膺厚福日旺無依離祖遷居若不遷居死在外地日旺無依損財傷妻若不傷妻外家冷落正官被合平生名利皆虛七煞被合處世反凶為吉煞旺更值身衰衣食奔走官柔又遇煞擾行藏汨沒財旺身强資財疉積假如甲辰甲戌落寅亥金帛滿屋丁亥丁卯到酉亥珍寶盈室六甲日遇庚辛若重多必主災厄六丙身居亥子無制伏定是貧儒行運得失更當詳察得地失時如田疇得雨得時失地如輗損塗泥得時者亦能舉躍失地者難以升遷故火到南方而榮水臨北地而盛土到東而病木至西而衰金入北而沉旺處生而死處滅死處生而旺處脫嵗運俱傷日主遇之命必虧危氣運與神氣傷殘門户與父母俱損運神尅嵗刑訟來臨嵗尅運神官災競起金主刀刃刑傷水主江河覆溺木則懸梁自縊虎咬龍嗔火則夜眠壓倒焚死蛇傷土乃墻推土陷五行煞重當如此詳又曰有化而不化之繇聚而不聚之機合而不合之類秀而不秀之實化而不化損於貴聚而不聚損於財合而不合損於官秀而不秀損於福又有不化而化之因不聚而聚之機不合而合之理不秀而秀之用不化而化者定居權貴不聚而聚者終於富足不合而合者必遷高職不秀而秀者須享祿位定四時有旺無旺察五行有氣無氣隨物而變物因類而求類五行俱要中和一物不可偏枯水不勝火兮奔波流蕩火不勝金兮困苦恓惶三辛見丙兮錢財破散二壬見丁兮家道興隆有秀而無官者但施巧於技藝見財而無托者惟遂志於經商甲居從革之方風災困苦金成潤下之局萍梗他鄉俱旺則從之所使俱衰則變為他物一鬼不能勝兩宫一祿不能勝兩鬼五行落在本鄉不貴則富四柱臨於破地非賤則貧生旺為上德秀為竒身坐學堂文藝清高之客命臨鬼禍徒流盜賊之人祿內隱刑定操兵㦸於戎位刑中見尅必主案牘於公門鬼休母旺錢財奴馬多豐鬼旺母衰父母兄弟分散官印兩全秉旌旄而居武職淑秀全偹應科甲而入文銓藏暗祿者官居極品遇真官者祿位非常十干臨死絶病衰賤居塵土五行在三竒庫墓榮列縉紳兩位鬼鄉逢倒食必為奴婢一氣有歸遇墓月定主孤貧勾陳得位居辰巳貴列三台元武當權逢亥子官封一品癸見庚申居右職辛逢戊子中高科隂水遇秀失地者身為僧道陽火無歸遇水兮定作凶徒金到火鄉財多聚散旺水入南家道盈昌庚居三冬水冷金寒得火相扶莫作等閒破祿則亡氣絶則病時臨鬼位更逢衝傷危不誣臨官復加衰敗地死絶無疑最貴者官星為命財得偏正為福最凶者七煞臨身天赦二德為祥官星如遇比劫雖官無貴七煞若逢滋助其煞愈凶三合六合嵗運合而必榮七官八官月建官而為喜四合四刑刑合當明邪正七衝八擊衝擊喜得㑹藏夾貴夾邱為暗㑹財庫官庫要明衝官星在生旺之方逢則何須發見印綬藏孟仲之下見而不用露形印綬得劫財為貴財元喜傷官為竒傷官若見印綬貴不可言歸祿若遇食傷福無限妙年日互有隂陽二刃刑法重犯官煞混逢天月二德祿位高遷飛刃伏刃㑹刃多凶傷官剝官見官為禍羊刃若逢印綬雖貴而殘疾在身七煞無制逢官為禍而夀元不久三偏三正遇三竒貴居一品之尊四旺四生全四柱福在衆人之上煞化為印早擢巍科財旺生官少受貽澤官煞同來要知扶官扶煞偏正相㑹須知合正合偏歸祿月逢羊刃世事不明金神運到水鄉身尸分拆暗中藏煞須明月下用神見處無財必受空中禍害羊刃更兼㑹合千里徒流用財若遇劫奪一生貧窘人生前定窮達巳分須要識其消長亦當究其始終當詳流運之源要察行年之位身弱如逢七煞運到制伏必傾身旺若逢福輕運到衰敗必死太嵗與命不和有灾有病四柱與嵗相生無禍無殃身弱徒然入格雖發早亡福輕若遇休囚必然傾夭是以用神不可妄求形迹自然發見有福則當用彼無時必是用身禍害在於五門福榮存於運氣福厚人所共同如或傷原終困又曰絶不能取生下之財衰不能敵旺中之鬼逆制無情順生可救主無而本有可救一半日時俱逢二德百事無凶更值財官定主豪富主本有力鬼可為官本主無氣官來作鬼刑衝之法仔細推詳有刑出刑入刑吉刑凶有衝動衝不動衝合衝不合之辨衝衰必定動搖來合有情方為富貴雜氣藏蓄要定誰先誰後提綱專用須分氣淺氣深一陽來復木火用而水藏一隂如生火土盛而金伏將來者進遇之有功成功者退得之何益月建財官印綬時作分野歸元或補其不足或抑其太過要造化中和為吉又曰三元定命先詳四柱有無五行成格次論命運强弱如身弱財旺須假身强之鄉若身旺祿衰却喜祿生之地印生為福畏見財鄉煞在柱中煞不宜旺命無財祿運逢祿馬則災原有傷官再遇官鄉則禍最忌者日干衝運所喜者運干生於日干也但看有情無情合與不合凶㑹吉㑹消詳且如原有害刃則骨肉殘傷原有傷煞地支死絶加以運中祿馬俱弱禍不旋踵更以流嵗抑揚禍福無有不准若逢建祿之地名為祿馬俱絶壽限難逃內有祿絶而發比肩而耗氣有淺深格有成壞不可執一推之玉井奧訣安東杜謙著凡推究造化之理其法以日為主單提作體要認為主者之端為化氣為本體入門便要通變識得主干有本象有化象方可消詳如甲即本象是木化象是上坐下支神先求其意乃日干坐下首先看此地支與月支一位時支一位年支一位刑衝破害生尅比和何如主干喜忌何物得來不可視為泛常不可顧盻月氣淺深何者主權月建之下氣候淺深五行之氣是何干神正當此日天時之令五日一候之氣一云德秀有無地支至切黨盛為强地支乃四位支神至切者視天干為尤切也要看何者為主干之宅舍何者為用神之基業何者力輕何者力重宅舍即得地之方基業即乘貴之所一看其力勢衝起是何支神二看其力勢拱起是何支神三看其力勢刑起是何支神四看其力勢合起是何支神五看地支統攝此法是空中立有者也論地支衝拱刑合四件極切門庭一法只拿日干作主取用中間或吉神有刑衝凶煞有拱合其生旺休廢交差不一難下手腳不如只詳四個地支基址五氣中何物最重將來品量却能耗散何神能生扶何神能衝合何神能變化何神然後却看日干屬何五氣與其最重之氣統攝何如便拿財官等物用神之氣共前五氣引於時座恭較其物何者輕何者重義理調順為祥瑞反則即為乖戾矣如此已立定然後看其支氣各有所喜所忌之端不可不詳五氣謂如木火土金水五者須要各各記住題目若五氣中何者黨多為重如支干內外明暗木多則木氣黨盛矣其喜忌巳論於前五行中專執用神切詳喜忌專執一位用神為尊長為權神為號令為本領為倚托此非小可執而推之未敢縱求其意外取用神或財或官或刃或煞或食或貴或印或祿馬等件各類例取原無定法其用神最忌損犯兼怕分竊不宜太過與不及如太過之物本不好了或嵗運又來生扶即是傾覆壞了如木則折水則傾土則崩火則一發而滅金則折損如不及之物本不好了或嵗運又來尅竊壞盡此物豈獨有禍用神喜忌至元至妙後篇别詳務要得中和為貴氣氣切窮盡理物物至極轉關金木水火土五氣一陰一陽共有十般消息一件件要看衰旺輕重明晦廣狹窮則究理盡處生何神尅何神刑何神合何神之類被壞之物得生之物主係何事物物推將去須要有依倚下落至無可奈何處便是轉關入何格調極處一轉即是建㓛圓活恭透却要定見下落斷成器不成器何如有氣者急有情者切有氣乃當時也看八字內外明暗干支如六月中氣大暑節土金旺相有氣之類此為至急餘則否有情乃合氣也如甲見己丙見辛丁見壬之類中間干支明暗有合皆取此為最切也一說非特合氣有情吉神生我尅我亦為有情虛拱貴氣生我尅我刑我合我亦無異也年干統攝次看月時時如權衡分毫加减看年干所乘何支與我如何相攝為切亦要引在有氣貴地體局方大又看用神却係嵗君是何吉凶神煞若更用神與嵗君和全貴無疑次看月時二干之關係不可竟作差慢不來扳攪柱中象數變化五氣真假吉凶神煞俱當引歸時座細分輕重分毫必須比較又云太嵗一年之領袖諸神之主宰極有用處只因徐子平以日為主專取財官誤了後人多少錯㑹了義故曰年如稱鈎綰起其物月如稱繫提起綱紐日如衡身星兩不差時如稱錘輕重加减其譬可謂切矣隨合仍緊遙合不閒隨合如丙午氣壯便知有辛未二字如影隨形亦看辛未還是我家恩人却是讐人遙合即是支中所藏之神與彼所藏之氣合也如申卯子巳亥午等類蓋有其氣類遙合事意自不放間矣體製須廣大凡八字要看氣象規模體勢豁達天地相停雄健壯實五氣順尅而有力倒生逆化而有功貴氣往來不雜必非尋常格調又看八字大意體假過於清則或寒或薄過於厚則或濁或滯過於華麗則或輕或浮過於肆逸則或流或蕩過於有情則或濫或淫過於孤介則獨立不能容物過於剛勇則或暴或燥而無涵養過於柔懦則或愚或鈍而無作為過於執實則拘局而只知有已過於軒豁則圖謀廣而秀不能實字面分先後緊用字樣却逺在後或被别字間神占先隔了若無傷犯須得嵗運生扶方為全美緊用字樣雖近且先却有間神字樣逺處在後動搖得切妨礙用神字樣却看柱內何者可以勦除去得天干專論生尅制化生則相生有生不欲生之理尅則相尅有尅不欲尅之情制則如水尅火而有土制其煞火能復生之情化則水本尅火見木能竊其氣火轉得生之理餘皆倣此地支專取刑衝破害刑者如丑日戌時之類則刑其出如巳日寅時之類則刑其歸惡物宜刑去好物喜刑歸衝者吉象宜衝凶象貴氣宜衝我家破者大槩破壞其物中間有吉有凶如邜破午乃乙尅午家已土受破若巳土為煞地面有力嵗運一露其害無疑若或不露亦猶抱虎而眠又看酉字有氣無氣可能馭服否又如巳為貴氣露而有力有勢則亦因破而來為福害者六害之處若帶忌神凶煞來尅來竊真為仇害象成一家不執貴氣人八字中全無財官等件貴氣有安然奮發富貴者何蓋以相生之氣自立成象也生意滔滔有不盡之情高逺堅實如此本象配本如甲乙丙丁之類化象配化如戊癸丁壬之類木火成象火土成象土金成象金水成象水木成象及有三象順序者同此法如火土金象之類又有四象和協生育者亦然如水木火土之類根源一氣生物滿盈如金氣正臨天時建旺之序既無尅竊其氣一往據生其子者水神也水神既顯露於干或泛濫於支物盛不祥還得幾多火土能隄防倚賴哉餘倣此推則造化盈虧之道灼然有憑萬無一失也八法關鍵五氣開端八法巳論於前五氣有聚散完缺實虛深淺敵交狹廣輕重厚薄寒和之不同干支俱有力尅物歸窠精神强健為聚喜吉神忌凶煞亦要輔佐吉神衝而無義刑而不歸為散宜凶煞忌吉神金木水火土俱全順序為氣完五行缺一以待嵗運補足為氣缺實則如甲戌見丙寅之類有合有生局於一象滯於一方柱中若無激揚昂藏之類如此則不過一富翁而已即有體無用縱貴亦尸位素餐如柱中土氣太重略見官來即貴餘倣此虛則如土入酉寅木臨乙巳金到辰亥水向邜戌火居丑申氣虛而不能確固餘倣此氣深如木之本象化象近清明節氣淺如木之本象化象方得雨水節之例氣敵如辛酉見乙卯大概凶甚若見己未己丑轉有憑藉反吉如無憑依乂看賔主强弱主弱則為鬼象賔弱則為財象交如丁巳見辛亥丙戌見己丑庚辰見癸未之類仍分何者氣旺而言狹如用神局於一二支神之情狹亦有生旺引用處其氣却來不得廣則引用處其氣來得生源處仍有精神通三合之氣或通六合氣輕如木之本象化象却入金鄉又非天時之類重如木象逢寅邜乃本象地支之類薄如木象逢自家死絶之地面仍非天時之類厚如木象逢庫墓長生之地或得天時或他干來助之類寒如木枯火散金寒水冷土凍天干休囚地支死絶之類和則有合有生有情有助有臨官帝旺無休廢死絶或有旺相之神來扶助或當天時前後有氣滿而盛乃物無倚藉隄防者不久而傾有氣虧而衰乃根本不實仍未得時氣亦不足又無生扶此等廢物何可勝言有氣衰而久不得天時又臨死敗却有暗干相生引歸生旺之鄉有氣旺非長始則氣𦦨奮發通舒自若終則收斂歸藏去處竟無依靠易於散漫盛意無源殊乏轉生乘勢無續有氣嫩易摧方來之氣人皆以為旺相之象中間若逢頑厚之氣尅竊者凶不可言有氣過耐逺過去氣候俱曰休廢又云成功者退殊不知餘氣忽被旺處資來綰動生意氣返實處愈耐嵗寒餘氣即休廢别化他象故也造物須原本體東方陽散以泄而生風風生木西方隂止以收而生燥燥生金南方陽極而生熱熱生火北方陰極而生寒寒生水中央陰陽交而生濕濕生土五行體象淵源巳取論於前器完由出根基凡成象處是為器完凡貴氣歸一亦為器完凡六親致一我生即子丙辛見木之類是也一說妻生者即子兩義在活法而取各有理趣生我者為母合我者為妻成其物象相備亦六親所生致一而成者也如運中成象蓋由根基原有來意則成矣謂木火必無相停各有輕重為木重火輕運上遇火干火支凑完真象若四枝中原帶火之臨官帝旺長生庫墓等字方是器完否則不真不實不完不正似是而非矣餘倣此義法如搜檢各禀吉凶時與日月與年干支八字要縱橫來往勾合互相取用不可有一處分毫照瞭不到如四干乘四支為各自占貴占煞或年干乘月支時支取貴或年干取日支日干取月支月干取年支有貴有煞或嵗月二支時日二支自取干神貴氣如此搜檢庶不差誤物須提豁方明輕重此一假須要先看四支一一將所藏干氣提豁出來細推何者黨衆何者力寡何旺何弱何輕何重方明得用神吉凶道理不去一一提豁大綱昏蔽難以忖度取舍榮而易枯發身暫致顯而不露成物嵗寒凡脆虛浮嫩之氣休廢敗絶之鄉得支干夾扶暫合而發於一時倘遇嵗運將贊助之神傷壞或抑揚其無氣則易敗而不長久如物不顯露用神有氣合神成象相乘一路運中無破則耐久逺縱有嵗君逐年駁雜乃浮雲蔽日樹影橫陰而已故不在露其干支中隱藏有氣得生反遠大也奪胎換骨意出自然捨本逐末原非真義本象如有財官貴神又有别位通氣有化有象有類引用却清宜乘福地者非勉强而行氣類有感必有所至也欲化真象如丁壬化木之類萬一妬合爭戰未成者忽至運中却資助本象具體乘其本象財官等貴則棄其本象之真逐其未節之氣大器鎡基自然遏惡而揚善體局若大本源若重用神若專兼帶貴人德秀雖有大耗元辰刃煞等件為惡反能助威則所謂遏惡而揚其善矣薄才體局方知害物更傷人嵗與日辰力虛薄不專被吉凶神煞播㺯隨氣動蕩精神被其所役自家主張無定多是凶煞象內刃煞亡劫金刃白虎之類作為故非德秀純厚之氣比也建業立事雖有偶成豈不害物損人也哉貴人祿馬交錯勾絞元亡多端貴氣不欲煩雜用財只用財用官只用官如用祿馬貴人食神印綬之類只宜一件二件貴氣便當輔佐如用財以官相輔官印相承祿馬兼行之類三件四件泛濫便不歸聚又云一件貴氣須要貴人德神以助方可大顯勾絞劫煞元辰亡神等物若貴氣重則助身行威惡煞重則肆害酷切一說以此等煞多端獨宜消息吉神恭天月扶持凶煞入空亡品藻貴神祿馬皆吉神也更遇天月二德尤吉勾絞元亡皆凶煞也若入空亡减半互言之吉神亦嫌空亡凶煞亦要二德舊注吉神貴氣雖清歸一更無混濁或入别格因推其妙若無天月二德天月二合月空天赦之類贊助亦减分數福力非全空亡以生日係何旬所屬如甲子旬即戌亥二位是也空亡有三神一旬內之後所藏干神如甲辰旬甲乙二干是也一旬後所遁到干神如甲辰旬丙午即庚辛是也一截路空亡加至愈緊如甲巳日申酉時之類凶神宜坐空吉神怕坐空又云金火宜空木土水忌空又云水亦喜空又云柱中凶煞交併有德神者遇險自散死不致非命日時帶則緊十全貴氣還看倚伏禍星一局凶神要識隱藏福氣貴氣十分完備始終不壞中間寧無一件禍神隱藏凶煞之神往來繁雜其中却有一件福神隱隱深奧或虛夾遙合或刑出衝歸亦係切當有意處不可便作滿盤凶煞看只待何運扶起局中福氣則吉扶起禍星破貴壞用則凶調峻格孤勢窮力盡義理正欲變通究其日干用神搜檢明暗造化吉凶神煞隱顯之處其體孤峻氣亦未為窮絶難於取用此等至極轉關處自有窮則變變則通之理運迎何者之氣一路挽回是何生意起發情源亦有無限之義氣盈物盈運併嵗衝身主何能恬靜欲觀其大概之義氣象或盈或流察其物理之微既盛且極便自有不耐久之兆况嵗運抑則頽弱揚則泛沒更若衝併此身之主豈能安然恬靜不搖無此理也年月日時干支有序君臣賔主體格朝倫月干宜在年干之次時干宜在日干之次若或循環次第又竒年為君日為主月時如賔如臣輔佐貴氣兼似前法有次朝其綱常輔其倫序正其尊嚴又云陽欲慎獨陰欲羣隨仍察貴煞所加之處日主最喜先干日主應嫌次位日主先干如甲日見癸之類此等其益有三一能合戊財資我一能善於長發我一能化其象生我但巳往之氣稍慢日主次位如甲見乙之類此等其損有四一能劫妻財空我一能合煞損我一能化象以泄我氣一能攔截前路作刃害我支神前氣支神後宫地支迎前之氣多者平生為人精神磊落如甲子年或子日見丑寅邜辰已之類是也地支後宫者主作事悔屯或折挫進退多端如甲子年或子日見亥戌申未之類是也餘倣此獨掉嵗君孤虛日主月日時支干作聯作黨作旺作合或成一象或化一氣獨太嵗孤另一位似遠似疏必然離祖别宗自立或偏出螟蛉者有之窮乏孤獨年月時同上日主獨居孤寡仍自無合無生另立於缺陷處者非異居同活則乞養寄生贅居外立黨合雙爭妻財兩義柱中如土黨既多天時却係木旺抑揚之道在如何用不可便作兩讐相競若土不虛加厚木有氣而露支音兼不刑害衝尅却能培養木秀成林為用更竒我合者為妻我尅者為財世人但知我尅者總為妻財紕繆未善又還看化象如何用神一字貴氣重來象欲晶明氣傷懶散柱中有平生獨用一字者謂之不如格字面俱合俱散各自竟成羣黨去了日下亦另處懸一字無依無倚故用此字或用字用神一件精神嚴切最妙如食用官星了又見官星再來復建祿等或用財又見神貴人皆為貴氣重叠苗不秀秀不實用神壯健成象意專力露不虛不背晝夜如土木水晝生金人夜生柱中如此豈不為名利特達之士若地支天干與我竟不相顧用神不合星主孤虛衝刑尅害相背竊氣更多象無贊助叠見休廢者無立無成不足道之格也我生我尅情能退他尅他生氣自歸凡我生我尅者其義自然退散他來生我尅我二者皆為氣入為支生為尅入吉神如此第一妙生尅來往合主扶持柱中合空或有贊助之神合實或有破壞之神生有制者尅有扶持者來往進退不一萬一失取分毫之間便差遠千里却㑹在合主扶佐何神至切為急事也善惡繁難時分衆寡善惡二位俱衆或錯或雜但看時座聚衆休旺聚寡休旺惡衆則為攢凶聚煞善衆則為吉聚福集善寡力怯福寡庶幾一云年與時互見貴人生旺與日和第一妙生而復生皆倚托成於何者如丙辛人見戊申運却見庚申嵗轉有倚靠復生之意有壬水精神自來况丙辛化水故得生倚托成於何者此也化而又化竟渺茫歸於何地如丁壬化木况有寅卯亥未地面又有餘神水木贊助騰騰頑養之木安可又用水來滋助渺茫之氣無倚却看運引或有隄防馭制之道方能為福若遇轉生處一向汗漫反不立矣五象相乘有祥瑞有乖蹇五氣交戰或傷殘或奮發祥瑞如木火火土土金金水水木成象得時謂得天時得位謂得生旺位或乘建祿等氣得權謂乘財官貴人等如有權有勢有執事者乖蹇反是三者則坐下貴氣縱乘貴地地支却又刑衝尅害是也交戰謂體均力停如一物恃天時一物恃其黨衆或一物得地或一物得權水火土水交戰之類水火土木相戰之類傷殘謂用神被尅主干被害或財祿被傷官亦被尅或一物有黨成化却見尅神來壞如丙辛化水忽見一土來尅之類奮發物我相安賔主和協我乘旺而相犯他得地而相迎我勢强而敵去他有氣而來朝財官欲真致妙兮須理化氣如丙辛見戊癸為財甲巳為官此為真造化秀氣不可言餘皆類此推之財官有象致精兮要倚局神如丙辛見戊癸為財得火局甲已為官得土局方就其器完而且清純無比矣餘例此推財官雜氣吉為庫凶為墓財官之氣均停有拱更加貴氣於上為吉為庫庫中雜氣有三件若當旺相為貴益我者妙若官化鬼入墓財神休囚入墓為凶則不為庫若吉神入庫仍帶休廢來刑且尅我者亦非庫善惡衝神尅則入生則通地支貴氣來衝未可便言其吉惡神未可便言其凶須是支干同尅方為吉凶尅入或一生一尅一和一制此亦變化通達在其中矣上生下成脫氣可憂子旺母衰三竊一生用神翻喜子衰母旺上生下謂如干生支支生音一也嵗生月月生日日生時二也得生者既為子若係間神三也如木生火在夏正為子旺母衰餘倣此三竊一生如金生三水四水母生子廣母既當虛即喜子衰而母在旺鄉為吉如木生火在亥正為子衰母旺餘例此前呼後應生則繼尅則治此格局一辰一干有體用有本末有呼應難矣生則繼續而無絶婉轉有情若尅則削朴煅煉既濟隄防疏通造物之切治也如是局面拘於生尅小節所以不能洞究元機耳左包右丞收則歸散則虛凡一干一支挺立於柱中者類有左右相丞之意有包羅有歸向有散漫有退脫輕重較量得失加減宜處當然之義不可務小棄大捨本逐末局神無取閒來一𣲖清冷柱中取其日主財官用神等件或雜或濁或繁或混或缺勝負或缺制降無分優劣忽一閒干非主非用却來左右逢源能乘一貴氣却取其干係日主之神何等進神以别其用虛處造象或合官合財等項取其成局有切用者始雖閒而無用既而閒神時至閒得成器際遇有用則天下無棄物之謂况造化乎官氣混求妙在各支匹配即重犯竒儀之格一體也謂如官煞混紊一有所配一有未歸乘者須得嵗運更配其未歸偶者吉或官煞柱中各尋所合所制則佳有過不及又有消息極為切事又有兩官一煞兩煞一官皆此類矣如用土為日主露甲乙為官煞支中有申酉字或辰巳字此為所合所制也交互有意要審扶誰拱夾雖真當防損露交互有意如丙午見壬子各有所賴丙用癸官壬用丁財已官看餘神扶何者為急何者非急拱夾雖真如乙人遇癸未乙酉二位明見拱夾甲申之真官貴氣無疑或餘神埋藏火神倘遇嵗運見火見庚或見填實其位發禍何可勝言哉合起力露莫作等閒脫廢精英轉加時雨天干相合看支神吉凶為要支神有力則自然非常如地支相合看所乘之干力力重愈精神也一云上下俱合有真合煞如己亥見甲寅之類又合煞如甲子見己丑之類一云煞神忌合喜衝刑破害干神支神一有閒侵嵗運合者精神百倍一云祿馬宜六合忌刑破况柱中見合力露不等閒也脫廢精神如我生我尅之精本散我氣若加時上用神凶則制馭却轉來生助主本者則有挽回生意之妙矣羣分有日主專行日辰務在吉凶之位吉神財元官貴印綬食神日德月德日祿貴人德神天月德合天赦月空時祿時象竒寶學堂凶神金神羊刃七煞空亡六害孤寡隔角三刑冲神死神死絶勾絞一說在年亡神同上說元辰同上類聚有年神領用太嵗參宅吉凶之宫吉神建祿驛馬宅神天醫福德闕門進神生旺位華蓋三竒凶煞碎煞的煞咸池沐浴亡劫白虎羊刃飛刃破宅大耗勾絞喪弔官符病符死絶時座消詳有五理之當然一如時上之亡劫刃煞空亡元辰孤寡死敗金神白虎等項惡氣貫聚倒歸於日有所刑冲尅犯者不祥若貴氣聚此則為祥瑞矣者一年月日三項貴氣三元福祿神引入何者重何輕分詳端確何者來得安穩何者不得停住更自家還載得起否或如船車又如屋宅又云時之有家却於年月日上之處又看有相依倚呼應否又云時座一位竟作主斷之端余見未敢如此亦係辨明吉凶妙理一致體得造化精切也年月日內有一位與時和者平二位與時和者小享富貴三位共與時和者大發見成富貴但日緊年淺月緩撮一時有尅破衝害和助勾引空亡死敗等件最為要事體如庚寅時取乙亥為用旺相生扶得氣得地可否以憑藉參考嵗運較其吉凶發廢之由一時欲旺相有氣勿使休囚無情又云有初中末三次之情義如寅時初屬土中屬火末屬木序一時相衝刑是切緊事也載物不牢時座五緊之為至切至要之道蓋此日生辰普遍天下衆人所共大綱造化也惟時之刻分毫不可差忒有惑故為准則憑據况交換之間刻次日軌本是未時一刻之次其銅壺漏箭却刻午時之七刻八刻况有山僻村落夜誕者乎虛辰遁法有三術之妙趣一祿馬貴人等吉刃煞死敗等凶一一俱有定位乃用五虎遁元住干支能司其官之事極為應驗又云言太嵗所臨十二宫之善惡遁亦只遁嵗神之干吉處作福凶處興禍者却用日主取財官等件正要看嵗日干之二位的係當生所遁何等吉凶神煞所主亦分輕重如人出身處係何𣲖源流資格也用神生時旺之方當防尅制如用水為官忌土到申子辰等處用木為官忌金到亥卯未等處李虛中所謂傷破用神家宅豫獨以為用神起發之處先被傷壞即用神無歸著矣忌神坐令旺之所反喜刑傷忌神者如用金為財火即忌神惟喜尅制之神加上為妙却要水來寅午戌巳等處以减忌神發用之基宅也用神之鬼墓得之為殃用神之貴情亭亭贊助用神自有鬼墓吉則謂之官庫如帶凶煞來刑尅衝竊者其用神自忌之日主尤忌之用神自有財官貴氣非本家之財官也來意順生扶合精神百倍用神自喜之日主尤宜見之墓絶併煞刃來刑禍形惡㑹空赦領財官為體祿集福加墓絶死敗至不足道若帶有刃煞亡劫勾元等來衝刑尅竊日主併用神則禍患立侵矣月空天赦二神至吉善者天月德天月合四神同斷各司乃職主事若又係財官等貴主領者更美其榮耀之福氣駢駢然廣集矣類有傷官墓神柱中尤惡暗有劫財庫鬼命分至凶傷官自有墓庫如丙人土為傷官遇辰自家墓神若帶凶煞尅竊刑衝日主併用神至為緊切惡氣劫財之庫墓如丙人戌位兼丁旺於上帶凶煞前來尅竊刑衝其用神日主至凶印綬生鄉宜乎潤澤惡神死地怕作刑傷印綬本為生我之神若值印綬自家生旺之所又見生合之神轉轉為福自家大義綿綿不絶則可或滿或溢火出木焚木浮水泛土重金埋火重土虛水流金沉反有太滿則傾太盛則折之禍矣凶惡之神自家已在死絶之處於上又乘惡氣尅竊刑衝用神日主者狼狽若死絶墓敗上宫主為惡來壞者用前注斷用神惡沒之所地支豈欲全彰納音生旺之方用神坦然無忌凡用神之敗絶惡陷等位柱中忌露多是卑賤下格更帶凶煞之神可乎恐見一二位猶可或嵗運上扶起惡陷之氣兼㑹煞局者即為沉淪喪敗悔吝破失之氣類也甚則死無葬身之地須空亡併煞方斷凡命之納音常生常旺四貴之地月神來上自然喜悅皆無所忌憚恬然自安火土之源失中易化塵濛之象若火土不得造化中和之氣者或燥或寒或偏或枯易於晦物之氣乃滯暗昏濛之象不能煥發遇而不成者矣死敗之象有黨莫傷生旺之神如死敗之象有黨反來刑衝尅竊生旺之神大不亨通之兆如水人見卯家之木酉金辰土巳火等神之類却將日主生旺日主用神生旺宫主相犯相尅為咎不小宜詳之五氣布定東西地理能培能竭亥子水寅卯木巳午火申酉金辰戌丑未土如金到亥子則氣泄而竭木到亥子受養得培餘倣此推極為切事一辰聚藏貴煞納音自旺自生如一辰貴聚長生帶煞在日時為生煞同途一云煞帶貴自長生為有用此為貴帶自生又為煞中藏貴一云年中干音隨長生同神煞在日時者為真長生乃聚年月日時之氣乂為一强四弱又云四柱只要一位長生專其旺氣為聚斂精神空亡消息數端豈止十干缺處此煞最為要緊中間輕重真假宜仔細詳審一旬空亡十日分上下所管如甲子旬中五陽干用戌空為切五陰干用亥空為切一氣分輕重甲子見壬戌真空見戊戌輕一云上肩一位太重如甲人見癸乙人見甲之類即十惡大敗一旬中後祿遇空亡如甲子旬壬申甲戌旬庚辰之類一五氣落空如甲子旬水土甲戌旬金甲申旬火土之類官貴抑扶兩立稱停一路鎡基官星為一身之貴氣福源第一切事財神次之若有一扶一抑兩立其義不分勝負如陰陽氣不升降一路運中當稱停其配屬强弱之情以察興廢可也煞見官隱以託情官顯煞藏而立義煞見有露神制合均配官隱無印更隱者主外有權謀操略內懷奸宄竒計若煞重而無馭官神無情者反是官顯煞藏內則性惡無情外則義和謹節大義如此又當格物以消詳之忌煞氣專用神情假用神力切忌煞外馳忌煞有生有扶或坐生旺之處及有贊合六神其專之意不可言也柱中乃見用神虛來生合情假露形有氣或落天中雖旺亦無地面情假力散故自不若氣專者若用神贊合有扶有生或力專生旺之位亦有生助之神有情或有力切要分曉忌神煞神二者雖在柱中作梗力却自偏嵗運兼有尅竊自然柱中停住不得氣散而外馳也缺用納音全為補氣大撓造納音之法隔八有用之具如何竟為棄物缺氣處仍要納音補借如缺土納音有土則補其不足休囚稍慢物皆妙意身不能任貴氣或多或重自身無氣豈能勝任如隨其類逐其化或從其象應其氣不在此論一說身不能任如病不能食花不結實勢情充悅發旺以時象意空寒幽棲度日八字氣候勢况情思體段如人氣壯氣滿似和暖喜悅之色少能達時通濟利物發明或嵗運扶持更何言哉若八字體制孤虛氣象冷落兼帶空亡休囚者任有智術才勇無所施展嵗月空閒而已成功之氣變化歸尊交互之神往來俱貴成功變化如壬水十二月氣本殘廢有木象支干引化第一妙事交互俱貴如丁巳見辛亥或庚寅己卯之類地支雖衝不和處二支互有閒神貴氣來往其餘倣此休囚更入空亡時乖事退旺相若兼生合輻凑權行凡休囚之物本不好了更入空亡豈惟生不遇時縱使乘時事亦退散不濟若五象旺相到空猶可金火旺入空却好夫旺相之神本自當時若生若合愈見精神權變福能駢集可行其志去就皆不失序氣巳過者欲退藏翻宜墓絶之地物方來者將進取原喜生旺之宫如三月甲木氣過理合退藏惟宜於墓絶之地乃道合自然也若臨生旺之鄉反主乖戻方來生旺者如十二月甲木進氣正月乙木進氣將進方來宜立生旺之地為禍為福尤切休囚有用發越仍遲旺相無情為惡最速用神雖貴有用生我助我或又臨天月二德天乙之類若不臨天時旺相縱有用發越遲遲柱中雖帶旺相之神與我無意如半吉半凶一至嵗運只扶其凶煞為禍最為猛速進神執權至精至當納音載貴宜尅宜生進神帶貴氣柱中第一妙引煞入內第一凶貴氣柱中雖吉情若未切納音宜來尅我生我則方為有意以全其貴之美若納音不生尅者空負其貴與我無統也旺神衝氣透用凋枯惡煞任權本旬急切如丁未或生夏月得時之際刑出丑中辛癸透在柱中為用者其福氣薄為禍亦輕惡煞旺相本凶若同日辰一旬之內禍速至重也貴神本旬至吉至緊金神得勢至凶空亡遇衝必發金神本凶若無火鄉所制又被别處扶起或旺相皆為得勢至暴至剛為凶特甚空亡陷沒無用乃棄物也遇衝神必然起發即有用矣如寅空見申之類是也刃併元亡金滿局全賴火神旺相凶煞火焚空須憑水象金乃殺害物命之象滿局金氣兼帶凶煞等神刑尅者我不殺害他人必被人所刺無火制必驗火若焚炎之象盛者此等多值火灾况嵗運符合其氣須藉水象既濟木土氣託以待發明尅衝力停未分勝負木非土則不能栽養土非木則不能疏通以待嵗運扶其不足煥發其氣自然益堅至於潤澤衝尅有勝有負力停則勝負未分須觀其氣而消息之方可斷也扶持生助察轉養之神戰鬬衝爭觀壞盡之氣生助滔滔者看轉養之神何處為體用之基為吉凶之兆而决之戰鬬衝爭觀壞盡之氣即此為閒退無用之人也陰干取刃欲分明支力當權防暗犯支力一云貴力陰干取刃如丁巳見未辛人見戌為刃之類支力當權如未係貴神或力重則合午午衝子來犯未又如未有力重能衝起丑字中癸巳之物出來旺神挺立物莫當前惡煞滿盈干無停處如一位之干有天時至旺之氣卓然柱中擅權餘無牽綰者其被尅之神何敢現露縱使藏伏亦莫敢執事也嵗干日干遇滿局煞刃等惡自家干主竟無住處决主不祥貧夭惡死鬼中逢鬼無去就衝而遇衝缺倚憑尅害我者為鬼倘鬼亦遇鬼來相害輾轉傷尅氣極逼我若更無轉制促死之兆支神被衝干神貴氣便不安穩奈何衝神又遇衝激我家更無倚賴之基象不立物亦不成非禍則夭併吞重尅皆成禍二激雙衝總不祥如甲見二壬為重吞見二庚為雙尅柱中叠見衝神或合處有刑有害有尅有破皆不祥之兆也五行務要均停偏倚難能濟物四柱全宜匹配興衰恐不成功停均其說有五一日主用神冲和相濟彼此各有所賴不偏一損用神之氣者有物以制之不致作楚一干支上下字樣相承得所無過不及一死氣或對活物黨寡不能勝黨衆一欲變欲化有妬有破欲靜欲安有犯有激者匹配其說有六一衰神有用須運扶衰者方可一善惡雖能均配看運扶何者以别吉凶一雖有用神一興一衰偏枯不濟一相安相濟所應所求各有倚賴一旺欲成其物一衰不可成全或干支各有所配貴氣者或有所乖劣者平生福德不知化物連綿次位來神要識暗傷攔截支內有巳乙辛丁之類皆言七煞惡之殊不知巳土生乙金乙金生辛水辛水生丁木續續不絶况明露乎虛拱處或有甲丙壬庚暗合完氣者大富貴格天干未來前一位地支未來前一位皆為凶惡不可不知如乙見丙合辛暗損及有刃類子見丑丑見寅寅見卯之類有刃有煞咸池比肩惡氣多端十干顧真氣相凌七煞犯尅神極切如乙酉見戊戌即戊火傷乙金又六害之墓火發其旺金之氣餘倣此七煞犯尅如原用乙木行酉運丑嵗衝損乙木金局本壞其乙木用神兼丑衝其虛未將所藏之神碎壞倒地也舉此一例餘局細詳此段止可言七煞逢衝者不吉不可論金局壞乙木用神八字帶煞刑胎意外須識四印何干乘氣類取其詳胎神所傳消息各有異類今人但總約十箇月之位故無淺深以致差池一法十箇月左右間其所生日辰對者是如丙午日在何月節內或十一月或九月遁而用之若帶刑主早妨父母空陷衝刑四煞最惡四印古歌云辰戌丑未為四印戊巳得之偏主信甲乙若逢鄙且貪丙丁或遇多貧病庚辛格號母生兒聚煞丑宫多短命壬癸未詳五行分布方隅死水生金而異用謂火生寅敗卯旺午金生巳敗午墓丑之類如甲子人遇巳即為生金生金尅甲絶水生甲及官火竊甲之類遇卯即為死水生甲旺木同黨敗火耗甲位位各有所司看其餘局次第扶抑而論之餘干倣推一神閒停左右傷官竊本以待時閒停之神在左右者即月時嵗干多是不取用故一向差慢而至停囚長智養病喪身或係傷官之神無氣不係為事忽嵗運助起此等之神耗我之氣傷我之用半真半假其實則圉圉得勢小人逢寵有權留此禍根豈可忽哉干神彼此相安方為祿備地支來往衝激不奈馬馳如甲人祿在寅見壬寅則自家帶截路空亡為僧道有福庚寅為破祿半吉半凶又如辛祿在酉見癸酉為火水相犯丁酉為空亡貴丁木受氣辛水沐浴主奸淫也祿上遁干號為真祿著落何方有用其干見天乙貴人其貴上之明干復坐貴祿如丁人祿在午遁至午得丙字丙貴酉亥而逢辛酉辛亥則辛貴復見於午也入格極品此李虛中為天祿互貴一馬不喜衝衝則動馬上干神乘貴者吉馬上遁干有情者吉如丁丑人逢辛亥是要貴處有用馬上干神自帶凶煞空亡者惡來尅主體及用神者惡或支神激烈刑衝轉轉其馬豈得安休耶傷盡官星方知用祿衝破祿位始得用官柱內有傷官之神官星明被尅害却有日祿者用祿却穩當不致兩用不歸一也祿位如被破壞却只用官星為定體蓋貴用一端最妙多則散了精神祿位雖明化氣恐忌驛馬既見日辰又重官星建祿等件既明無破為吉為福必矣若體用成化却於其位有妬有奪化來不得者為物不成則亦苗而不秀空貴無官或有福而非財積福厚者驛馬本理於太嵗宫要來乘用若日宫又有馬出重叠者反為賤局一說日辰馬併嵗馬雖重馬甚有用貴氣相安者愈好再見則不中矣記取祿賔為用細觀馬將為元遁祿上之干名為祿賔如無年祿須看遁至祿官干神為用主祿最切却看日辰用為何神也馬將亦如祿法譬如丁巳嵗丙日馬在亥遁見辛為丙日之妻主道途方外所娶却分貴祿財官凶煞輕重言之用象契合要防妬爭貴氣交通切觀分奪用神本與日干作合有情有氣得侣或其明暗中有比肩一爭一妬遇而不遇用神自家之神爭妬者一體斷法嵗運同凡貴氣專用則可兩處三處分用便是衆人之物不惟平生多起分爭之訟自家財産亦為比肩所擘彼重我輕更甚財官只倚日辰亡劫須參太嵗日辰只取財官為用最為親切興衰旺絶相生相尅却與嵗家如何統攝其行藏禍福極驗亡劫二神一年至重之惡煞也須凖嵗君推參各有進退吉凶一十六般所致行藏取舍之道已録於前貴有等降明輕重富有高低分厚薄察格局體制如勢意猛烈主本雄健貴氣互換往來凶煞輔佐得所不致氣滿無去就第一義也二用神至切至清無破無壞格局斤兩相等而順三福神有情化象得體四本等財官有用運遇扶持不絶五所喜之物時上與運中扶持所惡之物時上與運中制馭凶處兼有德神吉處每有煥發一大富不在財神之輕重大概亦有貴氣俱全者不過看氣厚氣壯但中間缺清純之象二精神有助閒神頗多日主有倚印食財神三者至切三祿馬扶身日主受氣胞胎絶處財宫有用或遇生氣但流逺聚象之氣不廣四庫財有拱或露則要氣厚得衝得刑財印食神三位一位有用日辰但拘切自專貴氣散漫詳之各有高下明矣五帶刑尅或尅我之物係財星生旺之氣或財神祿馬貴人之氣貧賤而壽延富貴而年夭一應用神尅戰無倚又兼休囚無用或臨死絶駁雜獨身得中和之氣運引而不偏一身臨胞胎死絶受氣之方不帶福神行運不能害者或空亡破碎元辰大耗六害鬼墓金神白虎死氣刃煞交併歸局獨有一印綬或一食神有力行運引而駁雜處不絶者准前文一福神往來得勢自身旺相嵗運顯揚太滿而傾者或缺轉生之神或尅我處竟無去就或一空陷之物刑衝我聚氣之所一本象與化象皆得用神為福左右逢其源其身却化而不化根本不穩者一滿局貴氣身弱不任嵗運尅戰日主准上文闉實亦由於火土火生土意最良最實氣象自然固聚必是敦厚務本利名安享處世游優却非駕空建功立業者流行俱藉於根源大凡流年運限從容不經風波成敗者蓋由根基元有得力貴氣引行嵗運贊助不壞有所憑藉也聰明無非德秀晦懶總為休囚德秀如申子辰月壬癸為德丙辛為秀帶此多是文業通達聰明曉事之人餘局例此休囚廢死者天時也死敗墓絶者五行也如滿局俱帶此等氣數一生謀望無成退悔藏拙若兼孤氣出俗作林泉人也偏氣俱强而鄙俗本源失托則漂流如八字純陰純陽柱中因缺合神財宫等貴用神既偏且强又能刑出衝飛之物來者皆為偏氣所致雖豪亦俗非俊秀才器矣日主象則無黨可就氣則無貴可乘柱中多係閒神慢煞兼有刑尅衝竊散漫之氣此等懶散馳逐多謀少立氣如猛烈害物傷人象若純和無操無縱勢當天時之氣勇猛剛强若更帶金神白虎刃煞刑害之神凶則為强盜劫掠善則屠儈活計終亦殺人害物恐亦被人殺戮也臨事有斷機變通利皆由凶煞之神不滯不塞輔佐用神有以使之然也若柱中象數純和柔善氣實則無綱常倫序之能雖有用神亦難也矣軒昂呼應原憑刃煞之威齷齪財豐盡帶庫墓之氣有貴氣無刃煞輔佐不獨臨事無威勇作為殊缺相應合也有此刃煞扶貴必能做事立業果决有斷有人名目卑微却發財祿乃庫基中雜氣財官印綬親厚有益於日主况嵗運扶合身强露刃翻宜聚斂營營干合多偏倒亂精神渺渺身强力健柱中暗有財源之意若見刃露本為劫財但我力既專財神有情反宜刃露蓋我能執奪歸斂其物也此等格調慳吝幹蠱善能聚財若柱中嵗運有刃旺之地未敢如此議斷須别詳之干合多偏如乙見三庚二庚合者豈惟氣不得中亦自偏枯倒亂縱化得成象亦未成全美不過三姓同居兩姓合活接李換桃人也獨為煞布衆辰虛張聲勢一種貴由三處分散英靈煞本不聚若只一位之煞布向諸處力自輕疏不至謀多遂少有口無心過望大節力小任重一件貴氣精專為竒若二三處皆有如密雲不雨秀而不實或空貴無官多學少成平頭帶來針刃豈無傷殘勾絞併至亡劫寧惟狡猾平頭乃甲丙丁等字樣引懸針羊刃刑害日辰一云日中帶煞帶華蓋主妻先嫁人或殘疾或愚鈍一云率因事而結婚或有貌必淫如巳人未日或己亥己卯己未一云日時羊刃為貼身刃妻有生離死别一云互換懸針主帶疾及官刑併惡煞自刑立見女人亦然勾絞二神主狡猾破敗吉則立威若臨亡劫必凶况不和於日主者乎財居庫地身入衰鄉性能鄙吝氣亦猥慵財神遇庫間藏既缺刑衝開激况身弱者此等之人度量慳鄙器宇少豁達也木遇學堂火臨生地文既精華志尤倨傲木火文明之象居生旺之位主文學疏通才能雄健但木火炎上之氣為人不顧細節不能屈下倨傲驕忽播德望之聲名敏智謀之才略貴氣有助干有力天月德辰及天乙互換來往主聰明雅望兼藉空亡刑衝得用准上文煞刃扶貴象有制伏得中日干可以馭伏准上文又云水帶貴氣有扶助有隄防才略機變智謀過人財源拘局街頭庫店經營竊氣無憑化外江湖奔走格局不廣器宇不充但有財源助身一二支伶俐生扶而局於純粹之器兼庫神得用宅神有情者准上文又云食神或印此例同斷凡泄氣之神汗漫滔滔之勢逺而有力聚而無依准上文江湖泛泛兮風餐雨宿羅網濛濛兮利鎖名韁亥子為江湖若係財官祿馬用神其氣泛溢者多致道途生計披星帶月其水泛泛其馬刑衝方斷辰巳為地網戌亥為天羅全者用神其上失地五氣不能成象則利名碌碌無成如塵埃所罩昏霧所迷嵗運併臨仍與日干尅害者夭亡水火動搖是非林裏立身木金和協義禮門庭發財水火乃人間之動物犯此格多惹是非唇吻凡立身為事每於閙裡出頭鬬喋之中著腳若吉則有决䇿之機凶則有不雅之號金木無偏倚氣和得中陰陽相配相濟者必務本實我若尅彼專當獲道義之財若交錯無情主被客凌者主不義人損我無意中之財或被不義事寃屈折辱驛馬得我尅他生盡發外邦之祿空亡有物明氣見每膺無意之名遇馬上之干日主能尅或馬位有物生我者多是逺方外財發越或出外於邉境得財祿空亡為凶敗之所若有喜象集來如金火喜空乘旺為官貴等神有情者合此格局身雖食祿家計貧寒庫有餘財名目卑賤八字體段輕清官神乘貴地支或破其象休廢其財却又入死絶等處不帶墓庫宅神之貴宅神仍衝破者准上文貴氣落空亡用神入死敗處仍無生意其咸池沐浴白虎空亡却有拱護柱中惟財庫或財神專旺輔日主有情尅助者准上文嵗望闕門當近朝堂之職氣衝第宅難依祖業之基太嵗對為闕門有拱入格决主食祿職任皆近於朝堂要路之處嵗前第五位若是被衝更與日主非貴氣生扶統攝者决主祖上基業離破不能居住若乘官符並亡神主為官斷沒抄封犯破碎劫刃毁售必矣二位不宜亡劫拆屋售田四仲若犯咸池貪財美貌嵗前第五位為命宅後第五位為祿宅命宅為第宅家舍祿宅為田莊邱墓若帶亡劫主平生愛費財造屋置田却主破壞况與日家刑衝害劫破尅乎子午卯酉全古謂遍野桃花又名亷貞沐浴又為暴敗桃花帶此主愛風流藝術性巧情急是非中立身與日刑衝尅竊方准忌水主淫兼貴煞輕重言之咸池緊沐浴慢馬上空亡每遇異路之財帛天中祿位常招憎號之聲名馬上遁干得用遇馬上明干助我或作財元或馬坐財生旺之地却坐空亡有意多外方出入獲外方財祿或常招别門無心利祿異路言非本等之財也天中即空亡帶祿若衰敗者准上文加白虎在日緊切或招人傳之惡名况水火象并咸池桃花乎邜酉好遷移門户巳午當感夢生胎犯卯酉字在日時好粧飾堂亭遷改門户帶馬則常移居止胎時加臨巳午帶年祿和諧其日主者主應父母得夢生産旺刃不兼餘煞偏好異端亡劫更引他神只圖豪飲旺氣羊刃别無餘煞者剛亷正直武勇愛籠養打捕起扮社火之類帶學堂官貴别詳亡神劫煞羊刃多聚更與日不和協狼餐鯨飲逐日醉飽一任風波落魄無成矣桃花簪主恣風情破碎朝元宜落魄桃花簪主如卯人見寅午戌酉人見申子辰之類又謂倒插桃花為人風流倜儻却有賢而不賢也與日尅竊方准破碎朝元如酉人見寅申巳亥丑人見辰戌丑未之類亦謂面頭破碎尅竊刑害日辰主狡猾命夭輕則不能起發而貧官符落在天中語多妄誕空亡却臨天乙性好謳吟官符即亡神也在空亡中與日尅竊天乙貴人在空亡中與日尅竊各准上文才傷用氣抱怨嗟呼重駕身强妄為狂蕩用神當生縱無傷動倘若嵗運來尅必須得意中反成失意故嗟呼生怨矣凡身旺之人即如飲酒醉眩者欲其無狂不可得也或又遇嵗運重駕氣强自然所為淫蕩狂妄兼破財産家業胡做胡為柱有馭制有倚托别詳白虎兼刃罵殺時人華蓋自墓享於清福白虎同刃乃白虎與飛刃羊刃同宫與日刑衝尅竊者如此一云若在日時上尅年者娶妻鶻突不然妻有異症因服訟促逼結親則可其妻亦愛訟人也華蓋自墓若自生旺又遇嵗運與日和合成局極受清高之福否則為僧道九流如庚辰不能自墓只是村巫或為粗魯手作人一云華蓋帶墓有氣主福夀但不至封爵之貴或為僧道名望人若帶鬼咸池非藝人即村巫也祿命二神相激鼓舞作為貴煞四位相承聚歸取用前法祿命二宅若犯激作刑衝尅害看吉凶之意何如與日不和應驗如此蓋祿命二神實係衝命左鼓右舞之氣使然也或貴或煞二重三重兼併一辰上者况柱中四位各有吉凶之神要分聚在何位最多以較長短寅申巳亥無長生則凶水火之象輕清則文章異術刑衝則道德禪門水火乃坎離之神有既濟之造化其中氣清則文章魁衆輕則術業異常空則仙風異質刑則道法鬼符尅則禪宗空寂野衲宿緣恭究覺悟專論日辰格象輕重而言金土之源氣老則財庫樓臺殘嫩則經商手藝金土之義有以賤生貴之功氣老則成就其物蓋宜於富藏墻垣第宅莊營之壯觀由此而致也或衰氣殘絶或初新氣嫩若非經商買賣則手藝工作之人華蓋墓神天月德合泉石家風休囚日德死絶敗生塵埃庶士華蓋墓神天月德合三件循環於柱中者必有水邉石上宿緣辦道求仙至意日德若休廢虛有其德名矣况又干音有死敗等位惡氣空亡來生助者不過碌碌一寒士爾十惡大敗若真貴為將賤為冦囚死空亡若聚生者道衰者僧十惡以道藏經所載為准貴氣相扶清厚入格必掌兵權若凶煞凑集交併柱中戰害用神身主則凶日主用神當休廢之時落空亡兼為孤寡六害若臨長生臨官旺地則為黃冠若處敗絶墓死之方則為緇衣魁罡權重却害六親劫寡雖孤喜全三貴辰為天罡戌為天魁最有權威力量但孤尅之氣太重未免妨害六親劫煞寡宿若帶長生貴人有祿乃三件之福氣也與日和協必主富貴無此三件縱發不久而貧吞啖勢繁非偏房定乏乳哺孤寡來併由異姓假合同居吞啖乃倒食之神倘多有力有勢有權或臨生旺之鄉太切准上文孤寡六害同併却有印綬食神一有用者仍見宅神衝破准上文重拜雙生己亥帶支干同類巫醫酒色亡劫犯咸池貴人命帶己亥二位又有别支别干一類同者有二三位者如甲見甲子見子必是雙生或重拜父母須是干支俱有相同方的更劫孤亦然師巫藥術牙儈等輩仍分輕重高下皆亡神咸池二位主領兼羊刃破碎墓鬼白虎之類者狂妄詭詐迷花戀酒九流不才之人若貴人德神財官生旺者庶幾坎離交㑹老醉秦樓象類清幽幼登仙府子午上有干神鈎合如壬子戊午之類戊合子癸壬合午丁或丁合壬癸合戊水火有情至老迷戀清則風流濁則卑賤五行之氣至清成象况引於幽潔之地貴神歸一不雜氣純清逺别無死絶等件惡神相犯准上文論文學業特精英長生德秀殢酒惜花偏落魄身旺咸池長生帝旺四貴等處德秀二神文學才能藝術特達精專出類拔萃人也殢酒惜花日干旺於咸池之上一也本身自旺受沐浴之神尅者二也本身太旺沐浴更多福氣散漫不聚三也妻遇比肩旺奪非是良人財因沐浴强爭難辭淫濁妻干或隱或顯而切切遇比肩相近相親其位被占奪又或比肩乘旺其妻必與外人私通不然娶婢妾娼妓為婚免此醜五行敗處為沐浴又名桃花咸池煞一例同斷其神若來乘勢爭財或財立其上被他神所竊戰者我身兼與用神之氣不聚不斂精神散漫准上文娶婚却因服訟類明六干生子欲别賢愚體有五法日辰丙子丁丑戊寅辛卯壬辰癸巳丙午丁未戊申辛酉壬戌癸亥犯此日多因孝服官訟二事臨逼結婚或成親百日內决主一家忽招訟服或主無外家力舅氏不諧或無外家或兩重父母或無妻財或女命兩重翁姑半真半假帶合神桃花花燭不明或非良婦或殘房入舍此六干柱中多者尤緊尤濫即陰錯陽差也帶桃花在帝旺多惹婦人官訟或豪家亦因妻黨婢妾致爭否則兒女官司也别子賢愚五法一以妻生而尅我者為子男以偏官為子女以正官為子一云女以我生為子引至時上逢生旺則好仍以餘神㑹合有情方貴一云我與妻同化者如甲人以土為子引至時上考究一化氣所生者為子如甲人以金為子引至時上取用一我之本氣所生者即子如甲人火為子引至時上詳究一但是偏官正官有情引至時上化得成象即好子納音長生之氣贊助妙甚一云如以我生為子類以水一火二木三金四土五取之惡攢時日輕則子拗妻愚重則空房隻影亡劫孤寡三刑若三煞併而有救者時上子多不孝日上妻愚拙或不和若重犯力猛無救孤獨貧寒一生自守空房刃帶墓刑吉而夀彌福厚凶而破帽單衣羊刃飛刃犯墓刑二位須有華蓋始吉及丑未干頭貴者未有不享福也與日宜和若無華蓋帶空亡死絶孤寒破敗人也與日不和亦如此日犯惡神有助再婚女妻時臨凶煞仍空須招義子日犯年家亡劫大敗破碎臨官帝旺者尅妻却有干音生助日主必是再娶少年室女或幼妾為妻若帶祿貴贊助者貌美賢能一云若年之祿馬貴食六合在日不獨妻秀更能掌財時上帶凶煞落空亡必主無子若生助食神或日去衝尅者必是螟蛉之子時日咸池帶煞父命惡亡休囚大敗臨空妻家無宅咸池在日時為嵗煞主父惡死更加惡煞無疑如金主刀兵火主火厄水主水厄土主瘟疫木主枷杖以五象推之一云帶咸池若旺犯華蓋破碎及陰錯陽差因妻醜辱或離異若貴豪之家妻父母兄弟親屬內亂一云咸池羊刃多算多能亦有宿疾互換在日時緊切日主宅神陷妻之氣兼的煞十惡大敗之日休廢又落空亡如甲寅旬癸祿居子為空神主妻家無片瓦根基胎神尅竊橫亡忌衝局中之字破碎空孤離祖因犯祿後之神胎神白虎煞也水午金卯之類衝局中字如申子辰支係水命怕午字之胎神白虎來尅竊日主併用神主血光橫死以五象推之祿後一辰若係空亡孤寡破碎等煞定主出祖旺相别立支隔合衝二方此格多應自縊合兼河井兩位犯者無不溺亡自縊煞乃戌人巳巳人戌之例若帶金神白虎亡劫鬼墓空亡官符大耗刃煞領其死絶之地來尅其身廢其用神犯其太嵗刑其大運准上文丙子旺水癸未東井癸丑三河帶咸池金神羊刃亡神多主死於水中一云若帶亡神起端因花酒惹事目瞶耳盲用神陷切而死敗尅身腰駝足跛福氣衰頽而刃煞刑主用神被死敗等物尅竊又臨亡劫空亡大耗諸煞尅竊身者准上文貴氣休囚勾絞空亡大耗無所倚托死絶之氣出現沉淪旺鄉之吉刃煞仍刑我日主者准上文鬼嘯應知惡夭本虧非止貧寒鬼嘯如甲人遇庚庚遇丙轉轉相尅之類有辛合其丙方可貪合忘尅如無辛來合不可言甲去生丙本虧乃凶神作黨尅日家之氣害年之干所以貧難少亡不夀天地具包藏之德風雷遙激烈之聲申亥二字明有力量酉戌用神得所正合此格一云申亥不露支神虛夾二位有貴氣者體局不凡卯巳二位內有貴氣柱中虛拱嵗運對衝空處必能變化發越一云拱夾穩處又恐刑衝太迫走了貴氣拱將拱座并拱印必是貴人顧子顧母尤顧身自非俗客拱將謂本支三合如子人見申辰之例拱座謂對宫如子人即午之例拱印謂印綬正位如甲人子丑之例一說印乃庫也又云印即干庫兼若財官貴氣有用或財官生旺之鄉皆富貴造化生我者為母我生者為子兼自身三位俱無損壞往來顧盻有福益者為有福人也三位竒寶用官神流芳英烈四干天乙臨華蓋曠世清高時座三合謂之竒寶若官星居上無破無忌世代不絶芳名勳業人也古法不獨論嵗日之干乘天乙之貴為吉月時干有貴人乘者更妙況臨本命華蓋生平不止無凶亦清高竒貴人也四面宣明旺相內廷食祿二煞若臨夾拱沙塞揚威青龍元武朱雀勾陳為四面干祿歸元各占方位旺相如甲乙臨寅卯為青龍丙丁臨巳午為朱雀之類准上文亡神劫煞二位俱空閒而却各有拱夾者准上文金水文華而拔萃土金阜富以成高金水二象若清無其餘之氣混濁其源者文采英華出類之格金土相生若各無偏倚得中和之氣者似物漸長生意益高如此之象當作富貴之格或貴氣和協亦主功名食祿榮耀者木火有發源清貴者水木多順序木火易於煥發有來處根源柱中生意或引嵗運故能扶引而榮耀所以人不知其有根氣但知運上木火透發也水木清竒若其氣不偏倚順扶生旺帶貴者必為翰苑清要或臺諫登金步玉貴人頭上帶官星負笈挑簦學堂館中逢驛馬天乙頭上有官星顯露謂之官星坐貴主貴學堂乃日主生旺之位學館為官星生旺之方臨官之位亦同取用遇驛馬在中無甚貴氣者空有才學無成即入仕途亦多奔走道路落空亡更甚翰苑標名定禀乾坤瑞氣薇垣秉政應拱子午端門寅巳二位有力能合亥申乾坤又有三合拱者子辰能拱申卯未能拱亥若無雜申亥乘其貴氣必為出羣之造矣子午一位或有正拱或有三合外拱如有貴氣集上勳業名家人所未及丑亥拱子未巳拱午為正申辰拱子寅戌拱午為外魁罡才逢夾貴風憲提刑龍虎得以專職玉堂拜相辰戌二位逢夾貴為風憲提刑者謂有威權振作也如壬癸逢巳卯拱辰丙丁逢酉亥拱戌是也又明見魁罡重集貴氣同前斷辰寅二位若遇正拱外拱有貴氣吉神聚其上者妙合此格或見寅辰得氣集貴旺相扶持無衝刑尅害仍得卯處有吉者同前斷陰陽偏用貴崇奮極品之尊卯酉正門權輔領外藩之鎮偏陰偏陽其氣多是奮發風飛雷厲貴氣若專旺相力重驟進極品者多蓋偏氣好爭挺然不配雄豪力大偏官易於起發但是退速或非命爾若正官則穩隨分遷擢無生殺之權卯酉乃日月出入之門户有貴氣拱夾得用者合此或明見此二位用神集福有力無破者准上文嵗駕祿馬帶財官英雄超邁貴局日時乘德秀才業峥嶸凡太嵗祿馬二位宜係日主財官居上豈非英雄超邁凡貴人局在日時見德秀二氣者合主文章才業大器秀拔英傑之人也用拙而運扶枯鱗濟水用强而運拙曲港行舟用神力慳或有氣而被尅竊或隱藏而無衝合鈍而不利運上却引生扶之氣悠然暢意矣用神或有力或得時或情合若運中阻壞其氣者東礙西撞不能順駕縱有一時風便其奈何也運以支重為基嵗以干重乘氣運之支神太過之物則宜抑之不及之物則宜扶之須要與當生支神貫穿看其本末乖順何如若只詳用神輕重扶抑者亦未善又論生氣尅氣運支至重次觀運干戰鬬和諧何似統何柱中之物有情而言方吉流年與太嵗干神關係最緊切一年萬神吉凶之主日尅嵗則災合則晦若有化有情則有好事所驗灾福遲速仍察運中相攝如何須兼用嵗支刑衝破害上言無偏則可運馳行色用分何弱與何强嵗攝兵權勢持情急而情重如日為身貴為用二者難以偏廢日主為體貴氣為用俱欲中和一說用神貴氣如登程行李器物糧草等件運即住腳公廨館宇所泊之所五氣貴煞何者引彼地理所宜或順以參考其否泰之兆吉凶二象運元未萌非嵗則不能激揚其兆惟嵗君最嚴最切至威至重持握特急勢來則如戰陳鬬敵迅速險大難以卒然救應議擬也雖鐵關金鎖其能拒哉亦有貴氣為凶抑惡揚善乘機凑濟莫測祿貴運欲顯揚少壯宜兼旺地凶煞須從沉昧老人更喜衰鄉一胞胎養沐長生冠帶之地二十嵗宜行臨官帝旺之運陽氣强盛三四十嵗宜行衰病墓絶之運天癸枯竭五六十嵗宜行其中合可之義則造化取舍之道通變為言者也運中少壯合體固宜揚其貴祿凶神運欲沉淹老者宜行死絶等運仍不要與日主用神表裡生意者誠為福運運氣發源力穩方易成功時干化象求情行當領用行運究考的驗福禍亦是易事當逐官消息審其來意如運之發源在年月日時上空衝死敗之地縱發不久發源在穩實住處可耐患難可享富貴福澤悠逺也行運之法取時干之化象者有體象化象二意二者得侣有情有類為象成用或行至運中扶持或旋造成其器第一妙事乃虛中家傳之祕有此極論引用餘神之氣最切宜取用生尅强弱蜚黃騰踏運開一路官星豹變興隆年統平生財氣柱中帶官星不若運運統攝官神得意步步榮耀八字中有財不旺雖見無情行運雖至生旺之處仍未奮發蓋氣或死絶或滯塞嵗乃尊嚴之君吉凶神煞之主流年或領財元或生扶財象或激開財庫或遙合飛衝生旺之所或拱夾暗包財神祿馬貴人之宫其財之旺由此嵗君統繫豹變勃然興發也運凌身弱而適扶用神運變身强而抑其福氣當生身旺或比肩大繁用神怯弱者宜凌廢其身之氣適扶我之用神反是則不祥矣當生本體衰弱用神太過身不勝任又或錯亂不能歸一所喜如是反是則乖蓋當生本末體用相稱運扶身太過或困其用神亦不中也嵗或運符吉罔凶嵗或運昧善縱惡或當生凶煞力重吉神力輕財官勢況散漫嵗運符合福神而抑凶氣者有之當生吉神力重凶煞氣薄嵗運失紀綱制馭之道或至於縱容惡煞沉昧衆善者有之玉井奧訣乃安東杜謙所著其間幽趣妙象數見而用藏氣類從無立有倒飛暗合得一分三脫胎換骨入聖超凡誠非易事欲窮其絶處逢生要識其旺而退藏器滿必傾物過則損黨盛則隨類氣衰則托情用不用真假宜辨變不變象類先分故氣禀有厚薄焉有清濁焉有高卑焉有晦明焉萬緒萬端千變千化氣有生尅究竟盡燭理外之理物有造化活法極參元中之元誠得李虛中餘學一𣲖之正傳也世之不得覩是書者多矣豫故表而出之育吾記三命通㑹卷十
